title: "The Grade Classifier"
xp: 50
difficulty: "easy"
description: |
  Write a function grade(score) that takes a numeric score and returns a
  letter grade as a string.

  Check the grades in this order — stop as soon as a rule matches:

    A score of 90 or above earns an "A"
    A score of 75 or above (but below 90) earns a "B"
    A score of 60 or above (but below 75) earns a "C"
    Any score below 60 earns an "F"

  The boundary values belong to the higher grade. A score of exactly 90
  is an "A", exactly 75 is a "B", exactly 60 is a "C".

code_starter: |
  def grade(score):

hints:
  - "Check the highest grade first (90 or above)"
  - "Use elif for each lower tier so only one branch runs"
  - "The final else handles everything below 60"

tests:
  - code: "assert grade(95) == 'A'"
    message: "95 is 90 or above, so A"
  - code: "assert grade(82) == 'B'"
    message: "82 is 75 or above but below 90, so B"
  - code: "assert grade(61) == 'C'"
    message: "61 is 60 or above but below 75, so C"
  - code: "assert grade(45) == 'F'"
    message: "45 is below 60, so F"
  - code: "assert grade(90) == 'A'"
    message: "Exactly 90 belongs to A"
  - code: "assert grade(75) == 'B'"
    message: "Exactly 75 belongs to B"

worlds:
  fantasy:
    title: "The Apprentice Ranking"
    description: |
      The Mage Academy assigns every apprentice a rank based on their spell
      accuracy score after each assessment. The boundaries are strict and
      must be applied in order.

      Write a function grade(score) that returns the correct rank letter:

        A score of 90 or above earns an "A" — Master rank
        A score of 75 or above (but below 90) earns a "B" — Adept rank
        A score of 60 or above (but below 75) earns a "C" — Apprentice rank
        Any score below 60 earns an "F" — Probation

      Boundary values belong to the higher rank: a score of exactly 90 is
      an "A", exactly 75 is a "B", and exactly 60 is a "C".

      Check from the top down — once a score qualifies for a rank, stop there.

  scifi:
    title: "Crew Performance Rating"
    description: |
      After every mission, the ship's AI assigns each crew member a performance
      rating based on their mission score. Ratings are assigned from highest
      to lowest — the first matching rule wins.

      Write a function grade(score) that returns the correct rating letter:

        A score of 90 or above earns an "A" — Elite
        A score of 75 or above (but below 90) earns a "B" — Proficient
        A score of 60 or above (but below 75) earns a "C" — Adequate
        Any score below 60 earns an "F" — Unfit for duty

      The boundary scores belong to the better rating: 90 is an "A",
      75 is a "B", 60 is a "C". Check from the top down.

  mystery:
    title: "The Case Difficulty Rating"
    description: |
      The detective bureau rates each detective's performance on a case using a
      numeric score. The bureau then converts this into a letter rating for the
      official record. Rules are checked from best to worst.

      Write a function grade(score) that returns the correct rating:

        A score of 90 or above earns an "A" — Exceptional
        A score of 75 or above (but below 90) earns a "B" — Commendable
        A score of 60 or above (but below 75) earns a "C" — Satisfactory
        Any score below 60 earns an "F" — Needs review

      Boundary scores go to the better rating: 90 is "A", 75 is "B",
      60 is "C". Apply the rules in order from the top.
