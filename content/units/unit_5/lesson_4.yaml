unit: 5
lesson: 4
xp: 10

example:
  code: |
    def read_config(text):
        log = []
        try:
            value = int(text)
        except ValueError:
            value = 0
        finally:
            log.append("processed")
        return value, log

    print(read_config("10"))
    print(read_config("bad"))
  explanation: |
    The finally block always runs — whether the try succeeded, the except caught an error, or even if the function returns early.
    Use it for clean-up tasks that must happen regardless of outcome: closing a file, logging that work was attempted, releasing a resource.
    Here, "processed" is appended to log no matter what the input was.
  output: "(10, ['processed'])\n(0, ['processed'])"

