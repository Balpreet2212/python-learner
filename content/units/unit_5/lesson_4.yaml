worlds:
  fantasy:
    title: "The Ritual Log — Always Recorded"
    setup: |
      Every enchantment in the Grand Library must be logged, successful or not. The Archivist insists: even a failed spell needs a record that it was attempted. Without the log, there is no accountability.
      Python's finally block is the enchanter's logbook — it runs unconditionally, after the try and any except. You can count on it the same way you count on the sun rising: regardless of what happened, this code executes.
    final_challenge_prompt: |
      Write safe_read(text) for the library's enchantment logger:
      — log = [] at the start
      — try: value = int(text)
      — except ValueError: value = -1
      — finally: log.append("done") — this must run always
      — return value, log
  scifi:
    title: "Mission Telemetry — Always Acknowledged"
    setup: |
      The Meridian's mission recorder has one hard requirement: every data read attempt must be acknowledged in the telemetry log, even if the data was corrupted. An unacknowledged read means a gap in the black-box record, which is a mission violation.
      The finally block provides this guarantee in Python: it fires after try, after any except, after return statements — always.
    final_challenge_prompt: |
      Write safe_read(text) for the telemetry recorder:
      — Initialise log = []
      — try to parse text as int (value = int(text))
      — except ValueError: set value = -1
      — finally: append "done" to log unconditionally
      — return value, log
  mystery:
    title: "The Case File — Always Stamped"
    setup: |
      Every piece of evidence the detective touches must be stamped "processed" in the chain-of-custody log — success or failure doesn't matter. An unstamped document is inadmissible in court.
      Python's finally clause is exactly this: a guarantee that a block of code runs no matter how the try/except resolves. Even if an exception escapes, finally runs before the exception propagates.
    final_challenge_prompt: |
      Write safe_read(text) for the evidence processing system:
      — log = []
      — try to parse int(text) → value
      — except ValueError → value = -1
      — finally: log.append("done")
      — return value, log
