worlds:
  fantasy:
    title: "Inventory Management"
    setup: |
      Your pack needs restocking. "Lists have methods — built-in actions you call
      with a dot," Elara says. ".append() adds an item to the end. len() tells you
      how many items there are. And list[0] retrieves the first item — Python lists
      start counting at zero."

      Add a potion, measure the inventory size, and grab the first item by index.
    final_challenge_prompt: |
      Your bag already has a torch and rope. Append "key" to items. Then store the
      total count in item_count (len()) and store the first item in first_item
      (items[0]).
  scifi:
    title: "Cargo Operations"
    setup: |
      Cargo must be logged precisely. "List methods let you modify lists in place,"
      the AI explains. ".append() adds to the end without creating a new list.
      len() counts items. Index with [0] for the first — lists are zero-indexed."

      Update and query the inventory using the methods you've learned.
    final_challenge_prompt: |
      The cargo hold has a torch and rope. Add "key" to items using append. Store
      len(items) in item_count and items[0] in first_item.
  mystery:
