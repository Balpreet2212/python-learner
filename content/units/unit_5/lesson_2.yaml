title: "return Values"
xp: 12

exercises:
  - type: concept
    code: |
      def add(a, b):
          return a + b

      result = add(3, 4)
      print(result)
    output: "7"
    explanation: "return sends a value back from a function. The caller can store or use it. Without return, functions give back None."

  - type: mcq
    question: "What does this print?"
    code: "def square(n):\n    return n * n\n\nprint(square(5))"
    choices: ["25", "5", "n * n", "None"]
    correct: "25"
    explanation: "square(5) returns 5 * 5 = 25. print() shows that returned value."

  - type: fill_blank
    prompt: "Send the computed value n * 2 back to whoever called this function."
    before: "def double(n):\n    "
    after: " n * 2"
    choices: ["return", "print", "def", "="]
    answer: "return"
    explanation: "return sends the value back to the caller. Without it, the function returns None."

  - type: mcq
    question: "What does this print?"
    code: "def make_greeting(name):\n    return f\"Hello, {name}!\"\n\nmsg = make_greeting(\"Alice\")\nprint(msg)"
    choices: ["Hello, Alice!", "None", "name", "msg"]
    correct: "Hello, Alice!"
    explanation: "The function returns the f-string. It's stored in msg and then printed."

  - type: arrange
    instruction: "Build a function that returns the larger of two numbers"
    blocks: ["def", "max_val", "(", "a", ",", "b", ")", ":", "if", "a", ">", "b", ":", "return", "a", "return", "b"]
    correct: ["def", "max_val", "(", "a", ",", "b", ")", ":", "if", "a", ">", "b", ":", "return", "a", "return", "b"]
    explanation: "If a > b, return a. Otherwise, return b (the fallback after the if)."

  - type: mcq
    question: "What does this print?"
    code: "def nothing():\n    x = 5\n\nresult = nothing()\nprint(result)"
    choices: ["None", "5", "x", "Error"]
    correct: "None"
    explanation: "Functions without return give back None automatically."

  - type: fill_blank
    prompt: "Use the remainder operator to check whether n divides evenly by 2."
    before: "def is_even(n):\n    return n "
    after: " 2 == 0"
    choices: ["%", "//", "/", "**"]
    answer: "%"
    explanation: "n % 2 == 0 is True when n is even. This boolean is returned."

  - type: mcq
    question: "What does this print?"
    code: "def triple(n):\n    return n * 3\n\nprint(triple(triple(2)))"
    choices: ["18", "6", "2", "12"]
    correct: "18"
    explanation: "triple(2) = 6. triple(6) = 18."

  - type: mcq
    question: "What does this print?"
    code: "def clamp(n, low, high):\n    if n < low:\n        return low\n    if n > high:\n        return high\n    return n\n\nprint(clamp(150, 0, 100))"
    choices: ["100", "150", "0", "150"]
    correct: "100"
    explanation: "150 > 100, so the function returns high = 100."

  - type: mini_code
    prompt: "Define a function celsius_to_fahrenheit(c) that returns c * 9/5 + 32.\n\nTested with: celsius_to_fahrenheit(100) → 212.0 and celsius_to_fahrenheit(0) → 32.0."
    starter: ""
    tests:
      - code: "assert celsius_to_fahrenheit(100) == 212.0"
        message: "100°C = 212°F"
      - code: "assert celsius_to_fahrenheit(0) == 32.0"
        message: "0°C = 32°F"

  - type: mini_code
    prompt: "Define a function power(base, exp) that returns base ** exp.\n\nTested with: power(2, 10) → 1024 and power(3, 3) → 27."
    starter: ""
    tests:
      - code: "assert power(2, 10) == 1024"
        message: "2 ** 10 = 1024"
      - code: "assert power(3, 3) == 27"
        message: "3 ** 3 = 27"

worlds:
  fantasy:
    title: "The Amplification Rune"
  scifi:
    title: "Function Output"
  mystery:
    title: "Returning Findings"
