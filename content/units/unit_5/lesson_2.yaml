    - type: fill_blank
      prompt: Use the remainder rune to check whether a potion quantity n divides evenly by 2.
      before: "def is_even(n):\n    return n "
      after: ' 2 == 0'
      choices:
      - '%'
      - //
      - /
      - '**'
      answer: '%'
      explanation: n % 2 == 0 is True when n is even — the potion divides cleanly in two.
      story_before: Elara needs a parity rune inside a recipe that tells her whether a potion quantity splits evenly in two.
      story_after: The remainder rune is set; now the recipe returns True for even quantities and False for odd ones.
    - type: mcq
      question: What does this print?
      code: "def triple(n):\n    return n * 3\n\nprint(triple(triple(2)))"
      choices:
