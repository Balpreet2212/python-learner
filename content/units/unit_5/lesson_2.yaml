    - type: mcq
      question: What does this print?
      code: "def nothing():\n    x = 5\n\nresult = nothing()\nprint(result)"
      choices:
      - None
      - '5'
      - x
      - Error
      correct: None
      explanation: A recipe without return yields nothing — Python gives back None automatically.
      story_before: Theo warns Elara about a recipe that does work but never bottles anything; she must predict what comes
        back.
      story_after: None — Elara learns that every recipe without return yields an empty vial, so she'll always add return
