unit: 4
lesson: 2
xp: 10

example:
  code: |
    tools = ["hammer", "drill"]
    tools.append("saw")
    print(tools)
    print(len(tools))
    print(tools[0])
    print(tools[-1])
  explanation: |
    .append() adds a new item to the end of a list in-place (it changes the original).
    len() counts the total number of items.
    Positive indexes count from the front: [0] is first, [1] is second.
    Negative indexes count from the back: [-1] is always the last item.
  output: "['hammer', 'drill', 'saw']\n3\nhammer\nsaw"

