    setup: |
      New evidence arrives — log it, count it, identify the first item. ".append()
      adds an item to the end of a list," your partner says. "len() counts the items,
      and [0] retrieves the first."

      Append "potion" to inventory, then find item_count and first_item.
    final_challenge_prompt: |
      The evidence locker has a torch and rope. A new key has been found — append
      it to items. Then store the total count in item_count and the first item in
      first_item.
