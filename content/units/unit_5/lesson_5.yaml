title: Functions Calling Functions
xp: 12
exercises:
- type: concept
  code: "def celsius_to_kelvin(c):\n    return c + 273.15\n\ndef is_absolute_zero(c):\n    return celsius_to_kelvin(c) ==\
    \ 0\n\nprint(is_absolute_zero(-273.15))\n"
  output: 'True'
  explanation: Functions can call other functions. This lets you build complex behaviour from simple, tested pieces.
- type: mcq
  question: What does this print?
  code: "def double(n):\n    return n * 2\n\ndef quadruple(n):\n    return double(double(n))\n\nprint(quadruple(3))"
  choices:
  - '12'
  - '6'
  - '24'
  - '9'
  correct: '12'
  explanation: double(3) = 6. double(6) = 12.
- type: fill_blank
  prompt: Call the helper function to square a before adding it to the square of b.
  before: "def square(n):\n    return n * n\n\ndef sum_of_squares(a, b):\n    return "
  after: (a) + square(b)
  choices:
  - square
  - print
  - double
  - int
  answer: square
  explanation: sum_of_squares calls square twice, once for each argument.
- type: mcq
  question: What does this print?
  code: "def add(a, b):\n    return a + b\n\ndef total(x, y, z):\n    return add(add(x, y), z)\n\nprint(total(1, 2, 3))"
  choices:
  - '6'
  - '3'
  - '123'
  - '12'
  correct: '6'
  explanation: add(1, 2) = 3. add(3, 3) = 6.
- type: arrange
  instruction: Build a function hypotenuse(a, b) that uses square and computes the square root
  blocks:
  - def
  - square
  - (
  - n
  - )
  - ':'
  - return
  - n
  - '*'
  - n
  - def
  - hypotenuse
