      explanation: name gets 'Alice' and age gets 25. Master Theo's recipe labels both ingredients correctly.
      story_before: Theo's two-ingredient recipe labels both a name and an age; Elara must trace what it prints.
      story_after: Alice is 25 — both parameters landed correctly, and Elara feels confident handling multi-ingredient recipes.
