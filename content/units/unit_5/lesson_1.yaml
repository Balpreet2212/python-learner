      story_before: Theo loops the squaring recipe over three ingredient potencies and asks Elara to predict the result.
      story_after: 1, 4, 9 — the amplified series confirms that calling the same recipe repeatedly yields consistent magic.
    - type: mcq
      question: What is a parameter in a potion recipe?
      code: ''
      choices:
      - A variable in the function definition that receives a value when called
      - The name of the function
      - The indented code inside a function
      - The value you pass when calling
      correct: A variable in the function definition that receives a value when called
      explanation: In def brew(ingredient), ingredient is the parameter. 'moonpetal' is the argument passed when calling brew('moonpetal').
      story_before: Master Theo quizzes Elara on the precise meaning of the variable inside a recipe's parentheses.
      story_after: Elara answers correctly — a parameter is the placeholder that receives each new ingredient at call time.
    - type: arrange
