      story_after: Ten units appear — Elara realises the parameter is what makes each call to the same recipe different.
    - type: fill_blank
      prompt: Combine two potion ingredients inside the recipe by adding them together.
      before: "def add(a, b):\n    print(a "
      after: ' b)


        add(3, 4)'
      choices:
      - +
      - '='
      - '*'
      - '-'
      answer: +
      explanation: a + b blends the two ingredient amounts. add(3, 4) prints 7 units combined.
      story_before: Two ingredient amounts need combining; Elara must choose the right rune to blend them inside the recipe.
      story_after: Seven combined units pour from the cauldron — the blending rune worked perfectly.
    - type: mcq
      question: What does this print?
      code: "def square(n):\n    print(n * n)\n\nfor i in range(1, 4):\n    square(i)"
      choices:
      - '1

        4

        9'
      - '1

        2

        3'
      - '1

        4

        9

        16'
      - n * n
      correct: '1

        4

        9'
