title: Defining Functions
xp: 12
exercises:
- type: concept
  code: "def greet(name):\n    print(f\"Hello, {name}!\")\n\ngreet(\"Alice\")\ngreet(\"Bob\")\n"
  output: 'Hello, Alice!

    Hello, Bob!'
  explanation: def defines a function. The name in parentheses is a parameter. Call it with different arguments to reuse the
    same code.
- type: mcq
  question: What does this print?
  code: "def say_hi():\n    print(\"Hi!\")\n\nsay_hi()"
  choices:
  - Hi!
  - say_hi
  - def
  - Nothing
  correct: Hi!
  explanation: say_hi() calls the function. The indented block runs.
- type: fill_blank
  prompt: Start a function definition with the correct keyword.
  before: ''
  after: " double(n):\n    print(n * 2)"
  choices:
  - def
  - for
  - if
  - class
  answer: def
  explanation: def starts a function definition. double is the name, n is its parameter.
- type: arrange
  instruction: Build a function that prints 'hello' and then call it
  blocks:
  - def
  - hello
  - (
  - )
  - ':'
  - print
  - (
  - '"hello"'
  - )
  - hello
  - (
  - )
  correct:
  - def
  - hello
  - (
  - )
  - ':'
  - print
  - (
  - '"hello"'
  - )
  - hello
  - (
  - )
  explanation: First define the function with def, then call it by writing its name with ().
- type: mcq
  question: What does this print?
  code: "def show(x):\n    print(x * 2)\n\nshow(5)"
  choices:
  - '10'
  - '5'
  - x * 2
  - Nothing
  correct: '10'
  explanation: show(5) passes 5 as x. x * 2 = 5 * 2 = 10.
- type: fill_blank
  prompt: Add the two parameters together inside the function body.
  before: "def add(a, b):\n    print(a "
  after: ' b)


    add(3, 4)'
  choices:
  - +
  - '='
  - '*'
  - '-'
  answer: +
  explanation: a + b adds the two parameters. add(3, 4) prints 7.
- type: mcq
  question: What does this print?
  code: "def square(n):\n    print(n * n)\n\nfor i in range(1, 4):\n    square(i)"
  choices:
  - '1

    4

    9'
  - '1

    2

    3'
  - '1

    4

    9

    16'
  - n * n
  correct: '1

    4

    9'
  explanation: Calling square with 1, 2, 3 prints 1, 4, 9.
- type: mcq
  question: What is a parameter?
  code: ''
  choices:
  - A variable in the function definition that receives a value when called
  - The name of the function
  - The indented code inside a function
  - The value you pass when calling
  correct: A variable in the function definition that receives a value when called
  explanation: In def greet(name), name is the parameter. 'Alice' is the argument passed when calling greet('Alice').
- type: arrange
  instruction: Call the function describe with the argument 'Python'
  blocks:
  - describe
  - (
  - '"Python"'
  - )
  - def
  - describe
  correct:
  - describe
  - (
  - '"Python"'
  - )
  explanation: Function name followed by () with the argument inside.
- type: mcq
  question: What does this print?
  code: "def intro(name, age):\n    print(f\"{name} is {age}\")\n\nintro(\"Alice\", 25)"
  choices:
  - Alice is 25
  - name is age
  - 25 is Alice
  - intro
  correct: Alice is 25
  explanation: name gets 'Alice' and age gets 25. The f-string combines them.
- type: mini_code
  prompt: Define a function called double that takes a number n and prints n * 2. Call it with 7 and with 3.
  starter: ''
  tests:
  - code: assert '14' in _stdout
    message: double(7) should print 14
  - code: assert '6' in _stdout
    message: double(3) should print 6
- type: mini_code
  prompt: Define a function called greet that takes a name and prints 'Hello, [name]!'. Call it with 'World' and with 'Alice'.
  starter: ''
  tests:
  - code: assert 'Hello, World!' in _stdout
    message: Should print 'Hello, World!'
  - code: assert 'Hello, Alice!' in _stdout
    message: Should print 'Hello, Alice!'
