      story_after: The recipe fires with 'Python' as its ingredient — calling a function is as simple as name plus parentheses.
    - type: mcq
      question: What does this print?
      code: "def intro(name, age):\n    print(f\"{name} is {age}\")\n\nintro(\"Alice\", 25)"
      choices:
      - Alice is 25
