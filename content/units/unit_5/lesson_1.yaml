        )\n"
      output: 'Adding moonpetal to the cauldron!

        Adding dragonroot to the cauldron!'
      explanation: def defines a potion recipe. The ingredient in parentheses is a parameter. Call brew() with different ingredients
        to reuse the same recipe steps.
      story_before: Master Theo shows Elara that instead of rewriting the same potion step each time, she can define a reusable
        brew recipe.
      story_after: Elara sees the cauldron respond to the same recipe called twice — the magic is real, and it's repeatable.
    - type: mcq
      question: What does this print?
      code: "def mix():\n    print(\"Stirring the brew!\")\n\nmix()"
      choices:
      - Stirring the brew!
