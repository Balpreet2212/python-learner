      code: "def bmi(weight, height):\n    return weight / (height ** 2)\n\nprint(round(bmi(70, 1.75), 1))"
      choices:
      - '22.9'
      - '40.0'
      - '35.0'
      - '1.75'
      correct: '22.9'
      explanation: 70 / (1.75²) ≈ 22.857, rounded to 22.9 — Cole uses this formula to model suspect physical profiles.
      story_before: Cole uses a two-parameter physical-profile tool to model a suspect's build and predicts the rounded result.
      story_after: 22.9 — the tool handled both parameters and returned the profile metric Cole needed for the case file.
