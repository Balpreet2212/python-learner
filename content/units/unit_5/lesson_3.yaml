worlds:
  fantasy:
    title: "The Alchemist's Double-or-Nothing Reagent"
    setup: |
      The royal alchemist has a strict rule: if you can read the measurement on the vial, you must use double the amount (the second step amplifies the first). But if the label is smudged and unreadable, use nothing — zero — and move on.
      Python's try/except/else maps perfectly to this: try the reading, except catches a bad label and returns 0, and the else block — which only runs when the reading succeeded — applies the doubling logic.
    final_challenge_prompt: |
      Write parse_and_double(text) for the alchemist's measuring tool:
      — If text is a valid integer, return that integer multiplied by 2 (in the else block)
      — If ValueError is raised, return 0
  scifi:
    title: "Sensor Amplification with Safe Parsing"
    setup: |
      The Meridian's amplifier circuit takes a raw sensor reading, parses it as an integer, and doubles the signal for long-range transmission. If the input is corrupted, the amplifier must return zero rather than broadcast garbage.
      try/except/else makes the success path and the error path explicit: the else block only executes when the try block completes without raising an exception.
    final_challenge_prompt: |
      Write parse_and_double(text) for the amplifier module:
      — On success: parse text as int, then return it doubled (in the else block)
      — On ValueError: return 0
  mystery:
    title: "The Witness Statement Amplifier"
    setup: |
      The detective's interview protocol doubles a witness's reliability score when they give a valid numeric rating. If a witness just shrugs and gives a non-numeric answer, the score is recorded as zero.
      The else clause in try/except/else is ideal here: it runs only when parsing succeeded, making the success logic unmistakably clear and the fallback equally obvious.
    final_challenge_prompt: |
      Write parse_and_double(text) for the witness scoring system:
      — Parse text as an integer; if successful, return it * 2 using the else clause
      — Return 0 on ValueError
