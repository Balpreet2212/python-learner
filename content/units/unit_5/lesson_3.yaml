    - type: break_fix
      story_before: Cole's suspect-description tool expects a name first and a threat level second, but the arguments are
        swapped and the precinct terminal throws an error when it tries to build the profile.
      story_after: Arguments corrected, 'hero is level 5' prints cleanly and the suspect profile is filed successfully.
      prompt: Fix the call so the name comes first and the level comes second, printing 'hero is level 5'.
      broken_code: "def describe(name, level):\n    print(name + \" is level \" + str(level))\n\ndescribe(5, \"hero\")"
      hint: Look at the order of the arguments in the call — name should come before level.
      explanation: describe(5, "hero") passes 5 as name and "hero" as level, causing a TypeError when str(level) is concatenated.
        Swapping to describe("hero", 5) puts name and level in the correct positions and prints 'hero is level 5'.
      tests:
      - code: assert _stdout.strip() == 'hero is level 5'
        message: Should print hero is level 5
