      output: '20

        18'
      explanation: Recipes can take multiple ingredients as parameters, and Master Theo can chain recipes — each doing one
        clear magical job.
      story_before: Master Theo shows Elara that a recipe can accept more than one ingredient, and that two recipes can work
        side-by-side on the same brew.
      story_after: 20 and 18 — strength and cost both computed from one pair of ingredients, with each recipe doing exactly
        one job.
    - type: mcq
