title: "Multiple Parameters and Using Functions Together"
xp: 12

exercises:
  - type: concept
    code: |
      def area(width, height):
          return width * height

      def perimeter(width, height):
          return 2 * (width + height)

      print(area(4, 5))
      print(perimeter(4, 5))
    output: "20\n18"
    explanation: "Functions can have multiple parameters and you can call multiple functions, each doing one clear job."

  - type: mcq
    question: "What does this print?"
    code: "def multiply(a, b, c):\n    return a * b * c\n\nprint(multiply(2, 3, 4))"
    choices: ["24", "9", "234", "6"]
    correct: "24"
    explanation: "2 * 3 * 4 = 24."

  - type: fill_blank
    prompt: "Combine the first name, a space, and the last name into one string."
    before: "def full_name(first, last):\n    return first "
    after: " \" \" + last"
    choices: ["+", "-", "*", "/"]
    answer: "+"
    explanation: "String concatenation joins first, a space, and last."

  - type: mcq
    question: "What does this print?"
    code: "def greet(name, greeting=\"Hello\"):\n    return f\"{greeting}, {name}!\"\n\nprint(greet(\"Alice\"))"
    choices: ["Hello, Alice!", "greeting, name!", "Alice, Hello!", "Error"]
    correct: "Hello, Alice!"
    explanation: "greeting has a default value 'Hello'. It's used when not provided."

  - type: arrange
    instruction: "Build a function tax(price, rate) that returns price * rate / 100"
    blocks: ["def", "tax", "(", "price", ",", "rate", ")", ":", "return", "price", "*", "rate", "/", "100"]
    correct: ["def", "tax", "(", "price", ",", "rate", ")", ":", "return", "price", "*", "rate", "/", "100"]
    explanation: "Two parameters, one return expression."

  - type: mcq
    question: "What does this print?"
    code: "def double(n):\n    return n * 2\n\ndef triple(n):\n    return n * 3\n\nprint(double(triple(4)))"
    choices: ["24", "12", "8", "18"]
    correct: "24"
    explanation: "triple(4) = 12. double(12) = 24."

  - type: fill_blank
    prompt: "Multiply price by pct/100 to calculate how much to subtract as a discount."
    before: "def discount(price, pct):\n    return price - (price "
    after: " pct / 100)"
    choices: ["*", "+", "-", "/"]
    answer: "*"
    explanation: "price * pct / 100 calculates the discount amount."

  - type: mcq
    question: "What does this print?"
    code: "def add(a, b=10):\n    return a + b\n\nprint(add(5))\nprint(add(5, 20))"
    choices: ["15\n25", "5\n5", "15\n10", "Error"]
    correct: "15\n25"
    explanation: "add(5) uses default b=10: 5+10=15. add(5,20) overrides to b=20: 5+20=25."

  - type: mcq
    question: "What does this print?"
    code: "def bmi(weight, height):\n    return weight / (height ** 2)\n\nprint(round(bmi(70, 1.75), 1))"
    choices: ["22.9", "40.0", "35.0", "1.75"]
    correct: "22.9"
    explanation: "70 / (1.75²) = 70 / 3.0625 ≈ 22.857, rounded to 22.9."

  - type: mini_code
    prompt: "Define max_of_three(a, b, c) that returns the largest of three numbers.\n\nTested with: max_of_three(4, 9, 2) → 9 and max_of_three(1, 1, 5) → 5."
    starter: ""
    tests:
      - code: "assert max_of_three(4, 9, 2) == 9"
        message: "max_of_three(4, 9, 2) should return 9"
      - code: "assert max_of_three(1, 1, 5) == 5"
        message: "max_of_three(1, 1, 5) should return 5"

  - type: mini_code
    prompt: "Define celsius_to_fahrenheit(c) and fahrenheit_to_celsius(f).\n\nTested with: celsius_to_fahrenheit(0) → 32.0 and fahrenheit_to_celsius(212) → 100.0."
    starter: ""
    tests:
      - code: "assert celsius_to_fahrenheit(0) == 32.0"
        message: "0°C = 32.0°F"
      - code: "assert fahrenheit_to_celsius(212) == 100.0"
        message: "212°F = 100.0°C"

worlds:
  fantasy:
    title: "The Combining Spell"
  scifi:
    title: "Module Chaining"
  mystery:
    title: "Combined Evidence"
