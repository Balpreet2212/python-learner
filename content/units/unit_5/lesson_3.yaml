unit: 5
lesson: 3
xp: 10

example:
  code: |
    def read_score(text):
        try:
            score = int(text)
        except ValueError:
            return 0
        else:
            return score * 2

    print(read_score("5"))
    print(read_score("bad"))
  explanation: |
    The else clause runs only when the try block succeeds — no exception was raised.
    Here: if int(text) works, the else block doubles the score. If it raises ValueError, the except block returns 0 immediately.
    Use else when you have follow-up logic that should only run on success, keeping it clearly separate from the error path.
  output: "10\n0"

