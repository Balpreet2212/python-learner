title: "Methods"
xp: 12

exercises:
  - type: concept
    code: |
      class Lamp:
          def __init__(self, brightness):
              self.brightness = brightness

          def is_bright(self):
              return self.brightness >= 50

          def describe(self):
              return f"Lamp at {self.brightness}%"

      desk = Lamp(70)
      print(desk.is_bright())
      print(desk.describe())
    output: "True\nLamp at 70%"
    explanation: "Methods are functions inside a class. They always take self as their first parameter to access the object's attributes."

  - type: mcq
    question: "What does this print?"
    code: "class Dog:\n    def __init__(self, name):\n        self.name = name\n    def bark(self):\n        return self.name + ' says Woof!'\n\nd = Dog('Rex')\nprint(d.bark())"
    choices: ["Rex says Woof!", "Woof!", "name says Woof!", "self.name"]
    correct: "Rex says Woof!"
    explanation: "bark() returns self.name + ' says Woof!'. self.name is 'Rex'."

  - type: fill_blank
    prompt: "Use the stored radius attribute in the area calculation."
    before: "class Circle:\n    def __init__(self, radius):\n        self.radius = radius\n    def area(self):\n        return 3.14 * self."
    after: " ** 2\n\nc = Circle(5)\nprint(c.area())"
    choices: ["radius", "area", "self", "r"]
    answer: "radius"
    explanation: "self.radius accesses the radius attribute. area = 3.14 * 5² = 78.5."

  - type: mcq
    question: "What does this print?"
    code: "class Counter:\n    def __init__(self):\n        self.count = 0\n    def value(self):\n        return self.count\n\nc = Counter()\nprint(c.value())"
    choices: ["0", "None", "count", "self.count"]
    correct: "0"
    explanation: "count starts at 0 in __init__. value() returns self.count which is 0."

  - type: arrange
    instruction: "Add a method greet() to Person that returns 'Hi, I am [name]'"
    blocks: ["class", "Person", ":", "def", "__init__", "(", "self", ",", "name", ")", ":", "self", ".", "name", "=", "name", "def", "greet", "(", "self", ")", ":", "return", "f\"Hi, I am {self.name}\"", "p", "=", "Person", "(", "\"Alice\"", ")", "print", "(", "p", ".", "greet", "(", ")", ")"]
    correct: ["class", "Person", ":", "def", "__init__", "(", "self", ",", "name", ")", ":", "self", ".", "name", "=", "name", "def", "greet", "(", "self", ")", ":", "return", "f\"Hi, I am {self.name}\"", "p", "=", "Person", "(", "\"Alice\"", ")", "print", "(", "p", ".", "greet", "(", ")", ")"]
    explanation: "Define greet with (self) parameter, return an f-string using self.name. Call with p.greet()."

  - type: mcq
    question: "What does this print?"
    code: "class Rectangle:\n    def __init__(self, w, h):\n        self.w = w\n        self.h = h\n    def area(self):\n        return self.w * self.h\n\nr = Rectangle(4, 5)\nprint(r.area())"
    choices: ["20", "9", "4", "5"]
    correct: "20"
    explanation: "area() returns self.w * self.h = 4 * 5 = 20."

  - type: fill_blank
    prompt: "Complete the Fahrenheit formula: multiply by 9/5 then add 32."
    before: "class Thermometer:\n    def __init__(self, celsius):\n        self.celsius = celsius\n    def to_fahrenheit(self):\n        return self.celsius * 9/5 "
    after: " 32\n\nt = Thermometer(100)\nprint(t.to_fahrenheit())"
    choices: ["+", "-", "*", "/"]
    answer: "+"
    explanation: "Fahrenheit = Celsius * 9/5 + 32. 100°C = 212°F."

  - type: mcq
    question: "What does this print?"
    code: "class Password:\n    def __init__(self, pw):\n        self.pw = pw\n    def is_strong(self):\n        return len(self.pw) >= 8\n\np = Password('abc123')\nprint(p.is_strong())"
    choices: ["False", "True", "6", "8"]
    correct: "False"
    explanation: "'abc123' has 6 characters. len >= 8 is False."

  - type: mcq
    question: "What does this print?"
    code: "class Box:\n    def __init__(self, l, w, h):\n        self.l = l; self.w = w; self.h = h\n    def volume(self):\n        return self.l * self.w * self.h\n\nb = Box(2, 3, 4)\nprint(b.volume())"
    choices: ["24", "9", "6", "12"]
    correct: "24"
    explanation: "volume = 2 * 3 * 4 = 24."

  - type: mini_code
    prompt: "Define a class Triangle with base and height. Add a method area() that returns 0.5 * base * height."
    starter: ""
    tests:
      - code: "assert Triangle(6, 4).area() == 12.0"
        message: "Triangle(6, 4).area() should return 12.0"
      - code: "assert Triangle(10, 3).area() == 15.0"
        message: "Triangle(10, 3).area() should return 15.0"

  - type: mini_code
    prompt: "Define a class BankAccount with a balance attribute. Add a method is_overdrawn() that returns True if balance is below 0, False otherwise."
    starter: ""
    tests:
      - code: "assert BankAccount(50).is_overdrawn() == False"
        message: "balance=50 is not overdrawn"
      - code: "assert BankAccount(-10).is_overdrawn() == True"
        message: "balance=-10 is overdrawn"

