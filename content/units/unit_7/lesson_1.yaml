    - type: break_fix
      story_before: Cole programs a Suspect profile class so each person of interest can state their own name, but the first
        test call throws a NameError straight back at him.
      story_after: Cole fixes the attribute reference with self.name and the suspect profile prints without error.
      prompt: Cole's Creature class sets up name in __init__ correctly, but describe() crashes. Spot where self. is missing
        and add it so the profile can announce itself.
      broken_code: "class Creature:\n    def __init__(self, name):\n        self.name = name\n    def describe(self):\n  \
        \      print(\"Creature: \" + name)\n\nc = Creature(\"Dragon\")\nc.describe()"
      hint: Inside a method, instance attributes must be accessed through self, not as bare variable names.
      explanation: describe() writes name instead of self.name. Because name is not a local variable inside the method, Python
        raises a NameError. Prefixing it with self. resolves the lookup to the instance attribute set in __init__.
      tests:
      - code: 'assert _stdout.strip() == ''Creature: Dragon'''
        message: 'describe() should print ''Creature: Dragon'''
