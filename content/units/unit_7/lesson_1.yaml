title: Classes and Attributes
xp: 12
exercises:
- type: concept
  code: "class Dog:\n    def __init__(self, name, age):\n        self.name = name\n        self.age = age\n\nrex = Dog(\"\
    Rex\", 4)\nprint(rex.name)\nprint(rex.age)\n"
  output: 'Rex

    4'
  explanation: class defines a blueprint. __init__ runs automatically when you create an instance. self.name stores the value
    as an attribute on the object.
- type: mcq
  question: What does this print?
  code: "class Car:\n    def __init__(self, brand):\n        self.brand = brand\n\nc = Car('Toyota')\nprint(c.brand)"
  choices:
  - Toyota
  - brand
  - Car
  - self
  correct: Toyota
  explanation: Car('Toyota') creates an instance. c.brand reads the stored attribute.
