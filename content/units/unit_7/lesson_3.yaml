      code: "class Battery:\n    def __init__(self, charge):\n        self.charge = charge\n\n    def drain(self, amount):\n\
        \        self.charge -= amount\n        if self.charge < 0:\n            self.charge = 0\n\nb = Battery(100)\nb.drain(30)\n\
        print(b.charge)\nb.drain(80)\nprint(b.charge)\n"
      output: '70

        0'
      explanation: Cole drains a suspect's credibility. Methods modify self attributes permanently. The second drain clamps
        to 0 when credibility is exhausted.
      story_before: Cole's profiles can describe suspects, but the case needs records that change as new information arrives
        — like a credibility score that drains under interrogation.
      story_after: The Battery drains and clamps at zero; Cole sees that each method call permanently alters the object's
        stored value, just as evidence shifts a suspect's standing.
    - type: mcq
      question: The evidence counter is updated twice. What does this print?
      code: "class Counter:\n    def __init__(self):\n        self.count = 0\n    def increment(self):\n        self.count\
        \ += 1\n\nc = Counter()\nc.increment()\nc.increment()\nprint(c.count)"
      choices:
      - '2'
      - '0'
      - '1'
      - None
      correct: '2'
      explanation: increment() adds 1 each call. After two calls, count = 2.
      story_before: The evidence counter is updated twice as new items are logged — Cole must predict the final tally.
      story_after: Count reaches 2; Cole confirms that each increment() builds on the live state of the object.
    - type: fill_blank
      prompt: Deduct the hours from the suspect's alibi window.
      before: "class Wallet:\n    def __init__(self, balance):\n        self.balance = balance\n    def spend(self, amount):\n\
        \        self.balance "
      after: ' amount


        w = Wallet(100)

        w.spend(30)

        print(w.balance)'
      choices:
      - -=
      - +=
      - '='
      - '*='
      answer: -=
      explanation: -= subtracts the hours. 100 - 30 = 70 hours remaining in the alibi.
      story_before: A suspect's alibi window needs a spend() method that deducts hours — Cole must choose the right operator.
      story_after: With -= in place, the alibi window narrows correctly as each hour is accounted for.
    - type: mcq
      question: Cole pushes two clues onto the evidence stack. What does this print?
      code: "class Stack:\n    def __init__(self):\n        self.items = []\n    def push(self, x):\n        self.items.append(x)\n\
        \ns = Stack()\ns.push(1)\ns.push(2)\nprint(s.items)"
      choices:
      - '[1, 2]'
      - '[2, 1]'
      - '[]'
      - '1

        2'
      correct: '[1, 2]'
      explanation: push appends to self.items. After two pushes, items = [1, 2].
      story_before: Cole pushes two clues onto the evidence stack — the order matters, so he checks the final contents.
      story_after: Both clues appear in order [1, 2]; Cole confirms the stack preserves the sequence in which evidence was
        filed.
