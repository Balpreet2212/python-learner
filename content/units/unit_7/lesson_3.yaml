    - type: mcq
      question: A case-open indicator is toggled twice. What does this print?
      code: "class Light:\n    def __init__(self):\n        self.on = False\n    def toggle(self):\n        self.on = not\
        \ self.on\n\nl = Light()\nl.toggle()\nl.toggle()\nprint(l.on)"
      choices:
      - 'False'
      - 'True'
      - None
      - '0'
      correct: 'False'
      explanation: toggle flips self.on. False → True → False. Two toggles return to start.
      story_before: A case-open indicator is toggled on then off — Cole must determine its final state.
      story_after: The indicator returns to False after two toggles; Cole notes that reversible state changes can be tracked
        precisely.
    - type: fill_blank
      prompt: Add a new clue to the end of the case file's evidence list.
      before: "class Queue:\n    def __init__(self):\n        self.items = []\n    def enqueue(self, x):\n        self.items."
      after: '(x)


        q = Queue()

        q.enqueue(''a'')

        print(q.items)'
      choices:
      - append
      - pop
      - remove
      - insert
      answer: append
      explanation: append adds to the end of the evidence list. items = ['a'].
      story_before: The evidence queue needs a method that appends new clues — Cole must choose the right list operation.
      story_after: append adds the clue to the end; the evidence queue grows in the order items were discovered.
    - type: mcq
      question: Cole adds then spends from an informant fund. What does this print?
      code: "class Tank:\n    def __init__(self, fuel):\n        self.fuel = fuel\n    def refuel(self, amount):\n       \
        \ self.fuel += amount\n    def use(self, amount):\n        self.fuel -= amount\n\nt = Tank(50)\nt.refuel(30)\nt.use(20)\n\
        print(t.fuel)"
      choices:
      - '60'
      - '50'
      - '80'
      - '30'
      correct: '60'
      explanation: 50 + 30 = 80, then 80 - 20 = 60.
      story_before: Cole adds to then draws from the informant fund — he must trace the final balance.
      story_after: The fund settles at 60; Cole follows 50 + 30 = 80, then 80 - 20 = 60 in the ledger.
    - type: mcq
      question: A case score tracker adds then resets. What does this print?
      code: "class Score:\n    def __init__(self):\n        self.points = 0\n    def add(self, n):\n        self.points +=\
        \ n\n    def reset(self):\n        self.points = 0\n\ns = Score()\ns.add(10)\ns.add(5)\ns.reset()\nprint(s.points)"
      choices:
      - '0'
      - '15'
      - '10'
      - '5'
      correct: '0'
      explanation: reset() sets points back to 0 regardless of previous value.
      story_before: A case score tracker accumulates leads then resets when the case is closed — Cole must predict the final
        value.
      story_after: Zero prints after reset(); Cole notes that resetting a score object clears all accumulated state in one
        call.
    - type: mini_code
      prompt: Define a class called Timer with a seconds attribute (start at 0). Add a tick() method that adds 1. Tick 5 times
        and print seconds.
      starter: ''
      tests:
      - code: t = Timer(); [t.tick() for _ in range(5)]; t.seconds == 5
        message: 5 ticks should give seconds = 5
      - code: _stdout.strip() == '5'
        message: Should print 5
      story_before: Cole needs a Timer to track interrogation length — a seconds attribute and a tick() method adding 1 are
        required.
      story_after: Five ticks land at seconds = 5; the interrogation timer is calibrated and running.
    - type: mini_code
      prompt: Define a class called Inventory with an items list. Add add_item(item) and remove_item(item) methods. Add 'sword'
        and 'shield', remove 'sword', print the list.
      starter: ''
      tests:
      - code: inv = Inventory(); inv.add_item('x'); 'x' in inv.items
        message: add_item should add to the list
      - code: inv2 = Inventory(); inv2.add_item('a'); inv2.remove_item('a'); 'a' not in inv2.items
        message: remove_item should remove from the list
      - code: '"[''shield'']" in _stdout or _stdout.strip() == "[''shield'']"'
        message: Should print ['shield']
      story_before: The case file needs add_item and remove_item methods to manage evidence — 'sword' must be removable, leaving
        'shield'.
      story_after: 'The evidence list updates cleanly: sword gone, shield on record; Cole''s mutable case file is ready for
        Lesson 4.'
