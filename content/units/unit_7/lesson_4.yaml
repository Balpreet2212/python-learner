worlds:
  fantasy:
    title: "Two Warriors, One Blueprint"
    setup: |
      The Hall of Heroes houses hundreds of warriors — each unique, each forged from the same Warrior blueprint. Thor carries a thunder hammer and 95 power. Loki relies on cunning and 60 power. They share the same class definition but are completely independent objects.
      Every call to Warrior(...) produces a fresh instance with its own attribute values stored in its own memory. Modifying warrior_1.power does not touch warrior_2 at all — they are entirely separate.
    final_challenge_prompt: |
      Write the Warrior class and create two distinct warriors:
      — class Warrior with __init__(self, name, power) storing both attributes
      — warrior_1 = Warrior("Thor", 95)
      — warrior_2 = Warrior("Loki", 60)
  scifi:
    title: "Two Ship Units, One Blueprint"
    setup: |
      The Meridian carries two fighter drones: Vanguard (power 95) and Shadow (power 60). They run identical firmware — the same class — but each drone has its own onboard state. If Vanguard takes damage, Shadow's power reading is unchanged.
      This is the key insight about multiple instances: one class, many independent objects, each with its own attribute values.
    final_challenge_prompt: |
      Define a Warrior class (models a drone unit) and create two instances:
      — __init__(self, name, power) stores both attributes
      — warrior_1 = Warrior("Thor", 95)
      — warrior_2 = Warrior("Loki", 60)
  mystery:
    title: "Two Suspects, One Template"
    setup: |
      The detective's profiling template is applied to every suspect: record their name and threat level (power). Two suspects are in the files — Thor (threat 95) and Loki (threat 60). They share a template but are separate cases; updating one record does not alter the other.
      Multiple instances is the Python way to model a collection of similar-but-distinct real-world entities.
    final_challenge_prompt: |
      Create the profiling class and two suspect objects:
      — class Warrior with __init__(self, name, power)
      — warrior_1 = Warrior("Thor", 95)
      — warrior_2 = Warrior("Loki", 60)
