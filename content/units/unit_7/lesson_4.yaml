      code: "class Car:\n    def __init__(self, brand, speed):\n        self.brand = brand\n        self.speed = speed\n\n\
        cars = [Car('Toyota', 120), Car('BMW', 180), Car('Ford', 150)]\nfor c in cars:\n    print(c.brand)"
      choices:
      - 'Toyota

        BMW

        Ford'
      - '120

        180

        150'
      - 'Car

        Car

        Car'
      - Toyota BMW Ford
      correct: 'Toyota

        BMW

        Ford'
      explanation: The loop iterates over the list of Car objects, printing each brand.
    - type: mcq
      question: Two evidence bags — only one is filled. What does this print?
      code: "class Jar:\n    def __init__(self, capacity):\n        self.capacity = capacity\n        self.filled = 0\n  \
        \  def fill(self, amount):\n        self.filled += amount\n\nj1 = Jar(10)\nj2 = Jar(10)\nj1.fill(5)\nprint(j1.filled)\n\
        print(j2.filled)"
      choices:
      - '5

        0'
      - '5

        5'
      - '0

        5'
      - '10

        10'
      correct: '5

        0'
      explanation: j1.fill(5) only changes j1.filled. j2 is untouched.
