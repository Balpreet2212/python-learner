title: Multiple Instances
xp: 12
exercises:
- type: concept
  code: "class Coin:\n    def __init__(self, denomination):\n        self.denomination = denomination\n\npenny = Coin(1)\n\
    quarter = Coin(25)\nloonie = Coin(100)\n\nprint(penny.denomination)\nprint(quarter.denomination)\nprint(loonie.denomination)\n"
  output: '1

    25

    100'
  explanation: Every call to Coin() creates a completely separate object with its own attributes. Changing one instance does
    not affect any other.
- type: mcq
  question: What does this print?
  code: "class Box:\n    def __init__(self, size):\n        self.size = size\n\na = Box(10)\nb = Box(20)\nprint(a.size + b.size)"
  choices:
  - '30'
  - '10'
  - '20'
  - '1020'
  correct: '30'
  explanation: a.size = 10, b.size = 20. 10 + 20 = 30.
- type: fill_blank
  prompt: Read the hp from Alice's instance specifically.
