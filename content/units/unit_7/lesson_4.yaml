- type: mcq
  question: What does this print?
  code: "class Counter:\n    def __init__(self):\n        self.n = 0\n    def inc(self):\n        self.n += 1\n\na = Counter()\n\
    b = Counter()\na.inc()\na.inc()\nb.inc()\nprint(a.n)\nprint(b.n)"
  choices:
  - '2

