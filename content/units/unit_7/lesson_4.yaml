unit: 6
lesson: 4
xp: 10

example:
  code: |
    class Coin:
        def __init__(self, denomination):
            self.denomination = denomination

    penny  = Coin(1)
    quarter = Coin(25)
    loonie  = Coin(100)

    print(penny.denomination)
    print(quarter.denomination)
    print(loonie.denomination)
  explanation: |
    Every time you call Coin(...) you create a completely independent object with its own attribute values.
    penny, quarter, and loonie are three separate instances — changing one does not affect the others.
    A class is a factory: one blueprint, unlimited distinct objects.
  output: "1\n25\n100"

code_starter: |
  class Warrior:
      def __init__(self, name, power):
          self.___ = ___
          self.___ = ___

  warrior_1 = Warrior(___, ___)
  warrior_2 = Warrior(___, ___)
hints:
  - "self.name = name; self.power = power"
  - "warrior_1 = Warrior(\"Thor\", 95)"
  - "warrior_2 = Warrior(\"Loki\", 60)"

tests:
  - code: "assert warrior_1.name == 'Thor' and warrior_1.power == 95"
    message: "warrior_1 is Thor with power 95"
  - code: "assert warrior_2.name == 'Loki' and warrior_2.power == 60"
    message: "warrior_2 is Loki with power 60"
  - code: "assert warrior_1 is not warrior_2, 'They must be separate objects'"
    message: "warrior_1 and warrior_2 are distinct objects"

