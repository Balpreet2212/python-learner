title: "Multiple Instances"
xp: 12

exercises:
  - type: concept
    code: |
      class Coin:
          def __init__(self, denomination):
              self.denomination = denomination

      penny = Coin(1)
      quarter = Coin(25)
      loonie = Coin(100)

      print(penny.denomination)
      print(quarter.denomination)
      print(loonie.denomination)
    output: "1\n25\n100"
    explanation: "Every call to Coin() creates a completely separate object with its own attributes. Changing one instance does not affect any other."

  - type: mcq
    question: "What does this print?"
    code: "class Box:\n    def __init__(self, size):\n        self.size = size\n\na = Box(10)\nb = Box(20)\nprint(a.size + b.size)"
    choices: ["30", "10", "20", "1020"]
    correct: "30"
    explanation: "a.size = 10, b.size = 20. 10 + 20 = 30."

  - type: fill_blank
    prompt: "Read the hp from Alice's instance specifically."
    before: "class Player:\n    def __init__(self, name, hp):\n        self.name = name\n        self.hp = hp\n\np1 = Player('Alice', 100)\np2 = Player('Bob', 80)\nprint("
    after: ".hp)"
    choices: ["p1", "p2", "Player", "self"]
    answer: "p1"
    explanation: "p1.hp accesses Alice's hp, which is 100."

  - type: mcq
    question: "What does this print?"
    code: "class Dog:\n    def __init__(self, name):\n        self.name = name\n\nd1 = Dog('Rex')\nd2 = Dog('Bella')\nd1.name = 'Max'\nprint(d1.name)\nprint(d2.name)"
    choices: ["Max\nBella", "Rex\nBella", "Max\nMax", "Rex\nRex"]
    correct: "Max\nBella"
    explanation: "Changing d1.name only affects d1. d2.name stays 'Bella'."

  - type: arrange
    instruction: "Create two Lamp instances with different brightness and print which is brighter"
    blocks: ["class", "Lamp", ":", "def", "__init__", "(", "self", ",", "brightness", ")", ":", "self", ".", "brightness", "=", "brightness", "l1", "=", "Lamp", "(", "80", ")", "l2", "=", "Lamp", "(", "40", ")", "print", "(", "l1", ".", "brightness", ">", "l2", ".", "brightness", ")"]
    correct: ["class", "Lamp", ":", "def", "__init__", "(", "self", ",", "brightness", ")", ":", "self", ".", "brightness", "=", "brightness", "l1", "=", "Lamp", "(", "80", ")", "l2", "=", "Lamp", "(", "40", ")", "print", "(", "l1", ".", "brightness", ">", "l2", ".", "brightness", ")"]
    explanation: "l1.brightness = 80, l2.brightness = 40. 80 > 40 is True."

  - type: mcq
    question: "What does this print?"
    code: "class Counter:\n    def __init__(self):\n        self.n = 0\n    def inc(self):\n        self.n += 1\n\na = Counter()\nb = Counter()\na.inc()\na.inc()\nb.inc()\nprint(a.n)\nprint(b.n)"
    choices: ["2\n1", "3\n3", "2\n2", "1\n1"]
    correct: "2\n1"
    explanation: "a.inc() called twice: a.n = 2. b.inc() called once: b.n = 1. Independent objects."

  - type: fill_blank
    prompt: "Compare whether s1 has more points than s2."
    before: "class Score:\n    def __init__(self, points):\n        self.points = points\n\ns1 = Score(90)\ns2 = Score(75)\nprint(s1.points "
    after: " s2.points)"
    choices: [">", "<", "+", "=="]
    answer: ">"
    explanation: "s1.points > s2.points checks if 90 > 75, which is True."

  - type: mcq
    question: "What does this print?"
    code: "class Car:\n    def __init__(self, brand, speed):\n        self.brand = brand\n        self.speed = speed\n\ncars = [Car('Toyota', 120), Car('BMW', 180), Car('Ford', 150)]\nfor c in cars:\n    print(c.brand)"
    choices: ["Toyota\nBMW\nFord", "120\n180\n150", "Car\nCar\nCar", "Toyota BMW Ford"]
    correct: "Toyota\nBMW\nFord"
    explanation: "The loop iterates over the list of Car objects, printing each one's brand."

  - type: mcq
    question: "What does this print?"
    code: "class Jar:\n    def __init__(self, capacity):\n        self.capacity = capacity\n        self.filled = 0\n    def fill(self, amount):\n        self.filled += amount\n\nj1 = Jar(10)\nj2 = Jar(10)\nj1.fill(5)\nprint(j1.filled)\nprint(j2.filled)"
    choices: ["5\n0", "5\n5", "0\n5", "10\n10"]
    correct: "5\n0"
    explanation: "j1.fill(5) only changes j1.filled. j2 is untouched."

  - type: mini_code
    prompt: "Create a class called Dice with a sides attribute. Add a roll() method that returns a random number from 1 to sides. Create a 6-sided and 20-sided die. Print one roll of each."
    starter: "import random"
    tests:
      - code: "d6 = Dice(6); 1 <= d6.roll() <= 6"
        message: "6-sided die should roll 1-6"
      - code: "d20 = Dice(20); 1 <= d20.roll() <= 20"
        message: "20-sided die should roll 1-20"

  - type: mini_code
    prompt: "Create 3 Student instances with different names and grades. Print the name of the student with the highest grade."
    starter: ""
    tests:
      - code: "s = Student('Test', 95); s.name == 'Test' and s.grade == 95"
        message: "Student class needs name and grade attributes"

worlds:
  fantasy:
    title: "Summoning Many Familiars"
  scifi:
    title: "Deploying Multiple Units"
  mystery:
    title: "Multiple Witnesses"
