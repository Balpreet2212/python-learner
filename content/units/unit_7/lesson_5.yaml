- type: concept
  code: "class Animal:\n    def __init__(self, name):\n        self.name = name\n\n    def speak(self):\n        return \"\
    ...\"\n\nclass Cat(Animal):\n    def speak(self):\n        return \"Meow\"\n\nclass Dog(Animal):\n    def speak(self):\n\
    \        return \"Woof\"\n\nc = Cat(\"Whiskers\")\nd = Dog(\"Rex\")\nprint(c.name)\nprint(c.speak())\nprint(d.speak())\n"
  output: 'Whiskers

    Meow

    Woof'
  explanation: class Child(Parent) inherits all attributes and methods. The child can override methods to change behaviour.
    self.name comes from Animal.__init__.
- type: mcq
  question: What does this print?
  code: "class Vehicle:\n    def __init__(self, speed):\n        self.speed = speed\n\nclass Car(Vehicle):\n    pass\n\nc\
    \ = Car(120)\nprint(c.speed)"
  choices:
  - '120'
  - speed
  - None
  - Error
  correct: '120'
  explanation: Car inherits Vehicle's __init__. c.speed = 120.
