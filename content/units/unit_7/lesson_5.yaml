- type: mcq
  question: What is the main benefit of inheritance?
  code: ''
  choices:
  - You can reuse attributes and methods from a parent class without repeating code
  - It makes programs run faster
  - It is required for all Python classes
  - It lets you skip writing __init__
  correct: You can reuse attributes and methods from a parent class without repeating code
  explanation: Inheritance lets child classes share a parent's logic and only override what's different.
- type: mini_code
  prompt: Define a Shape class with a method area() that returns 0. Define Circle(Shape) that overrides area() as 3.14 * radius
    ** 2. Print the area of Circle(5).
  starter: ''
  tests:
  - code: abs(Circle(5).area() - 78.5) < 0.1
    message: Circle area should be ~78.5
  - code: '''78'' in _stdout'
    message: Should print ~78.5
