unit: 4
xp: 150

plan_prompts:
  - "In one sentence, what should this program do?"
  - "What inputs does it have? What output?"
  - "What are the steps, in order, in plain English?"
  - "Translate each step into Python."

code_starter: |
  def launch_sequence(n):
      # Return a list that counts down from n to 1, then ends with "Launch!"
      # Example: launch_sequence(3) -> [3, 2, 1, "Launch!"]
      pass

hints:
  - "Create an empty list, then use a loop to add numbers to it"
  - "range(n, 0, -1) counts down from n to 1"
  - "After the loop, append the string \"Launch!\" to the list, then return it"

tests:
  - code: |
      result = launch_sequence(3)
      assert result == [3, 2, 1, "Launch!"], f"Got {result}"
    message: "launch_sequence(3) returns [3, 2, 1, 'Launch!']"
  - code: |
      result = launch_sequence(5)
      assert result == [5, 4, 3, 2, 1, "Launch!"], f"Got {result}"
    message: "launch_sequence(5) returns [5, 4, 3, 2, 1, 'Launch!']"
  - code: |
      result = launch_sequence(1)
      assert result == [1, "Launch!"], f"Got {result}"
    message: "launch_sequence(1) returns [1, 'Launch!']"
  - code: |
      result = launch_sequence(4)
      assert result[-1] == "Launch!"
      assert len(result) == 5
    message: "Always ends with 'Launch!' and has the right length"

worlds:
  fantasy:
    title: "The Dragon's Countdown"
    narrative: |
      The ancient dragon Vaelthorn awakens only after hearing a precise countdown
      ritual. The court wizard needs a function that builds the ritual sequence: a list
      of numbers counting down from n to 1, followed by the word "Launch!" to signal
      the awakening.

      Write launch_sequence(n) to produce this list using a loop. The dragon's patience
      is legendary, but the wizard's is not.
    story_beat: |
      The list is read aloud by the wizard. Vaelthorn's eye opens — one golden, ancient
      eye. "The sequence was perfect," whispers the court historian, scribbling furiously.
      "No dragon has awakened this smoothly in three centuries."
  scifi:
    title: "Rocket Launch Protocol"
    narrative: |
      Mission Control needs the launch sequence generator rebuilt after the system
      crashed during a test firing. The function must return a list counting down from
      n to 1, with "Launch!" as the final element — exactly what the launch computer
      expects to receive.

      Write launch_sequence(n) using a loop to build and return the list.
    story_beat: |
      "T-minus zero. Ignition." The rocket lifts clean off the pad. Mission Control
      erupts. Your sequence generator fed the launch computer perfectly timed data.
      The mission is go.
  mystery:
    title: "The Vault Timer"
    narrative: |
      The detective needs to crack a time-locked vault before evidence is destroyed.
      The vault accepts a countdown list: numbers from n down to 1, then the word
      "Launch!" to trigger the unlock sequence.

      Write launch_sequence(n) to generate the correct list using a loop. Every second
      counts.
    story_beat: |
      The vault clicks open at the final element of the list. Inside: every document
      needed to close the case. "Cutting it close," says Morgan, pulling out the files.
      "But cutting it perfectly."
