xp: 150

code_starter: |
  scores = [72, 91, 55, 88, 43, 76, 95, 61]

  # Using only a for loop (no max(), sum(), or count()):
  # 1. Find the highest score
  # 2. Count how many scores are 75 or above
  # Print the highest score on the first line.
  # Print the passing count on the second line.

hints:
  - "Start highest at 0 and update it each iteration: if score > highest: highest = score"
  - "Start a counter at 0 and add 1 when score >= 75"
  - "Print highest first, then passing — two separate print statements after the loop"

plan_prompts:
  - "What initial value makes sense for 'highest'? What do you compare each score against?"
  - "How do you count items that meet a condition inside a loop?"
  - "Where do you put the two print statements — inside or after the loop?"

tests:
  - code: |
      lines = _stdout.strip().split('\n')
      lines[0].strip() == '95'
    message: "First line should be the highest score: 95"
  - code: |
      lines = _stdout.strip().split('\n')
      lines[1].strip() == '4'
    message: "Second line should be the count of passing scores (>= 75): 4"

worlds:
  fantasy:
    title: "The Tournament Ledger"
    narrative: |
      The tournament master needs two numbers from the scoreboard before
      the final round is announced: the highest score of all competitors,
      and the count of those who cleared the qualifying threshold of 75.

      The scores are recorded. Write the loop that finds both answers
      and prints them — highest first, then the passing count.
    story_beat: |
      "95 — a new record," the tournament master declares, marking the
      ledger. "And four qualifiers advance to the final round."
      The crowd roars.
  scifi:
    title: "Mission Performance Review"
    narrative: |
      After the mission the ship's AI must report two metrics to command:
      the top performance score and the number of crew who met the 75-point
      operational threshold. Loop through the recorded scores and print both.
    story_beat: |
      "Peak score: 95. Qualified crew: 4." The report transmits instantly.
      Command replies: "Approved for next deployment. Well done."
  mystery:
    title: "Evidence Strength Report"
    narrative: |
      The detective bureau ranks evidence by strength score. Before closing
      the case file, Inspector Morgan needs the strongest piece of evidence
      and a count of items strong enough to hold up in court (75 or above).

      Loop through the scores and print both answers.
    story_beat: |
      "Strongest evidence: 95. Court-ready items: 4." The file snaps shut.
      "That's enough," Morgan says. "We're taking this to trial."
