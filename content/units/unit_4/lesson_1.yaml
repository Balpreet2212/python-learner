        4'
      explanation: Mira picks herbs one by one. range(5) gives patch numbers 0 through 4 — she visits each patch in order.
      story_before: Mira's spell-book calls for visiting every herb patch in the meadow — one by one, in order.
      story_after: The loop visits each patch in turn; now Mira must decide how many patches to cover.
