  team = [
      {"name": "Alice", "role": "warrior"},
      {"name": "Bob",   "role": "mage"},
  ]

  # Build a list of just the names using a list comprehension.
  names = [member[   ] for member in team]

  # Store the number of team members in 'team_size'
  team_size =
hints:
  - "member['name'] retrieves the name from each dict"
  - "names = [member['name'] for member in team]"
  - "team_size = len(team)"
tests:
  - code: "assert names == ['Alice', 'Bob'], f'got {names}'"
    message: "names should be ['Alice', 'Bob']"
