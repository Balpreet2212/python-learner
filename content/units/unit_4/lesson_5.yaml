unit: 4
lesson: 5
xp: 10

example:
  code: |
    numbers = [1, 2, 3, 4, 5]

    # List comprehension — square each number
    squares = [n * n for n in numbers]

    # List comprehension with condition — only evens
    evens = [n for n in numbers if n % 2 == 0]

    print(squares)
    print(evens)
  explanation: |
    A list comprehension builds a new list in one line: [expression for item in iterable].
    You can add an if clause at the end to filter: [expression for item in iterable if condition].
    The result is always a brand-new list — the original is unchanged.
  output: "[1, 4, 9, 16, 25]\n[2, 4]"

code_starter: |
  team = [
      {"name": "Alice", "role": "warrior"},
      {"name": "Bob",   "role": "mage"},
      {"name": "Cara",  "role": "rogue"},
  ]

  # Extract just the names using a list comprehension
  names = [member[___] for member in ___]
hints:
  - "Each member is a dict — member[\"name\"] gets the name"
  - "Iterate over team: for member in team"

tests:
  - code: "assert names == ['Alice', 'Bob', 'Cara'], f'got {names}'"
    message: "names list extracted correctly"

final_challenge:
  code_starter: |
    agents = [
        {"name": "Rex",   "clearance": 3},
        {"name": "Nova",  "clearance": 5},
        {"name": "Zara",  "clearance": 2},
    ]

    # Your code here
  hints:
    - "names = [a[\"name\"] for a in agents]"
    - "high_clearance = [a[\"name\"] for a in agents if a[\"clearance\"] >= 3]"
  tests:
    - code: "assert names == ['Rex', 'Nova', 'Zara'], f'got {names}'"
      message: "names list is correct"
    - code: "assert high_clearance == ['Rex', 'Nova'], f'got {high_clearance}'"
      message: "high_clearance filters correctly"

worlds:
  fantasy:
    title: "The Guild Roster Comprehension"
    setup: |
      The Adventurers' Guild keeps its roster as a list of dictionaries — one entry per member, each containing their name, rank, and role.
      The guild secretary needs two quick reports: a plain list of every member's name, and a filtered list of members who have clearance level 3 or above to enter the restricted archive.
      Looping through a list of dicts and pulling out one field each time is so common that Python has a shorthand for it: the list comprehension.
    final_challenge_prompt: |
      The guild's agent roster has just been delivered to you as a list of dicts.
      agents = [{"name": "Rex", "clearance": 3}, {"name": "Nova", "clearance": 5}, {"name": "Zara", "clearance": 2}]
      — Build names: a list of every agent's name using a list comprehension
      — Build high_clearance: a list of names where clearance >= 3, using a comprehension with an if clause
  scifi:
    title: "Crew Manifest Extraction Protocol"
    setup: |
      The Meridian's crew manifest is stored as a list of dicts. Navigation needs a plain name list for the intercom broadcast; Security needs a filtered list of personnel with clearance level 3 or above.
      Iterating over a list of dicts and selecting a single field every time is the perfect use case for a list comprehension. One line replaces four.
    final_challenge_prompt: |
      Ship security uploads the agent roster as a list of dicts.
      agents = [{"name": "Rex", "clearance": 3}, {"name": "Nova", "clearance": 5}, {"name": "Zara", "clearance": 2}]
      — Use a list comprehension to build names (all agent names)
      — Use a filtered list comprehension to build high_clearance (names where clearance >= 3)
  mystery:
    title: "The Witness List Filter"
    setup: |
      The detective's witness records arrive as a list of dicts. The clerk needs two extracts: every witness's name in a plain list, and a shorter list of only those witnesses rated with reliability 3 or higher — the ones the DA will call to the stand.
      A list comprehension lets you produce either list in a single readable line, without a verbose for-loop and append calls.
    final_challenge_prompt: |
      You receive the informant roster as a list of dicts.
      agents = [{"name": "Rex", "clearance": 3}, {"name": "Nova", "clearance": 5}, {"name": "Zara", "clearance": 2}]
      — Build names using a list comprehension over agents
      — Build high_clearance: names of agents whose clearance is 3 or above, using a comprehension with an if clause
