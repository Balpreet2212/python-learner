      question: Finn counts rounds until the Break Rune triggers. What does this print?
      code: "n = 0\nwhile True:\n    n += 1\n    if n > 3:\n        break\n    print(n)"
      choices:
      - '1

        2

        3'
      - '1

        2

        3

        4'
      - 'True'
      - Infinite loop
      correct: '1

        2

        3'
      explanation: break exits when n > 3. Rounds 1, 2, 3 are printed before the rune fires.
    - type: fill_blank
      prompt: Skip all cursed tiles below position 5 and continue to the next.
      before: "for i in range(10):\n    if i < 5:\n        "
      after: "\n    print(i)"
      choices:
      - continue
      - break
      - pass
      - return
      answer: continue
      explanation: continue skips positions below 5. Only 5, 6, 7, 8, 9 are printed.
    - type: mcq
      question: What is the difference between break and continue in Finn's path?
      code: ''
      choices:
      - break exits the loop; continue skips to the next iteration
