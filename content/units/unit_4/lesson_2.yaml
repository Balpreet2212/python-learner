title: "for Loops with Lists"
xp: 12

exercises:
  - type: concept
    code: |
      heroes = ["Alice", "Bob", "Carol"]
      for hero in heroes:
          print(hero)
    output: "Alice\nBob\nCarol"
    explanation: "A for loop can iterate over a list directly. Each item is assigned to the loop variable in turn."

  - type: mcq
    question: "What does this print?"
    code: "nums = [10, 20, 30]\nfor n in nums:\n    print(n)"
    choices: ["10\n20\n30", "nums", "10 20 30", "3"]
    correct: "10\n20\n30"
    explanation: "The loop visits each element. print(n) shows each number on its own line."

  - type: fill_blank
    prompt: "Give the loop variable a name that represents one element from the list."
    before: "items = [\"a\", \"b\", \"c\"]\nfor "
    after: " in items:\n    print(item)"
    choices: ["item", "items", "i", "x"]
    answer: "item"
    explanation: "The loop variable (here item) takes the value of each element in turn."

  - type: arrange
    instruction: "Build a loop that prints each number in the list doubled"
    blocks: ["for", "n", "in", "numbers", ":", "print", "(", "n", "*", "2", ")"]
    correct: ["for", "n", "in", "numbers", ":", "print", "(", "n", "*", "2", ")"]
    explanation: "n takes each value in numbers, and n * 2 doubles it."

  - type: mcq
    question: "What does this print?"
    code: "words = [\"hi\", \"bye\"]\nfor w in words:\n    print(w.upper())"
    choices: ["HI\nBYE", "hi\nbye", "hi\nBYE", "words"]
    correct: "HI\nBYE"
    explanation: ".upper() converts each word to uppercase inside the loop."

  - type: fill_blank
    prompt: "Accumulate each score into the running total."
    before: "scores = [80, 90, 70]\ntotal = 0\nfor s in scores:\n    total = total "
    after: " s"
    choices: ["+", "-", "*", "/"]
    answer: "+"
    explanation: "total + s accumulates the running sum of all scores."

  - type: mcq
    question: "What does this print?"
    code: "prices = [5, 10, 15]\ntotal = 0\nfor p in prices:\n    total += p\nprint(total)"
    choices: ["30", "51015", "3", "0"]
    correct: "30"
    explanation: "+= adds each price to total. 5 + 10 + 15 = 30."

  - type: arrange
    instruction: "Build a loop that counts how many items are in a list using a counter"
    blocks: ["count", "=", "0", "for", "item", "in", "my_list", ":", "count", "+=", "1", "print", "(", "count", ")"]
    correct: ["count", "=", "0", "for", "item", "in", "my_list", ":", "count", "+=", "1", "print", "(", "count", ")"]
    explanation: "count += 1 increments for each item. After the loop, print shows the total."

  - type: mcq
    question: "What does this print?"
    code: "nums = [3, 1, 4, 1, 5]\nmax_n = 0\nfor n in nums:\n    if n > max_n:\n        max_n = n\nprint(max_n)"
    choices: ["5", "3", "1", "14"]
    correct: "5"
    explanation: "The loop tracks the maximum. After visiting all elements, max_n is 5."

  - type: mcq
    question: "What does this print?"
    code: "names = [\"a\", \"b\", \"c\"]\nfor i, name in enumerate(names):\n    print(i, name)"
    choices: ["0 a\n1 b\n2 c", "a\nb\nc", "0\n1\n2", "1 a\n2 b\n3 c"]
    correct: "0 a\n1 b\n2 c"
    explanation: "enumerate() gives both the index and the value. Print shows them separated by a space."

  - type: mini_code
    prompt: "Temperatures = [22, 19, 25, 18, 30]. Print each temperature that is above 20."
    starter: "temperatures = [22, 19, 25, 18, 30]\n"
    tests:
      - code: "assert '22' in _stdout and '25' in _stdout and '30' in _stdout"
        message: "Should print 22, 25, and 30"
      - code: "assert all(int(x) > 20 for x in [l.strip() for l in _stdout.strip().split('\\n') if l.strip()])"
        message: "Should only print temperatures above 20"

  - type: mini_code
    prompt: "Given a list of numbers, calculate and print their average."
    starter: "numbers = [10, 20, 30, 40, 50]\ntotal = 0\n"
    tests:
      - code: "assert _stdout.strip() == '30.0'"
        message: "Average of 10,20,30,40,50 is 30.0"
      - code: "assert '/' in _code"
        message: "Should divide by the list length to get the average"

worlds:
  fantasy:
    title: "Sorting Through the Satchel"
    exercises:
      - type: concept
        code: |
          herbs = ["Moonleaf", "Thornroot", "Glowcap"]
          for herb in herbs:
              print(herb)
        output: "Moonleaf\nThornroot\nGlowcap"
        explanation: "Mira goes through each herb in her satchel one by one. The loop visits every item in the list in order."

      - type: mcq
        question: "What does this print as Mira checks her herb pouches?"
        code: "pouches = [10, 20, 30]\nfor p in pouches:\n    print(p)"
        choices: ["10\n20\n30", "pouches", "10 20 30", "3"]
        correct: "10\n20\n30"
        explanation: "The loop visits each pouch count. print(p) shows each number on its own line."

      - type: fill_blank
        prompt: "Give the loop variable a name that represents one herb from the list."
        before: "herbs = [\"a\", \"b\", \"c\"]\nfor "
        after: " in herbs:\n    print(herb)"
        choices: ["item", "items", "i", "x"]
        answer: "item"
        explanation: "The loop variable (here item) takes the value of each herb in the satchel in turn."

      - type: arrange
        instruction: "Build a loop that prints each herb pouch weight doubled as Mira measures her haul"
        blocks: ["for", "n", "in", "pouches", ":", "print", "(", "n", "*", "2", ")"]
        correct: ["for", "n", "in", "pouches", ":", "print", "(", "n", "*", "2", ")"]
        explanation: "n takes each weight in pouches, and n * 2 doubles it — Mira measures in pairs."

      - type: mcq
        question: "What does this print as Mira announces each herb loudly?"
        code: "plants = [\"fern\", \"moss\"]\nfor p in plants:\n    print(p.upper())"
        choices: ["FERN\nMOSS", "fern\nmoss", "fern\nMOSS", "plants"]
        correct: "FERN\nMOSS"
        explanation: ".upper() converts each plant name to uppercase — Mira calls them out in a booming voice."

      - type: fill_blank
        prompt: "Accumulate each herb's potency value into Mira's running total."
        before: "potencies = [80, 90, 70]\ntotal = 0\nfor p in potencies:\n    total = total "
        after: " p"
        choices: ["+", "-", "*", "/"]
        answer: "+"
        explanation: "total + p accumulates the running sum of all potency values Mira has collected."

      - type: mcq
        question: "What does this print as Mira totals her herb weights?"
        code: "weights = [5, 10, 15]\ntotal = 0\nfor w in weights:\n    total += w\nprint(total)"
        choices: ["30", "51015", "3", "0"]
        correct: "30"
        explanation: "+= adds each weight to total. 5 + 10 + 15 = 30 grams in Mira's satchel."

      - type: arrange
        instruction: "Build a loop that counts how many herbs Mira has collected using a counter"
        blocks: ["count", "=", "0", "for", "item", "in", "my_list", ":", "count", "+=", "1", "print", "(", "count", ")"]
        correct: ["count", "=", "0", "for", "item", "in", "my_list", ":", "count", "+=", "1", "print", "(", "count", ")"]
        explanation: "count += 1 increments for each herb. After the loop, print shows Mira's total herb count."

      - type: mcq
        question: "What does this print as Mira searches for the most potent herb?"
        code: "potencies = [3, 1, 4, 1, 5]\nbest = 0\nfor p in potencies:\n    if p > best:\n        best = p\nprint(best)"
        choices: ["5", "3", "1", "14"]
        correct: "5"
        explanation: "The loop tracks the highest potency. After visiting all herbs, best is 5."

      - type: mcq
        question: "What does this print as Mira numbers each herb in her satchel?"
        code: "plants = [\"a\", \"b\", \"c\"]\nfor i, plant in enumerate(plants):\n    print(i, plant)"
        choices: ["0 a\n1 b\n2 c", "a\nb\nc", "0\n1\n2", "1 a\n2 b\n3 c"]
        correct: "0 a\n1 b\n2 c"
        explanation: "enumerate() gives both the slot number and the herb name. Mira labels each one in order."

      - type: mini_code
        prompt: "Mira checks warmth readings from 5 forest clearings. temperatures = [22, 19, 25, 18, 30]. Print each temperature that is above 20."
        starter: "temperatures = [22, 19, 25, 18, 30]\n"
        tests:
          - code: "assert '22' in _stdout and '25' in _stdout and '30' in _stdout"
            message: "Should print 22, 25, and 30"
          - code: "assert all(int(x) > 20 for x in [l.strip() for l in _stdout.strip().split('\\n') if l.strip()])"
            message: "Should only print temperatures above 20"

      - type: mini_code
        prompt: "Mira has a list of herb weights and wants to know the average weight. Given a list of numbers, calculate and print their average."
        starter: "numbers = [10, 20, 30, 40, 50]\ntotal = 0\n"
        tests:
          - code: "assert _stdout.strip() == '30.0'"
            message: "Average of 10,20,30,40,50 is 30.0"
          - code: "assert '/' in _code"
            message: "Should divide by the list length to get the average"

