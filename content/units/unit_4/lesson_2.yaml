title: for Loops with Lists
xp: 12
exercises:
- type: concept
  code: "heroes = [\"Alice\", \"Bob\", \"Carol\"]\nfor hero in heroes:\n    print(hero)\n"
  output: 'Alice

    Bob

    Carol'
  explanation: A for loop can iterate over a list directly. Each item is assigned to the loop variable in turn.
- type: mcq
  question: What does this print?
  code: "nums = [10, 20, 30]\nfor n in nums:\n    print(n)"
  choices:
  - '10

    20

    30'
  - nums
  - 10 20 30
  - '3'
  correct: '10

    20

    30'
  explanation: The loop visits each element. print(n) shows each number on its own line.
- type: fill_blank
  prompt: Give the loop variable a name that represents one element from the list.
  before: 'items = ["a", "b", "c"]

    for '
  after: " in items:\n    print(item)"
  choices:
  - item
  - items
  - i
  - x
  answer: item
  explanation: The loop variable (here item) takes the value of each element in turn.
- type: arrange
  instruction: Build a loop that prints each number in the list doubled
  blocks:
  - for
  - n
  - in
  - numbers
  - ':'
  - print
  - (
  - n
  - '*'
  - '2'
  - )
  correct:
  - for
  - n
  - in
  - numbers
  - ':'
  - print
  - (
  - n
  - '*'
  - '2'
  - )
  explanation: n takes each value in numbers, and n * 2 doubles it.
- type: mcq
  question: What does this print?
  code: "words = [\"hi\", \"bye\"]\nfor w in words:\n    print(w.upper())"
  choices:
  - 'HI

    BYE'
  - 'hi

    bye'
  - 'hi

    BYE'
  - words
  correct: 'HI

    BYE'
  explanation: .upper() converts each word to uppercase inside the loop.
- type: fill_blank
  prompt: Accumulate each score into the running total.
  before: "scores = [80, 90, 70]\ntotal = 0\nfor s in scores:\n    total = total "
  after: ' s'
  choices:
  - +
  - '-'
  - '*'
  - /
  answer: +
  explanation: total + s accumulates the running sum of all scores.
- type: mcq
  question: What does this print?
  code: "prices = [5, 10, 15]\ntotal = 0\nfor p in prices:\n    total += p\nprint(total)"
  choices:
  - '30'
  - '51015'
  - '3'
  - '0'
  correct: '30'
  explanation: += adds each price to total. 5 + 10 + 15 = 30.
- type: arrange
  instruction: Build a loop that counts how many items are in a list using a counter
  blocks:
  - count
  - '='
  - '0'
  - for
  - item
  - in
  - my_list
  - ':'
  - count
  - +=
  - '1'
  - print
  - (
  - count
  - )
  correct:
  - count
  - '='
  - '0'
  - for
  - item
  - in
  - my_list
  - ':'
  - count
  - +=
  - '1'
  - print
  - (
  - count
  - )
  explanation: count += 1 increments for each item. After the loop, print shows the total.
- type: mcq
  question: What does this print?
  code: "nums = [3, 1, 4, 1, 5]\nmax_n = 0\nfor n in nums:\n    if n > max_n:\n        max_n = n\nprint(max_n)"
  choices:
  - '5'
  - '3'
  - '1'
  - '14'
  correct: '5'
  explanation: The loop tracks the maximum. After visiting all elements, max_n is 5.
- type: mcq
  question: What does this print?
  code: "names = [\"a\", \"b\", \"c\"]\nfor i, name in enumerate(names):\n    print(i, name)"
  choices:
  - '0 a

    1 b

    2 c'
  - 'a

    b

    c'
  - '0

    1

    2'
  - '1 a

    2 b

    3 c'
  correct: '0 a

    1 b

    2 c'
  explanation: enumerate() gives both the index and the value. Print shows them separated by a space.
- type: mini_code
  prompt: Temperatures = [22, 19, 25, 18, 30]. Print each temperature that is above 20.
  starter: 'temperatures = [22, 19, 25, 18, 30]

    '
  tests:
  - code: assert '22' in _stdout and '25' in _stdout and '30' in _stdout
    message: Should print 22, 25, and 30
  - code: assert all(int(x) > 20 for x in [l.strip() for l in _stdout.strip().split('\n') if l.strip()])
    message: Should only print temperatures above 20
- type: mini_code
  prompt: Given a list of numbers, calculate and print their average.
  starter: 'numbers = [10, 20, 30, 40, 50]

    total = 0

    '
  tests:
  - code: assert _stdout.strip() == '30.0'
    message: Average of 10,20,30,40,50 is 30.0
  - code: assert '/' in _code
    message: Should divide by the list length to get the average
worlds:
  fantasy:
    title: Sorting Through the Satchel
    exercises:
    - type: concept
      code: "herbs = [\"Moonleaf\", \"Thornroot\", \"Glowcap\"]\nfor herb in herbs:\n    print(herb)\n"
      output: 'Moonleaf

        Thornroot

        Glowcap'
      explanation: Mira goes through each herb in her satchel one by one. The loop visits every item in the list in order.
      story_before: Mira empties her satchel onto the workbench — she needs to inspect each herb by name, one after another.
      story_after: Moonleaf, Thornroot, Glowcap — each herb examined in turn; now Mira checks the count in each pouch.
    - type: mcq
      question: What does this print as Mira checks her herb pouches?
      code: "pouches = [10, 20, 30]\nfor p in pouches:\n    print(p)"
      choices:
      - '10

        20

        30'
      - pouches
      - 10 20 30
      - '3'
      correct: '10

        20

        30'
      explanation: The loop visits each pouch count. print(p) shows each number on its own line.
      story_before: Three pouches sit on the shelf; Mira loops through them to read the count in each.
      story_after: Counts confirmed; next Mira must give the loop variable a proper name so each herb is addressed correctly.
    - type: fill_blank
      prompt: Give the loop variable a name that represents one herb from the list.
      before: 'herbs = ["a", "b", "c"]

        for '
      after: " in herbs:\n    print(herb)"
      choices:
      - item
      - items
      - i
      - x
      answer: item
      explanation: The loop variable (here item) takes the value of each herb in the satchel in turn.
      story_before: Mira labels the loop variable so the spell knows it is handling one herb at a time from the list.
      story_after: Variable named; Mira now tests a spell that weighs each herb by doubling its value.
    - type: arrange
      instruction: Build a loop that prints each herb pouch weight doubled as Mira measures her haul
      blocks:
      - for
      - n
      - in
      - pouches
      - ':'
      - print
      - (
      - n
      - '*'
      - '2'
      - )
      correct:
      - for
      - n
      - in
      - pouches
      - ':'
      - print
      - (
      - n
      - '*'
      - '2'
      - )
      explanation: n takes each weight in pouches, and n * 2 doubles it — Mira measures in pairs.
      story_before: Mira measures each pouch by doubling its weight — she must arrange the loop spell to do the maths.
      story_after: Double weights calculated; now Mira bellows each herb's name across the workshop.
    - type: mcq
      question: What does this print as Mira announces each herb loudly?
      code: "plants = [\"fern\", \"moss\"]\nfor p in plants:\n    print(p.upper())"
      choices:
      - 'FERN

        MOSS'
      - 'fern

        moss'
      - 'fern

        MOSS'
      - plants
      correct: 'FERN

        MOSS'
      explanation: .upper() converts each plant name to uppercase — Mira calls them out in a booming voice.
      story_before: The master wants the herb names called out in full voice — Mira's loop converts each name to uppercase.
      story_after: Names echoed loudly; Mira moves on to accumulating the combined potency of everything in the satchel.
    - type: fill_blank
      prompt: Accumulate each herb's potency value into Mira's running total.
      before: "potencies = [80, 90, 70]\ntotal = 0\nfor p in potencies:\n    total = total "
      after: ' p'
      choices:
      - +
      - '-'
      - '*'
      - /
      answer: +
      explanation: total + p accumulates the running sum of all potency values Mira has collected.
      story_before: Mira needs the total potency of all her herbs — she picks the operator that adds each value to the running
        sum.
      story_after: Potency values summed; Mira checks the total weight of everything she has collected.
    - type: mcq
      question: What does this print as Mira totals her herb weights?
      code: "weights = [5, 10, 15]\ntotal = 0\nfor w in weights:\n    total += w\nprint(total)"
      choices:
      - '30'
      - '51015'
      - '3'
      - '0'
      correct: '30'
      explanation: += adds each weight to total. 5 + 10 + 15 = 30 grams in Mira's satchel.
      story_before: Mira's three herb weights need to be combined into one grand total for the master's ledger.
      story_after: Thirty grams total — the satchel is weighed; now Mira counts how many herbs she collected overall.
    - type: arrange
      instruction: Build a loop that counts how many herbs Mira has collected using a counter
      blocks:
      - count
      - '='
      - '0'
      - for
      - item
      - in
      - my_list
      - ':'
      - count
      - +=
      - '1'
      - print
      - (
      - count
      - )
      correct:
      - count
      - '='
      - '0'
      - for
      - item
      - in
      - my_list
      - ':'
      - count
      - +=
      - '1'
      - print
      - (
      - count
      - )
      explanation: count += 1 increments for each herb. After the loop, print shows Mira's total herb count.
      story_before: Mira keeps a tally counter and increments it for every herb she passes over in the list.
      story_after: Herb count complete; now Mira searches the collection for the most potent specimen.
    - type: mcq
      question: What does this print as Mira searches for the most potent herb?
      code: "potencies = [3, 1, 4, 1, 5]\nbest = 0\nfor p in potencies:\n    if p > best:\n        best = p\nprint(best)"
      choices:
      - '5'
      - '3'
      - '1'
      - '14'
      correct: '5'
      explanation: The loop tracks the highest potency. After visiting all herbs, best is 5.
      story_before: The master asks for the single most potent herb — Mira loops through and tracks the highest value.
      story_after: Best potency found at 5; Mira labels every herb with its position so the shelves stay organised.
    - type: mcq
      question: What does this print as Mira numbers each herb in her satchel?
      code: "plants = [\"a\", \"b\", \"c\"]\nfor i, plant in enumerate(plants):\n    print(i, plant)"
      choices:
      - '0 a

        1 b

        2 c'
      - 'a

        b

        c'
      - '0

        1

        2'
      - '1 a

        2 b

        3 c'
      correct: '0 a

        1 b

        2 c'
      explanation: enumerate() gives both the slot number and the herb name. Mira labels each one in order.
      story_before: Mira uses enumerate to number each herb slot so she can find any item on the shelf instantly.
      story_after: Herbs numbered 0, 1, 2 with their names; Mira's final task is filtering out the cooler clearings.
    - type: mini_code
      prompt: Mira checks warmth readings from 5 forest clearings. temperatures = [22, 19, 25, 18, 30]. Print each temperature
        that is above 20.
      starter: 'temperatures = [22, 19, 25, 18, 30]

        '
      tests:
      - code: assert '22' in _stdout and '25' in _stdout and '30' in _stdout
        message: Should print 22, 25, and 30
      - code: assert all(int(x) > 20 for x in [l.strip() for l in _stdout.strip().split('\n') if l.strip()])
        message: Should only print temperatures above 20
      story_before: Five forest clearings have warmth readings — Mira only wants those above 20 to know where herbs thrive.
      story_after: Warm clearings identified; Mira finishes by calculating the average weight across her whole haul.
    - type: mini_code
      prompt: Mira has a list of herb weights and wants to know the average weight. Given a list of numbers, calculate and
        print their average.
      starter: 'numbers = [10, 20, 30, 40, 50]

        total = 0

        '
      tests:
      - code: assert _stdout.strip() == '30.0'
        message: Average of 10,20,30,40,50 is 30.0
      - code: assert '/' in _code
        message: Should divide by the list length to get the average
      story_before: Before restocking the workshop Mira needs the average herb weight from her list of five measurements.
      story_after: 'Average weight: 30.0 — Mira''s satchel analysis is done and the herbs are ready for the master.'
    - type: break_fix
      story_before: Elara's inventory spell is supposed to announce each item in her satchel one at a time, but every incantation
        recites the entire satchel instead of a single item.
      story_after: Switching from the list name to the loop variable fixes the spell — each item is announced on its own line.
      prompt: Elara's loop should print each item from her satchel individually, but it prints the whole list every time.
        Fix the print statement to use the loop variable.
      broken_code: "items = [\"potion\", \"scroll\", \"key\"]\nfor item in items:\n    print(items)"
      hint: Check what you are passing to print — it should be the single loop variable, not the whole list.
      explanation: print(items) outputs the entire list object on every iteration. Changing it to print(item) uses the loop
        variable, which holds one element at a time.
      tests:
      - code: assert _stdout.strip() == 'potion\nscroll\nkey'
        message: 'Should print each item on its own line: potion, scroll, key'
