      story_after: Changing the step from 1 to 2 makes the tracer skip alternate stones, matching the map's dotted path exactly.
      prompt: Elara's loop should print every other number from 0 to 8 (0, 2, 4, 6, 8), but the step value is wrong so it
        prints every number. Fix the step in range().
      broken_code: "for i in range(0, 10, 1):\n    print(i)"
      hint: The third argument to range() is the step — change it so the loop skips every other value.
      explanation: range(0, 10, 1) steps by 1, producing 0 through 9. Changing the step to 2 gives range(0, 10, 2), which
        yields 0, 2, 4, 6, 8.
      tests:
      - code: assert _stdout.strip() == '0\n2\n4\n6\n8'
        message: Should print 0, 2, 4, 6, 8 — every other number
