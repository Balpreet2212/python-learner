      story_after: Banners raised at 7, 14, 21 … 49 — the champion's trial is complete and she is proclaimed worthy.
    - type: break_fix
      story_before: Elara's training counter is supposed to put the hero through three rounds of drills before declaring them
        done, but the champion never trains at all — the counter sits idle and only 'done' appears.
      story_after: Flipping the condition to count < 3 lets the loop run three rounds, printing 0, 1, and 2 before the champion
