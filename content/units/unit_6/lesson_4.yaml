title: "Looping Over Lists"
xp: 12

exercises:
  - type: concept
    code: |
      scores = [85, 72, 91, 68]
      total = 0
      for s in scores:
          total += s
      print(total)
      print(total / len(scores))
    output: "316\n79.0"
    explanation: "for loops over every item in a list. You can accumulate values with a running total. Combine with len() to compute averages."

  - type: mcq
    question: "What does this print?"
    code: "fruits = ['apple', 'banana', 'cherry']\nfor f in fruits:\n    print(f)"
    choices: ["apple\nbanana\ncherry", "['apple', 'banana', 'cherry']", "f\nf\nf", "0\n1\n2"]
    correct: "apple\nbanana\ncherry"
    explanation: "The loop assigns each item to f in turn and prints it."

  - type: fill_blank
    before: "nums = [1, 2, 3, 4, 5]\ntotal = 0\nfor n in nums:\n    total "
    after: " n\nprint(total)"
    choices: ["+=", "=", "-=", "*="]
    answer: "+="
    explanation: "+= adds each n to total. After the loop total = 15."

  - type: mcq
    question: "What does this print?"
    code: "words = ['hi', 'hello', 'hey']\nfor w in words:\n    print(len(w))"
    choices: ["2\n5\n3", "hi\nhello\nhey", "3\n3\n3", "2\n3\n4"]
    correct: "2\n5\n3"
    explanation: "len('hi')=2, len('hello')=5, len('hey')=3."

  - type: arrange
    instruction: "Print each item in prices = [9.99, 4.99, 14.99] doubled"
    blocks: ["prices", "=", "[", "9.99", ",", "4.99", ",", "14.99", "]", "for", "p", "in", "prices", ":", "print", "(", "p", "*", "2", ")"]
    correct: ["prices", "=", "[", "9.99", ",", "4.99", ",", "14.99", "]", "for", "p", "in", "prices", ":", "print", "(", "p", "*", "2", ")"]
    explanation: "Iterate with for, multiply each price by 2, and print it."

  - type: mcq
    question: "What does this print?"
    code: "nums = [3, 1, 4, 1, 5]\ncount = 0\nfor n in nums:\n    if n > 2:\n        count += 1\nprint(count)"
    choices: ["3", "5", "2", "4"]
    correct: "3"
    explanation: "3, 4, 5 are greater than 2. Count = 3."

  - type: fill_blank
    before: "names = [\"Alice\", \"Bob\", \"Carol\"]\nfor name in names:\n    print("
    after: ".upper())"
    choices: ["name", "names", "n", "item"]
    answer: "name"
    explanation: "name is the loop variable. .upper() converts each to uppercase."

  - type: mcq
    question: "What does this print?"
    code: "items = [10, 20, 30]\nnew = []\nfor x in items:\n    new.append(x * 2)\nprint(new)"
    choices: ["[20, 40, 60]", "[10, 20, 30]", "[2, 4, 6]", "[10, 20, 30, 20, 40, 60]"]
    correct: "[20, 40, 60]"
    explanation: "Each item is doubled and appended to new. Result: [20, 40, 60]."

  - type: mcq
    question: "What does this print?"
    code: "letters = ['a', 'b', 'c']\nresult = ''\nfor l in letters:\n    result += l\nprint(result)"
    choices: ["abc", "a\nb\nc", "['a', 'b', 'c']", "cba"]
    correct: "abc"
    explanation: "Each letter is concatenated onto result. Final result: 'abc'."

  - type: mini_code
    prompt: "Create a list of 5 numbers. Use a loop to print only the numbers greater than 10."
    starter: ""
    tests:
      - code: "all(int(x) > 10 for x in _stdout.strip().split('\\n') if x)"
        message: "Should only print numbers greater than 10"

  - type: mini_code
    prompt: "Create a list called temps with 4 temperatures. Find and print the maximum temperature without using max()."
    starter: ""
    tests:
      - code: "str(max(temps)) in _stdout"
        message: "Should print the maximum temperature"

worlds:
  fantasy:
    title: "Enchanted Inventory Loop"
  scifi:
    title: "Sensor Array Processing"
  mystery:
    title: "Reviewing All Clues"
