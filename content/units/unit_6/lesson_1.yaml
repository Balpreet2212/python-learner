worlds:
  fantasy:
    title: "The Fail-Safe Enchantment"
    setup: |
      Every seasoned enchanter knows that some spells can backfire. Dividing a potion's strength by zero vials — because none were prepared — would cause the whole ritual to collapse in a puff of acrid smoke.
      The Guild's solution: wrap dangerous operations in a try block. If the error occurs, the except clause catches it like a magical ward, letting the spell finish gracefully instead of exploding.
      This is Python's exception-handling mechanism. You name the specific error you expect, handle it cleanly, and your program carries on.
    final_challenge_prompt: |
      The castle treasury needs a function to divide gold evenly among soldiers. If there are no soldiers (b = 0), dividing is impossible — return 0 instead of crashing.
      Write safe_divide(a, b) that:
      — Returns a // b normally
      — Returns 0 if a ZeroDivisionError occurs
  scifi:
    title: "Fault-Tolerant Navigation Subroutines"
    setup: |
      Aboard the Meridian, a navigation subroutine that crashes on divide-by-zero could send the ship into an unrecoverable spin. Mission protocol requires every computation function to be fault-tolerant.
      Python's try/except pattern is the engineering solution: put the risky line inside try, name the exception you're guarding against in except, and define a safe fallback. The program continues — no crash, no spin.
    final_challenge_prompt: |
      Write a fault-tolerant safe_divide(a, b) function for the navigation computer:
      — Returns a // b when b is non-zero
      — Returns 0 when b is 0, catching ZeroDivisionError
  mystery:
    title: "The Detective's Failproof Calculation"
    setup: |
      Calculating evidence ratios is routine — until one day the denominator is zero. A witness count of zero, a crime rate of zero, an empty suspect list. Without a guard, the whole analysis crashes and the case goes cold.
      The try/except block is the detective's safety net: attempt the calculation, and if ZeroDivisionError is raised, fall back to a known-safe value and keep working.
    final_challenge_prompt: |
      Write safe_divide(a, b) for the evidence analysis toolkit:
      — Returns a // b normally
      — Returns 0 if ZeroDivisionError is raised
      — Works for any integer inputs
