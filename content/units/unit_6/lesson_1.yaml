title: "Creating Lists and Indexing"
xp: 12

exercises:
  - type: concept
    code: |
      colours = ["red", "green", "blue"]
      print(colours[0])
      print(colours[2])
      print(len(colours))
    output: "red\nblue\n3"
    explanation: "A list stores values in order inside square brackets. Items are zero-indexed: [0] is first, [1] is second. len() gives the total count."

  - type: mcq
    question: "What does this print?"
    code: "nums = [10, 20, 30]\nprint(nums[1])"
    choices: ["20", "10", "30", "1"]
    correct: "20"
    explanation: "Index 1 is the second item. nums[1] = 20."

  - type: fill_blank
    prompt: "Print the first item in the fruits list."
    before: "fruits = [\"apple\", \"banana\", \"cherry\"]\nprint(fruits["
    after: "])"
    choices: ["0", "1", "3", "-1"]
    answer: "0"
    explanation: "fruits[0] is the first item: 'apple'."

  - type: mcq
    question: "What does this print?"
    code: "items = [\"a\", \"b\", \"c\", \"d\"]\nprint(len(items))"
    choices: ["4", "3", "0", "d"]
    correct: "4"
    explanation: "len() counts the items. There are 4 items."

  - type: arrange
    instruction: "Build a list called heroes with three names and print the first one"
    blocks: ["heroes", "=", "[", "\"Alice\"", ",", "\"Bob\"", ",", "\"Carol\"", "]", "print", "(", "heroes", "[", "0", "]", ")"]
    correct: ["heroes", "=", "[", "\"Alice\"", ",", "\"Bob\"", ",", "\"Carol\"", "]", "print", "(", "heroes", "[", "0", "]", ")"]
    explanation: "Create the list with [], then index with [0] to get the first element."

  - type: mcq
    question: "What does this print?"
    code: "scores = [95, 87, 72]\nprint(scores[2])"
    choices: ["72", "95", "87", "3"]
    correct: "72"
    explanation: "Index 2 is the third item. scores[2] = 72."

  - type: fill_blank
    prompt: "Print how many items are in the words list."
    before: "words = [\"cat\", \"dog\", \"fish\"]\nprint("
    after: "(words))"
    choices: ["len", "str", "int", "print"]
    answer: "len"
    explanation: "len(words) returns 3, the number of items in the list."

  - type: mcq
    question: "What does this print?"
    code: "data = [True, False, True]\nprint(data[0])"
    choices: ["True", "False", "1", "0"]
    correct: "True"
    explanation: "Lists can hold booleans. data[0] is the first item: True."

  - type: arrange
    instruction: "Print the length of a list called prices = [9.99, 4.99, 14.99]"
    blocks: ["prices", "=", "[", "9.99", ",", "4.99", ",", "14.99", "]", "print", "(", "len", "(", "prices", ")", ")"]
    correct: ["prices", "=", "[", "9.99", ",", "4.99", ",", "14.99", "]", "print", "(", "len", "(", "prices", ")", ")"]
    explanation: "len(prices) counts the items and print() displays the result."

  - type: mcq
    question: "Which is the correct way to create an empty list?"
    code: ""
    choices: ["my_list = []", "my_list = ()", "my_list = {}", "my_list = list"]
    correct: "my_list = []"
    explanation: "Empty square brackets [] create an empty list. () is a tuple, {} is a dict."

  - type: mini_code
    prompt: "Create a list called planets with three planet names. Print the second planet."
    starter: ""
    tests:
      - code: "assert isinstance(planets, list)"
        message: "planets should be a list"
      - code: "assert len(planets) == 3"
        message: "planets should have 3 items"
      - code: "assert planets[1] in _stdout"
        message: "Should print the second planet"

  - type: mini_code
    prompt: "Create a list of 4 numbers. Print the list and its length."
    starter: ""
    tests:
      - code: "assert '[' in _stdout and ']' in _stdout"
        message: "Should print the list with square brackets"
      - code: "assert '4' in _stdout"
        message: "Should print the length: 4"

