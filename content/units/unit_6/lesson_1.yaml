unit: 4
lesson: 1
xp: 10

example:
  code: |
    colours = ["red", "green", "blue"]
    print(colours)
    print(colours[0])
    print(colours[2])
    print(len(colours))
  explanation: |
    A list stores multiple values in order, inside square brackets.
    Items are separated by commas and can be any type — strings, numbers, booleans.
    Lists are zero-indexed: the first item is at index 0, the second at 1, and so on.
    len() tells you how many items are in the list.
  output: "['red', 'green', 'blue']\nred\nblue\n3"

code_starter: |
  # Create a list called 'heroes' containing three names (strings).
  heroes =
hints:
  - "Lists use square brackets: heroes = ['Alice', 'Bob', 'Charlie']"
  - "Items are separated by commas"
tests:
  - code: "assert isinstance(heroes, list), 'heroes should be a list'"
    message: "heroes should be a list"
  - code: "assert len(heroes) == 3, f'heroes should have 3 items, got {len(heroes)}'"
    message: "heroes should contain exactly 3 items"
  - code: "assert all(isinstance(h, str) for h in heroes), 'all items should be strings'"
    message: "all items in heroes should be strings"

final_challenge:
  code_starter: |
    # Create a spells list with exactly four spell names
  hints:
    - 'spells = ["Fireball", "Ice Shard", "Thunder Strike", "Wind Slash"]'
    - "Use square brackets, separate items with commas"
    - "All four items must be non-empty strings"
  tests:
    - code: "assert isinstance(spells, list)"
      message: "spells should be a list"
    - code: "assert len(spells) == 4, f'spells should have 4 items, got {len(spells)}'"
      message: "spells should have exactly 4 items"
    - code: "assert all(isinstance(s, str) and len(s) > 0 for s in spells)"
      message: "all items in spells should be non-empty strings"

worlds:
  fantasy:
    title: "The Party Roster"
    setup: |
      An adventuring party needs a roster. "A list stores multiple values in order,
      inside square brackets," Elara explains. "Each item is separated by a comma;
      they can all be the same type or different ones."

      Lists remember the order you put things in. You can access any item by its
      position (starting from 0) and get the total count with len(). Create 'heroes'
      as a list of three string names — your party is assembled.
    final_challenge_prompt: |
      The spell registry needs your four signature spells documented. Create a list
      called spells containing exactly four spell names (non-empty strings of your
      choice). The registry requires exactly four entries.
  scifi:
    title: "Crew Manifest"
    setup: |
      Before departure, the ship needs a crew manifest. "A list is Python's ordered
      collection — square brackets, comma-separated items," the AI says. "It can hold
      strings, numbers, booleans, even other lists."

      Create 'heroes' as a list of three crew member names (strings).
    final_challenge_prompt: |
      The weapons system needs four loadout options registered. Create a list called
      spells containing four non-empty strings (weapon names of your choice). The
      system requires exactly four slots to be filled.
  mystery:
    title: "The Suspects List"
    setup: |
      Every detective keeps a list of suspects. "Python lists store sequences of
      values in square brackets," your mentor explains. "You can put any type of
      value inside, mix them, and access them later by position."

      Create a 'heroes' list with three string names.
    final_challenge_prompt: |
      The case board needs four suspects documented. Create a list called spells
      containing four non-empty strings (suspect names or lead descriptions). The
      board system requires exactly four entries to activate the analysis mode.
