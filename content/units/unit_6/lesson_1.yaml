unit: 5
lesson: 1
xp: 10

example:
  code: |
    def divide(a, b):
        try:
            result = a / b
        except ZeroDivisionError:
            result = 0
        return result

    print(divide(10, 2))
    print(divide(5, 0))
  explanation: |
    A try block contains code that might fail. If it raises the named exception, execution jumps to the except block instead of crashing.
    Here, dividing by zero raises ZeroDivisionError. The except clause catches it and sets result to 0 — the function always returns safely.
  output: "5.0\n0"

code_starter: |
  def safe_divide(a, b):
      try:
          result = ___
      except ZeroDivisionError:
          result = ___
      return result
hints:
  - "result = a // b for integer division"
  - "Return 0 when ZeroDivisionError is caught"

