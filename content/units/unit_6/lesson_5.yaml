worlds:
  fantasy:
    title: "The Power Scale Enforcement Spell"
    setup: |
      The Archmage's power registry has strict limits: no enchantment may be registered below power level 1 (that would be inert), and none above 100 (that would be catastrophically unstable). Any attempt to register outside these bounds must be rejected loudly, not silently accepted.
      In Python, raise lets your function be the enforcer. Instead of returning a wrong value, it fires an exception with a clear message — giving the caller a chance to handle it or crash with a useful description of what went wrong.
    final_challenge_prompt: |
      Write validate_power(level) for the Archmage's registry:
      — If level < 1, raise ValueError with a descriptive message
      — If level > 100, raise ValueError with a descriptive message
      — Otherwise, return level
  scifi:
    title: "Reactor Power Limit Enforcement"
    setup: |
      The Meridian's reactor accepts power settings from 1 to 100. A setting of 0 means the reactor is offline — unacceptable mid-mission. A setting above 100 risks a cascade failure. The control interface must reject both extremes immediately by raising an exception, not by silently clamping the value.
      raise in Python is how a function says "I refuse to continue with this input." It is the right tool for enforcing hard constraints at the boundary of a system.
    final_challenge_prompt: |
      Write validate_power(level) for the reactor control module:
      — Raise ValueError if level < 1
      — Raise ValueError if level > 100
      — Return level when it is within bounds
  mystery:
    title: "The Evidence Strength Validator"
    setup: |
      The detective's evidence-strength system rates items from 1 (barely relevant) to 100 (ironclad). A zero means no evidence exists — that is inadmissible. A number above 100 is a data-entry error that would corrupt the jury's scoring model.
      raise ValueError is how you enforce these rules in Python code: stop execution, report the exact problem, and let the caller decide how to recover. Silent bad values are worse than loud errors.
    final_challenge_prompt: |
      Write validate_power(level) for the evidence rating system:
      — Raise ValueError if level is below 1
      — Raise ValueError if level exceeds 100
      — Return level if it passes both checks
