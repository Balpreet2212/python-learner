unit: 6
lesson: 5
xp: 10

example:
  code: |
    class Animal:
        def __init__(self, name):
            self.name = name

        def speak(self):
            return "..."

    class Cat(Animal):
        def speak(self):
            return "Meow"

    class Dog(Animal):
        def speak(self):
            return "Woof"

    animals = [Cat("Whiskers"), Dog("Buddy"), Cat("Luna")]
    for a in animals:
        print(a.name, "says", a.speak())
  explanation: |
    class Cat(Animal) means Cat inherits from Animal — it gets all of Animal's attributes and methods.
    By defining speak() again inside Cat, the child class overrides the parent's version (called method overriding).
    Each subclass can have its own behaviour while sharing the same structure. This is the core of inheritance.
  output: "Whiskers says Meow\nBuddy says Woof\nLuna says Meow"

code_starter: |
  class Animal:
      def __init__(self, name):
          self.name = name

      def move(self):
          return "Moving"

  class Bird(___):
      def move(self):
          return ___

  class Fish(___):
      def move(self):
          return ___

  eagle = Bird("Eagle")
  salmon = Fish("Salmon")
hints:
  - "class Bird(Animal): inherits from Animal"
  - "Bird.move should return \"Flying\""
  - "Fish.move should return \"Swimming\""

tests:
  - code: "assert eagle.move() == 'Flying', f'got {eagle.move()}'"
    message: "eagle.move() returns 'Flying'"
  - code: "assert salmon.move() == 'Swimming', f'got {salmon.move()}'"
    message: "salmon.move() returns 'Swimming'"
  - code: "assert eagle.name == 'Eagle'"
    message: "eagle.name inherited from Animal"

final_challenge:
  code_starter: |
    # Your code here
  hints:
    - "class Vehicle: def move(self): return \"Moving\""
    - "class Car(Vehicle): def move(self): return \"Driving\""
    - "car = Car()"
  tests:
    - code: |
        v = Vehicle()
        assert v.move() == "Moving", f'Vehicle.move should return Moving, got {v.move()}'
      message: "Vehicle.move() returns 'Moving'"
    - code: |
        car = Car()
        assert car.move() == "Driving", f'Car.move should return Driving, got {car.move()}'
      message: "Car.move() returns 'Driving'"
    - code: "assert issubclass(Car, Vehicle), 'Car must inherit from Vehicle'"
      message: "Car inherits from Vehicle"

worlds:
  fantasy:
    title: "The Order of Inheritance"
    setup: |
      The ancient Orders of the realm share a common creed — all members can move. But each Order moves differently: sky riders soar on griffins, deep-sea navigators swim in submersibles, ground troops march.
      In Python, inheritance lets a child class (Bird, Fish) receive all of the parent class's (Animal) attributes and methods for free, then override specific methods to provide its own behaviour. The child says: "I am an Animal, but I move differently."
    final_challenge_prompt: |
      Build a two-level class hierarchy:
      — class Vehicle with a move(self) method that returns "Moving"
      — class Car(Vehicle) that overrides move(self) to return "Driving"
      — Create an instance: car = Car()
  scifi:
    title: "Subclassed Ship Modules"
    setup: |
      Every module aboard the Meridian derives from a common base — they all have a move() command in the firmware interface. But the implementation differs: surface rovers drive, atmospheric shuttles fly, aquatic probes swim.
      Inheritance captures this hierarchy cleanly. The base class defines the shared interface; each subclass overrides the method with its specific behaviour. Code that talks to the base class works with any subclass — this is polymorphism.
    final_challenge_prompt: |
      Define:
      — class Vehicle with move(self) returning "Moving"
      — class Car(Vehicle) overriding move(self) to return "Driving"
      — Instantiate car = Car()
  mystery:
    title: "Undercover Agents — Same Alias, Different Cover"
    setup: |
      Every undercover agent at the agency operates under the same basic protocol — they all have a move() operation for relocating between safe houses. But each agent type moves differently based on their cover identity: a courier drives, a sailor sails, a diplomat flies.
      Inheritance in Python models this perfectly. The parent class defines the shared operation; each subclass overrides it with its cover-specific implementation. The agency can treat all agents uniformly while each behaves distinctly.
    final_challenge_prompt: |
      Create the inheritance chain:
      — class Vehicle (the agent protocol) with move(self) returning "Moving"
      — class Car(Vehicle) with move(self) returning "Driving"
      — Create car = Car()
