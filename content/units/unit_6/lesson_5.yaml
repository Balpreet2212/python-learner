unit: 5
lesson: 5
xp: 10

example:
  code: |
    def set_level(level):
        if level < 1:
            raise ValueError("Level must be at least 1")
        if level > 100:
            raise ValueError("Level cannot exceed 100")
        return level

    print(set_level(50))

    try:
        print(set_level(0))
    except ValueError as e:
        print("Error:", e)
  explanation: |
    raise creates and immediately raises an exception. You choose the exception type (ValueError here) and give it a message.
    Callers can catch it with except, just like any built-in exception.
    This lets you enforce rules inside your functions: instead of silently returning a wrong value, you loudly report what went wrong.
  output: "50\nError: Level must be at least 1"

