      story_after: The tail slice is printed — the wizard notes the heaviest items are at the rear of the crate.
    - type: mcq
      question: What does this print?
      code: 'weights = [85, 92, 78, 95, 88]

        print(weights[2:4])'
      choices:
      - '[78, 95]'
      - '[92, 78]'
