title: "Slicing and Searching Lists"
xp: 12

exercises:
  - type: concept
    code: |
      nums = [10, 20, 30, 40, 50]
      print(nums[1:3])
      print(nums[:2])
      print(nums[3:])
      print(30 in nums)
      print(99 in nums)
    output: "[20, 30]\n[10, 20]\n[40, 50]\nTrue\nFalse"
    explanation: "Slicing extracts a portion: list[start:stop] (stop is exclusive). in checks membership — it returns True or False."

  - type: mcq
    question: "What does this print?"
    code: "letters = ['a', 'b', 'c', 'd', 'e']\nprint(letters[1:4])"
    choices: ["['b', 'c', 'd']", "['a', 'b', 'c']", "['c', 'd', 'e']", "['b', 'c', 'd', 'e']"]
    correct: "['b', 'c', 'd']"
    explanation: "letters[1:4] starts at index 1, stops before index 4: b, c, d."

  - type: fill_blank
    prompt: "Print only the first 3 items of the list."
    before: "items = [1, 2, 3, 4, 5]\nprint(items[:"
    after: "])"
    choices: ["3", "2", "4", "0"]
    answer: "3"
    explanation: "items[:3] takes the first 3 items: [1, 2, 3]."

  - type: mcq
    question: "What does this print?"
    code: "words = ['hello', 'world', 'python']\nprint('world' in words)"
    choices: ["True", "False", "world", "1"]
    correct: "True"
    explanation: "'world' is in the list, so in returns True."

  - type: arrange
    instruction: "Print the last 2 items of nums = [10, 20, 30, 40, 50]"
    blocks: ["nums", "=", "[", "10", ",", "20", ",", "30", ",", "40", ",", "50", "]", "print", "(", "nums", "[", "3", ":", "]", ")"]
    correct: ["nums", "=", "[", "10", ",", "20", ",", "30", ",", "40", ",", "50", "]", "print", "(", "nums", "[", "3", ":", "]", ")"]
    explanation: "nums[3:] starts at index 3 and goes to the end: [40, 50]."

  - type: mcq
    question: "What does this print?"
    code: "scores = [85, 92, 78, 95, 88]\nprint(scores[2:4])"
    choices: ["[78, 95]", "[92, 78]", "[78, 95, 88]", "[85, 92]"]
    correct: "[78, 95]"
    explanation: "scores[2:4] takes indices 2 and 3: 78 and 95."

  - type: fill_blank
    prompt: "Check whether 'grape' is present in the fruits list."
    before: "fruits = ['apple', 'banana', 'cherry']\nprint('grape' "
    after: " fruits)"
    choices: ["in", "not", "==", "is"]
    answer: "in"
    explanation: "'grape' in fruits checks if 'grape' is in the list. It is not, so it prints False."

  - type: mcq
    question: "What does this print?"
    code: "data = [1, 2, 3, 4, 5]\nprint(data[:3])"
    choices: ["[1, 2, 3]", "[1, 2]", "[2, 3, 4]", "[3, 4, 5]"]
    correct: "[1, 2, 3]"
    explanation: "data[:3] starts from the beginning and stops before index 3."

  - type: mcq
    question: "What does this print?"
    code: "names = ['Alice', 'Bob', 'Carol']\nprint('Bob' in names)\nprint('Dave' in names)"
    choices: ["True\nFalse", "False\nTrue", "True\nTrue", "False\nFalse"]
    correct: "True\nFalse"
    explanation: "'Bob' is in the list (True). 'Dave' is not (False)."

  - type: mini_code
    prompt: "Create a list of 5 numbers. Print a slice of the middle 3 items."
    starter: ""
    tests:
      - code: "assert '[' in _stdout and ']' in _stdout"
        message: "Should print the slice as a list"
      - code: "assert _stdout.count(',') == 2"
        message: "Slice of 3 items has 2 commas"

  - type: mini_code
    prompt: "Create a list called menu with 4 food items. Print True if 'pizza' is in menu, False if not. Then print the first 2 items."
    starter: ""
    tests:
      - code: "assert 'True' in _stdout or 'False' in _stdout"
        message: "Should print True or False for the in check"
      - code: "assert '[' in _stdout"
        message: "Should also print the first 2 items as a list"

