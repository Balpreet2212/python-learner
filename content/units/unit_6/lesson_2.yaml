title: Modifying Lists
xp: 12
exercises:
- type: concept
  code: 'tools = ["hammer", "drill"]

    tools.append("saw")

    print(tools)

    tools.remove("drill")

    print(tools)

    last = tools.pop()

    print(last)

    print(tools)

    '
  output: '[''hammer'', ''drill'', ''saw'']

    [''hammer'', ''saw'']

    saw

    [''hammer'']'
  explanation: append() adds to the end. remove() deletes the first matching item. pop() removes and returns the last item.
- type: mcq
  question: What does this print?
  code: 'nums = [1, 2, 3]

    nums.append(4)

    print(len(nums))'
  choices:
  - '4'
  - '3'
  - '5'
  - '1'
  correct: '4'
  explanation: append(4) adds 4 to the list. Length becomes 4.
- type: fill_blank
  prompt: Delete the item 'b' from the list by value.
  before: 'items = ["a", "b", "c"]

    items.'
  after: '("b")

    print(items)'
  choices:
  - remove
  - append
  - pop
  - delete
  answer: remove
  explanation: remove('b') finds and deletes the first 'b' from the list.
- type: mcq
  question: What does this print?
  code: 'stack = [10, 20, 30]

    val = stack.pop()

    print(val)

    print(stack)'
  choices:
  - '30

    [10, 20]'
  - '10

    [20, 30]'
  - '30

    [10, 20, 30]'
  - '20

    [10, 30]'
  correct: '30

    [10, 20]'
  explanation: pop() removes and returns the last item (30). The list becomes [10, 20].
- type: arrange
  instruction: Append 'potion' to inventory and print it
  blocks:
  - inventory
  - '='
  - '['
  - '"sword"'
  - ','
  - '"shield"'
  - ']'
  - inventory
  - .
  - append
  - (
  - '"potion"'
  - )
  - print
  - (
  - inventory
  - )
  correct:
  - inventory
  - '='
  - '['
  - '"sword"'
  - ','
  - '"shield"'
  - ']'
  - inventory
  - .
  - append
  - (
  - '"potion"'
  - )
  - print
  - (
  - inventory
  - )
  explanation: Call .append() on the list to add the item, then print.
- type: mcq
  question: What does this print?
  code: 'letters = ["x", "y", "z"]

    letters.remove("y")

    print(letters)'
  choices:
  - '[''x'', ''z'']'
  - '[''x'', ''y'']'
  - '[''y'', ''z'']'
  - '[''x'', ''y'', ''z'']'
  correct: '[''x'', ''z'']'
  explanation: remove('y') deletes 'y'. The list becomes ['x', 'z'].
- type: fill_blank
  prompt: Remove and capture the last item from the list.
  before: 'nums = [5, 10, 15]

    last = nums.'
  after: '()

    print(last)'
  choices:
  - pop
  - remove
  - append
  - len
  answer: pop
  explanation: pop() removes and returns the last item. last = 15.
- type: mcq
  question: What does this print?
  code: 'animals = ["cat", "dog", "bird"]

    animals.append("fish")

    animals.remove("dog")

    print(len(animals))'
  choices:
  - '3'
  - '4'
  - '2'
  - '1'
  correct: '3'
  explanation: Start with 3, append adds 1 (→4), remove deletes 1 (→3).
- type: mcq
  question: What does this print?
  code: 'q = [1, 2, 3]

    q.append(q.pop())

    print(q)'
  choices:
  - '[1, 2, 3]'
  - '[1, 2]'
  - '[3, 1, 2]'
  - '[1, 2, 3, 3]'
  correct: '[1, 2, 3]'
  explanation: pop() removes 3, then append(3) adds it back. No net change.
- type: mini_code
  prompt: Start with a list of 3 fruits. Append a 4th fruit, then remove the first fruit. Print the final list.
  starter: ''
  tests:
  - code: isinstance(eval(_stdout.strip()), list)
    message: Should print a list
  - code: len(eval(_stdout.strip())) == 3
    message: Final list should have 3 items
- type: mini_code
  prompt: Create a list called stack = [1, 2, 3, 4, 5]. Pop items until the list has 2 items. Print the list.
  starter: ''
  tests:
  - code: len(eval(_stdout.strip())) == 2
    message: Should have 2 items remaining
  - code: eval(_stdout.strip()) == [1, 2]
    message: Should be [1, 2]
worlds:
  fantasy:
    title: Packing and Repacking the Expedition Pack
    exercises:
    - type: concept
      code: 'supplies = ["rope", "torch"]

        supplies.append("bandage")

        print(supplies)

        supplies.remove("torch")

        print(supplies)

        last = supplies.pop()

        print(last)

        print(supplies)

        '
      output: '[''rope'', ''torch'', ''bandage'']

        [''rope'', ''bandage'']

        bandage

        [''rope'']'
      explanation: Brin updates the pack as the expedition needs change. append() adds a new supply to the end. remove() tosses
        out an unwanted item. pop() pulls the last item out and tells you what it was.
      story_before: The expedition plan keeps changing — Brin must learn to add, remove, and pull items from the supply list
        on the fly.
      story_after: 'Brin has the three core techniques down: append for loading, remove for discarding, pop for grabbing the
        last item.'
    - type: mcq
      question: What does this print?
      code: 'gear = [1, 2, 3]

        gear.append(4)

        print(len(gear))'
      choices:
      - '4'
      - '3'
      - '5'
      - '1'
      correct: '4'
      explanation: Brin appended one more piece of gear. The pack now holds 4 items.
      story_before: A new piece of gear just arrived — Brin needs to check how many items the pack holds after adding it.
      story_after: Four items confirmed after the addition — Brin tightens the straps and heads toward the gate.
    - type: fill_blank
      prompt: Brin needs to drop 'b' from the supply list by name.
      before: 'supplies = ["a", "b", "c"]

        supplies.'
      after: '("b")

        print(supplies)'
      choices:
      - remove
      - append
      - pop
      - delete
      answer: remove
      explanation: remove('b') finds the item by name and drops it from the pack.
      story_before: One supply on the list turned out to be a duplicate — Brin must drop it by name.
      story_after: The unwanted item is gone — the list is clean and every remaining supply is needed.
    - type: mcq
      question: What does this print?
      code: 'pack = [10, 20, 30]

        val = pack.pop()

        print(val)

        print(pack)'
      choices:
      - '30

        [10, 20]'
      - '10

        [20, 30]'
      - '30

        [10, 20, 30]'
      - '20

        [10, 30]'
      correct: '30

        [10, 20]'
      explanation: pop() pulls the last supply out of Brin's pack (30) and the pack shrinks to [10, 20].
      story_before: Brin reaches into the pack and pulls out the last item, checking what it was.
      story_after: The last supply is retrieved and identified — Brin tucks it aside and notes the pack is shorter by one.
    - type: arrange
      instruction: Append 'potion' to inventory and print it
      blocks:
      - inventory
      - '='
      - '['
      - '"sword"'
      - ','
      - '"shield"'
      - ']'
      - inventory
      - .
      - append
      - (
      - '"potion"'
      - )
      - print
      - (
      - inventory
      - )
      correct:
      - inventory
      - '='
      - '['
      - '"sword"'
      - ','
      - '"shield"'
      - ']'
      - inventory
      - .
      - append
      - (
      - '"potion"'
      - )
      - print
      - (
      - inventory
      - )
      explanation: Brin uses .append() to slip a potion into the inventory, then prints the updated pack.
      story_before: A potion arrived last minute and must be slipped into the inventory before departure.
      story_after: The potion is appended and the updated inventory printed — Brin is relieved nothing was forgotten.
    - type: mcq
      question: What does this print?
      code: 'gear = ["x", "y", "z"]

        gear.remove("y")

        print(gear)'
      choices:
      - '[''x'', ''z'']'
      - '[''x'', ''y'']'
      - '[''y'', ''z'']'
      - '[''x'', ''y'', ''z'']'
      correct: '[''x'', ''z'']'
      explanation: Brin removes 'y' from the pack. Only 'x' and 'z' remain.
      story_before: A damaged item needs to be struck from the gear list by name.
      story_after: The damaged gear is removed — the pack is lighter and every remaining item is serviceable.
    - type: fill_blank
      prompt: Brin pulls the last supply out of the pack and checks what it was.
      before: 'supplies = [5, 10, 15]

        last = supplies.'
      after: '()

        print(last)'
      choices:
      - pop
      - remove
      - append
      - len
      answer: pop
      explanation: pop() removes the last supply and returns it so Brin can see what was grabbed.
      story_before: Brin wants to pull the last supply from the crate and inspect it before the wizard arrives.
      story_after: The last item is popped and examined — Brin sets it on the table and awaits the wizard's verdict.
    - type: mcq
      question: What does this print?
      code: 'supplies = ["rope", "torch", "map"]

        supplies.append("canteen")

        supplies.remove("torch")

        print(len(supplies))'
      choices:
      - '3'
      - '4'
      - '2'
      - '1'
      correct: '3'
      explanation: Brin starts with 3, adds a canteen (4), then drops the torch (3). The pack has 3 items.
      story_before: After loading a new supply and dropping an old one, Brin needs to confirm the final item count.
      story_after: Three items remain — Brin knows the pack is manageable and the weight balanced.
    - type: mcq
      question: What does this print?
      code: 'q = [1, 2, 3]

        q.append(q.pop())

        print(q)'
      choices:
      - '[1, 2, 3]'
      - '[1, 2]'
      - '[3, 1, 2]'
      - '[1, 2, 3, 3]'
      correct: '[1, 2, 3]'
      explanation: Brin pops the last item and puts it right back. The pack is unchanged.
      story_before: The wizard tests Brin with a tricky pop-then-append puzzle to see if the pack truly changes.
      story_after: Brin sees through the trick — popping then re-appending the same item leaves the pack unchanged.
    - type: mini_code
      prompt: Start with a pack of 3 supplies. Add a 4th item, then drop the first one. Print the final pack.
      starter: ''
      tests:
      - code: isinstance(eval(_stdout.strip()), list)
        message: Should print a list
      - code: len(eval(_stdout.strip())) == 3
        message: Final list should have 3 items
      story_before: 'Brin practises a full restock: start with three supplies, add a fourth, drop the first, and show the
        final pack.'
      story_after: The pack is restocked correctly — Brin presents it to the wizard and earns an approving nod.
    - type: mini_code
      prompt: Create a list called stack = [1, 2, 3, 4, 5]. Pop items until the list has 2 items. Print the list.
      starter: ''
      tests:
      - code: len(eval(_stdout.strip())) == 2
        message: Pack should have 2 items left after Brin finishes popping
      - code: eval(_stdout.strip()) == [1, 2]
        message: Should be [1, 2]
      story_before: 'The wizard sets a final challenge: reduce a five-item stack down to just two by popping, then display
        what remains.'
      story_after: Only two items remain in the crate — Brin has mastered adding and removing supplies, and the expedition
        roster is locked in.
    - type: break_fix
      story_before: Elara is repacking the supply crate and tries to add a key to her ingredient list using the wrong spell
        — .add() does not exist for lists and the workshop fills with a crackling AttributeError.
      story_after: The list expands correctly and the crate now shows all three supplies ready for departure.
      prompt: Fix the code so the key is added to the list and the full list is printed.
      broken_code: 'items = ["potion", "scroll"]

        items.add("key")

        print(items)'
      hint: Lists do not have an .add() method — look for the correct method to add an item to the end.
      explanation: .add() is a set method, not a list method. To add an item to the end of a list, use .append(); items.append('key')
        gives ['potion', 'scroll', 'key'].
      tests:
      - code: assert _stdout.strip() == "['potion', 'scroll', 'key']"
        message: Should print ['potion', 'scroll', 'key']
