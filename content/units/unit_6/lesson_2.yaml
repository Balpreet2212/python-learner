title: "Modifying Lists"
xp: 12

exercises:
  - type: concept
    code: |
      tools = ["hammer", "drill"]
      tools.append("saw")
      print(tools)
      tools.remove("drill")
      print(tools)
      last = tools.pop()
      print(last)
      print(tools)
    output: "['hammer', 'drill', 'saw']\n['hammer', 'saw']\nsaw\n['hammer']"
    explanation: "append() adds to the end. remove() deletes the first matching item. pop() removes and returns the last item."

  - type: mcq
    question: "What does this print?"
    code: "nums = [1, 2, 3]\nnums.append(4)\nprint(len(nums))"
    choices: ["4", "3", "5", "1"]
    correct: "4"
    explanation: "append(4) adds 4 to the list. Length becomes 4."

  - type: fill_blank
    prompt: "Delete the item 'b' from the list by value."
    before: "items = [\"a\", \"b\", \"c\"]\nitems."
    after: "(\"b\")\nprint(items)"
    choices: ["remove", "append", "pop", "delete"]
    answer: "remove"
    explanation: "remove('b') finds and deletes the first 'b' from the list."

  - type: mcq
    question: "What does this print?"
    code: "stack = [10, 20, 30]\nval = stack.pop()\nprint(val)\nprint(stack)"
    choices: ["30\n[10, 20]", "10\n[20, 30]", "30\n[10, 20, 30]", "20\n[10, 30]"]
    correct: "30\n[10, 20]"
    explanation: "pop() removes and returns the last item (30). The list becomes [10, 20]."

  - type: arrange
    instruction: "Append 'potion' to inventory and print it"
    blocks: ["inventory", "=", "[", "\"sword\"", ",", "\"shield\"", "]", "inventory", ".", "append", "(", "\"potion\"", ")", "print", "(", "inventory", ")"]
    correct: ["inventory", "=", "[", "\"sword\"", ",", "\"shield\"", "]", "inventory", ".", "append", "(", "\"potion\"", ")", "print", "(", "inventory", ")"]
    explanation: "Call .append() on the list to add the item, then print."

  - type: mcq
    question: "What does this print?"
    code: "letters = [\"x\", \"y\", \"z\"]\nletters.remove(\"y\")\nprint(letters)"
    choices: ["['x', 'z']", "['x', 'y']", "['y', 'z']", "['x', 'y', 'z']"]
    correct: "['x', 'z']"
    explanation: "remove('y') deletes 'y'. The list becomes ['x', 'z']."

  - type: fill_blank
    prompt: "Remove and capture the last item from the list."
    before: "nums = [5, 10, 15]\nlast = nums."
    after: "()\nprint(last)"
    choices: ["pop", "remove", "append", "len"]
    answer: "pop"
    explanation: "pop() removes and returns the last item. last = 15."

  - type: mcq
    question: "What does this print?"
    code: "animals = [\"cat\", \"dog\", \"bird\"]\nanimals.append(\"fish\")\nanimals.remove(\"dog\")\nprint(len(animals))"
    choices: ["3", "4", "2", "1"]
    correct: "3"
    explanation: "Start with 3, append adds 1 (→4), remove deletes 1 (→3)."

  - type: mcq
    question: "What does this print?"
    code: "q = [1, 2, 3]\nq.append(q.pop())\nprint(q)"
    choices: ["[1, 2, 3]", "[1, 2]", "[3, 1, 2]", "[1, 2, 3, 3]"]
    correct: "[1, 2, 3]"
    explanation: "pop() removes 3, then append(3) adds it back. No net change."

  - type: mini_code
    prompt: "Start with a list of 3 fruits. Append a 4th fruit, then remove the first fruit. Print the final list."
    starter: ""
    tests:
      - code: "isinstance(eval(_stdout.strip()), list)"
        message: "Should print a list"
      - code: "len(eval(_stdout.strip())) == 3"
        message: "Final list should have 3 items"

  - type: mini_code
    prompt: "Create a list called stack = [1, 2, 3, 4, 5]. Pop items until the list has 2 items. Print the list."
    starter: ""
    tests:
      - code: "len(eval(_stdout.strip())) == 2"
        message: "Should have 2 items remaining"
      - code: "eval(_stdout.strip()) == [1, 2]"
        message: "Should be [1, 2]"

worlds:
  fantasy:
    title: "Packing and Repacking the Expedition Pack"
    exercises:
      - type: concept
        code: |
          supplies = ["rope", "torch"]
          supplies.append("bandage")
          print(supplies)
          supplies.remove("torch")
          print(supplies)
          last = supplies.pop()
          print(last)
          print(supplies)
        output: "['rope', 'torch', 'bandage']\n['rope', 'bandage']\nbandage\n['rope']"
        explanation: "Brin updates the pack as the expedition needs change. append() adds a new supply to the end. remove() tosses out an unwanted item. pop() pulls the last item out and tells you what it was."

      - type: mcq
        question: "What does this print?"
        code: "gear = [1, 2, 3]\ngear.append(4)\nprint(len(gear))"
        choices: ["4", "3", "5", "1"]
        correct: "4"
        explanation: "Brin appended one more piece of gear. The pack now holds 4 items."

      - type: fill_blank
        prompt: "Brin needs to drop 'b' from the supply list by name."
        before: "supplies = [\"a\", \"b\", \"c\"]\nsupplies."
        after: "(\"b\")\nprint(supplies)"
        choices: ["remove", "append", "pop", "delete"]
        answer: "remove"
        explanation: "remove('b') finds the item by name and drops it from the pack."

      - type: mcq
        question: "What does this print?"
        code: "pack = [10, 20, 30]\nval = pack.pop()\nprint(val)\nprint(pack)"
        choices: ["30\n[10, 20]", "10\n[20, 30]", "30\n[10, 20, 30]", "20\n[10, 30]"]
        correct: "30\n[10, 20]"
        explanation: "pop() pulls the last supply out of Brin's pack (30) and the pack shrinks to [10, 20]."

      - type: arrange
        instruction: "Append 'potion' to inventory and print it"
        blocks: ["inventory", "=", "[", "\"sword\"", ",", "\"shield\"", "]", "inventory", ".", "append", "(", "\"potion\"", ")", "print", "(", "inventory", ")"]
        correct: ["inventory", "=", "[", "\"sword\"", ",", "\"shield\"", "]", "inventory", ".", "append", "(", "\"potion\"", ")", "print", "(", "inventory", ")"]
        explanation: "Brin uses .append() to slip a potion into the inventory, then prints the updated pack."

      - type: mcq
        question: "What does this print?"
        code: "gear = [\"x\", \"y\", \"z\"]\ngear.remove(\"y\")\nprint(gear)"
        choices: ["['x', 'z']", "['x', 'y']", "['y', 'z']", "['x', 'y', 'z']"]
        correct: "['x', 'z']"
        explanation: "Brin removes 'y' from the pack. Only 'x' and 'z' remain."

      - type: fill_blank
        prompt: "Brin pulls the last supply out of the pack and checks what it was."
        before: "supplies = [5, 10, 15]\nlast = supplies."
        after: "()\nprint(last)"
        choices: ["pop", "remove", "append", "len"]
        answer: "pop"
        explanation: "pop() removes the last supply and returns it so Brin can see what was grabbed."

      - type: mcq
        question: "What does this print?"
        code: "supplies = [\"rope\", \"torch\", \"map\"]\nsupplies.append(\"canteen\")\nsupplies.remove(\"torch\")\nprint(len(supplies))"
        choices: ["3", "4", "2", "1"]
        correct: "3"
        explanation: "Brin starts with 3, adds a canteen (4), then drops the torch (3). The pack has 3 items."

      - type: mcq
        question: "What does this print?"
        code: "q = [1, 2, 3]\nq.append(q.pop())\nprint(q)"
        choices: ["[1, 2, 3]", "[1, 2]", "[3, 1, 2]", "[1, 2, 3, 3]"]
        correct: "[1, 2, 3]"
        explanation: "Brin pops the last item and puts it right back. The pack is unchanged."

      - type: mini_code
        prompt: "Start with a pack of 3 supplies. Add a 4th item, then drop the first one. Print the final pack."
        starter: ""
        tests:
          - code: "isinstance(eval(_stdout.strip()), list)"
            message: "Should print a list"
          - code: "len(eval(_stdout.strip())) == 3"
            message: "Final list should have 3 items"

      - type: mini_code
        prompt: "Create a list called stack = [1, 2, 3, 4, 5]. Pop items until the list has 2 items. Print the list."
        starter: ""
        tests:
          - code: "len(eval(_stdout.strip())) == 2"
            message: "Pack should have 2 items left after Brin finishes popping"
          - code: "eval(_stdout.strip()) == [1, 2]"
            message: "Should be [1, 2]"

