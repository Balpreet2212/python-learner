xp: 150

code_starter: |
  hp = 85
  mp = 40
  level = 11

  # Print the player's status using if / elif / elif / else:
  #   "Defeated"  if hp <= 0
  #   "Critical"  if hp < 20 or mp < 10
  #   "Elite"     if level >= 10 and hp >= 80
  #   "Active"    otherwise

hints:
  - "Check hp <= 0 first — a defeated player has no other status"
  - "The Critical branch uses 'or' — either low hp or low mp triggers it"
  - "The Elite branch uses 'and' — both conditions must hold"
  - "The final else covers everyone who doesn't match a previous branch"

plan_prompts:
  - "Why does the order of the branches matter here?"
  - "Which branch uses 'or'? Which uses 'and'?"
  - "Walk through hp=85, mp=40, level=11 step by step — which branch does it reach?"

tests:
  - code: "_stdout.strip() == 'Elite'"
    message: "hp=85, mp=40, level=11 — not defeated, not critical, level >= 10 and hp >= 80 → Elite"

worlds:
  fantasy:
    title: "The Arcane Status Orb"
    narrative: |
      The Guild's orb assigns every adventurer a status before they enter
      the dungeon. The rules are checked in strict order: a fallen warrior
      is Defeated before anything else; a wounded or drained one is
      Critical; a veteran in peak condition is Elite; everyone else is Active.

      Your adventurer has hp = 85, mp = 40, level = 11. Write the
      if/elif/else chain that prints the correct status.
    story_beat: |
      The orb blazes gold — Elite. The guildmaster marks the ledger.
      "Your logic is sound. The dungeon awaits a warrior in peak condition."
  scifi:
    title: "Crew Combat Readiness"
    narrative: |
      The ship's readiness system evaluates each crew member before a
      mission. Conditions are checked in priority order — total
      incapacitation first, then resource drain, then peak performance,
      then standard readiness.

      Crew stats: hp = 85, mp = 40, level = 11. Write the if/elif/else
      block that prints the correct status.
    story_beat: |
      ELITE flashes on the mission board. "Cleared for high-risk
      assignment," the AI confirms. The crew member heads to the airlock.
  mystery:
    title: "The Detective's Fitness Report"
    narrative: |
      Before each case the bureau runs a fitness check. Rules are applied
      in order: incapacitated detectives are Defeated first; those low on
      resources or health are Critical; seasoned veterans in excellent
      shape are Elite; the rest are Active.

      Detective stats: hp = 85, mp = 40, level = 11. Print the status.
    story_beat: |
      "Elite," prints the terminal. Inspector Morgan slides a thick case
      file across the desk. "This one needs your best. You're cleared."
