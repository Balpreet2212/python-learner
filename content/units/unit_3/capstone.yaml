unit: 2
xp: 150

plan_prompts:
  - "What three inputs does the function receive?"
  - "What are all the possible outputs?"
  - "In what order should you check the conditions?"
  - "Which operator — and / or — do you need, and where?"

code_starter: |
  def check_status(hp, mp, level):
      # Return a status string based on the conditions below:
      # If hp <= 0: return "Defeated"
      # Elif hp < 20 or mp < 10: return "Critical"
      # Elif level >= 10 and hp >= 80: return "Elite"
      # Else: return "Active"
      pass

hints:
  - "Check hp <= 0 first — a defeated character has no other status"
  - "The Critical branch uses 'or': either resource being low triggers it"
  - "The Elite branch uses 'and': both conditions must be true"
  - "The final else covers everything that doesn't match above"

tests:
  - code: |
      result = check_status(0, 50, 5)
      assert result == "Defeated", f"Expected 'Defeated', got '{result}'"
    message: "Returns 'Defeated' when hp is 0"
  - code: |
      result = check_status(15, 50, 5)
      assert result == "Critical", f"Expected 'Critical', got '{result}'"
    message: "Returns 'Critical' when hp < 20"
  - code: |
      result = check_status(50, 5, 5)
      assert result == "Critical", f"Expected 'Critical', got '{result}'"
    message: "Returns 'Critical' when mp < 10"
  - code: |
      result = check_status(90, 60, 12)
      assert result == "Elite", f"Expected 'Elite', got '{result}'"
    message: "Returns 'Elite' when level >= 10 and hp >= 80"
  - code: |
      result = check_status(50, 50, 5)
      assert result == "Active", f"Expected 'Active', got '{result}'"
    message: "Returns 'Active' for a healthy, mid-level character"

worlds:
  fantasy:
    title: "The Arcane Status Orb"
    narrative: |
      The Guild's status orb assigns every adventurer a rank based on their
      current condition. The orb has malfunctioned — it returns the same label
      for everyone regardless of their stats. Adventurers are walking into
      dungeons unmarked.

      Write a function called check_status(hp, mp, level) that returns the
      correct status string using if/elif/else:
      - "Defeated" when hp <= 0
      - "Critical" when hp < 20 or mp < 10
      - "Elite" when level >= 10 and hp >= 80
      - "Active" for everyone else
    story_beat: |
      The orb pulses with colour — crimson for Defeated, amber for Critical,
      gold for Elite, steady blue for Active. Adventurers file past, each
      receiving the right assessment for the first time in weeks.

      "Well done," the Guild Master says. "A warrior who doesn't know their
      status is a warrior who doesn't come home."
  scifi:
    title: "Crew Combat Readiness"
    narrative: |
      The ship's AI evaluates crew readiness before every mission. A recent
      firmware wipe erased the classification logic — now every crew member
      shows "Unknown" regardless of their condition. Command won't authorise
      launch without it.

      Write check_status(hp, mp, level) to restore the readiness system:
      - "Defeated" when hp <= 0
      - "Critical" when hp < 20 or mp < 10
      - "Elite" when level >= 10 and hp >= 80
      - "Active" for all other crew
    story_beat: |
      The readiness panel flickers back to life. Crew statuses cascade down
      the display — Defeated, Critical, Elite, Active — each correctly tagged.
      The mission commander gives a thumbs-up. "Launch window is open.
      Good work getting the system back online."
  mystery:
    title: "The Detective's Condition Report"
    narrative: |
      The agency's case-assignment algorithm evaluates each detective's fitness
      before handing out a new case. A database corruption wiped the evaluation
      logic — every detective now shows "Unknown" and no cases are being assigned.

      Restore the function check_status(hp, mp, level):
      - "Defeated" when hp <= 0
      - "Critical" when hp < 20 or mp < 10
      - "Elite" when level >= 10 and hp >= 80
      - "Active" for detectives in good standing
    story_beat: |
      The assignment board refreshes. Detectives are sorted into their correct
      categories and cases start flowing again. Inspector Morgan looks up from
      her desk. "The right detective on the right case — that's how this agency
      works. You kept it running."
