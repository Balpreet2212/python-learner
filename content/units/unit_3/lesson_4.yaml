title: Conditions with and / or
xp: 12
exercises:
- type: concept
  code: "age = 17\nhas_ticket = True\nif age >= 18 and has_ticket:\n    print(\"Enter\")\nelse:\n    print(\"Denied\")\n"
  output: Denied
  explanation: Combining comparisons in if conditions with and/or lets you check multiple things at once.
- type: mcq
  question: What does this print?
  code: "x = 5\nif x > 0 and x < 10:\n    print(\"in range\")"
  choices:
  - in range
  - Nothing
  - 'True'
  - x
  correct: in range
  explanation: Both x > 0 (True) and x < 10 (True) are True, so the if block runs.
- type: fill_blank
  prompt: Require both conditions to be true to identify someone as a teenager.
  before: 'if age >= 13 '
  after: " age <= 19:\n    print(\"teenager\")"
  choices:
  - and
  - or
  - not
  - ==
  answer: and
  explanation: 'Both conditions must be True: age >= 13 AND age <= 19.'
- type: mcq
  question: What does this print?
  code: "score = 45\nif score < 0 or score > 100:\n    print(\"invalid\")\nelse:\n    print(\"valid\")"
  choices:
  - valid
  - invalid
  - '45'
  - Nothing
  correct: valid
  explanation: score < 0 is False and score > 100 is False. False or False = False, so else runs.
- type: arrange
  instruction: Build code that prints 'qualified' when name is not empty and score is 50 or above
  blocks:
  - if
  - name
  - and
  - score
  - '>='
  - '50'
  - ':'
  - print
  - (
  - '"qualified"'
  - )
  correct:
  - if
  - name
  - and
  - score
  - '>='
  - '50'
  - ':'
  - print
  - (
  - '"qualified"'
  - )
  explanation: name is truthy when non-empty. Both conditions must hold.
- type: mcq
  question: What does this print?
  code: "is_raining = True\nhas_umbrella = False\nif not (is_raining and not has_umbrella):\n    print(\"go outside\")\nelse:\n\
    \    print(\"stay inside\")"
  choices:
  - stay inside
  - go outside
  - 'True'
  - 'False'
  correct: stay inside
  explanation: is_raining is True, not has_umbrella is True. True and True = True. not True = False. else runs.
- type: fill_blank
  prompt: Grant access only when both username and password match.
  before: 'if username == "admin" '
  after: " password == \"1234\":\n    print(\"access\")"
  choices:
  - and
  - or
  - not
  - if
  answer: and
  explanation: Both username AND password must match to grant access.
- type: mcq
  question: Which condition is True when n is outside the range 1 to 100?
  code: ''
  choices:
  - n < 1 or n > 100
  - n < 1 and n > 100
  - not n >= 1 and n <= 100
  - n <= 0 and n >= 101
  correct: n < 1 or n > 100
  explanation: Outside the range means less than 1 OR greater than 100.
- type: mcq
  question: What does this print?
  code: "hp = 30\nshield = True\nif hp > 20 and shield:\n    print(\"safe\")\nelse:\n    print(\"danger\")"
  choices:
  - safe
  - danger
  - 'safe

    danger'
  - 'True'
  correct: safe
  explanation: hp > 20 is True and shield is True. True and True = True. 'safe' prints.
- type: mini_code
  prompt: Read score then passed_exam ('True'/'False') with input(). Print 'pass' if score is 50 or above AND passed_exam
    is True, else print 'fail'.
  starter: 'score = int(input())

    passed_exam = input() == ''True''

    '
  tests:
  - code: assert _stdout.strip() == 'fail'
    stdin: '55

      False'
    message: 'score=55, passed_exam=False: condition fails, prints ''fail'''
  - code: assert _stdout.strip() == 'pass'
    stdin: '55

      True'
    message: 'score=55, passed_exam=True: both met, prints ''pass'''
  - code: assert _stdout.strip() == 'fail'
    stdin: '40

      True'
    message: score=40 is below 50, prints 'fail'
- type: mini_code
  prompt: Read an hour with input(). Print 'open' if the hour is between 9 and 17 (inclusive), else print 'closed'.
  starter: 'hour = int(input())

    '
  tests:
  - code: assert _stdout.strip() == 'open'
    stdin: '14'
    message: 14 is between 9 and 17, prints 'open'
  - code: assert _stdout.strip() == 'closed'
    stdin: '7'
    message: 7 is before 9, prints 'closed'
  - code: assert _stdout.strip() == 'closed'
    stdin: '18'
    message: 18 is after 17, prints 'closed'
