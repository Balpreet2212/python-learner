unit: 2
lesson: 4
xp: 10

example:
  code: |
    age = 20
    has_pass = True
    if age >= 18 and has_pass:
        print("Entry granted")
    else:
        print("Entry denied")
  explanation: |
    'and' requires BOTH conditions to be True for the whole expression to be True.
    'or' requires at least ONE condition to be True.
    Here both age >= 18 and has_pass are True, so "Entry granted" prints.
    Change either one to False and the else branch runs instead.
  output: "Entry granted"

code_starter: |
  level = 8
  coins = 150
  # If level >= 5 AND coins >= 100, print "Can buy", else print "Cannot buy"
hints:
  - "if level >= 5 and coins >= 100:"
  - "Both conditions must be True for 'and' to pass"
tests:
  - code: "assert level == 8 and coins == 150"
    message: "level and coins should not be changed"
  - code: "assert 'Can buy' in _stdout"
    message: "Should print 'Can buy' when both conditions pass"
  - code: "assert 'Cannot buy' not in _stdout"
    message: "Should not print 'Cannot buy'"

final_challenge:
  code_starter: |
    hp = 25
    mp = 10
    # Print "Critical" if hp < 30 OR mp < 20, else print "Stable"
  hints:
    - "if hp < 30 or mp < 20:"
    - "'or' is True when at least one condition is True"
  tests:
    - code: "assert hp == 25 and mp == 10"
      message: "hp and mp should not be changed"
    - code: "assert 'Critical' in _stdout"
      message: "Should print 'Critical' when hp < 30 or mp < 20"
    - code: "assert 'Stable' not in _stdout"
      message: "Should not print 'Stable'"

worlds:
  fantasy:
    title: "The Enchanted Market"
    setup: |
      The market stall requires two things: enough level and enough coins.
      In Python, 'and' combines conditions so both must be True. 'or' means
      at least one must be True. They let you express more precise rules.

      level is 8, coins is 150. Write: if level >= 5 and coins >= 100 print
      "Can buy", else print "Cannot buy". Both conditions must hold.
    final_challenge_prompt: |
      The healer flags critical status when either hp or mp is low.
      hp is 25, mp is 10. Print "Critical" if hp < 30 or mp < 20,
      otherwise print "Stable".
  scifi:
    title: "Docking Clearance"
    setup: |
      Docking requires both a valid crew level AND enough fuel credits.
      Python's 'and' operator ensures both gates pass before entry is granted.
      'or' would open the gate for either — use the right operator for the rule.

      level is 8, coins is 150. Write: if level >= 5 and coins >= 100 print
      "Can buy", else print "Cannot buy".
    final_challenge_prompt: |
      The ship monitors both hull points and energy. Either reading below threshold
      triggers an alert. hp is 25, mp is 10. Print "Critical" if hp < 30 or
      mp < 20, otherwise print "Stable".
  mystery:
    title: "Two Clues, One Verdict"
    setup: |
      Two pieces of evidence together seal a case. In Python, 'and' means both
      conditions must be True. 'or' means either one is enough. Choosing the
      right operator is as important as choosing the right clue.

      level is 8, coins is 150. If level >= 5 and coins >= 100, print "Can buy",
      else print "Cannot buy". Both requirements must be satisfied.
    final_challenge_prompt: |
      A suspect is flagged if either alibi score or evidence count falls below
      threshold. hp is 25, mp is 10. Print "Critical" if hp < 30 or mp < 20,
      otherwise print "Stable".
