unit: 3
lesson: 4
xp: 10

example:
  code: |
    def is_adult(age):
        return age >= 18

    print(is_adult(20))
    print(is_adult(15))
    print(type(is_adult(20)))
  explanation: |
    A predicate function is one that returns True or False.
    The expression age >= 18 already evaluates to a boolean — you can return it directly.
    There's no need to write if/else just to return True or False;
    returning the comparison directly is cleaner and more Pythonic.
  output: "True\nFalse\n<class 'bool'>"

code_starter: |
  # Define a function 'is_even' that takes one parameter n
  # and returns True if n is even, False otherwise.
  def is_even(n):

  check_four  = is_even(4)
  check_seven = is_even(7)
hints:
  - "n % 2 == 0 is True when n is even (no remainder when divided by 2)"
  - "return n % 2 == 0  — this expression already evaluates to True or False"
tests:
  - code: "assert is_even(4) is True, 'is_even(4) should be True'"
    message: "is_even(4) should return True"
  - code: "assert is_even(7) is False, 'is_even(7) should be False'"
    message: "is_even(7) should return False"
  - code: "assert is_even(0) is True"
    message: "is_even(0) should return True"

final_challenge:
  code_starter: |
    # Define a function that checks if a level qualifies as powerful
  hints:
    - "def is_powerful(level):  — one parameter"
    - "    return level >= 10  — True if level is 10 or more"
    - "is_powerful(10) should be True, is_powerful(5) should be False"
  tests:
    - code: "assert is_powerful(10) is True"
      message: "is_powerful(10) should return True"
    - code: "assert is_powerful(9) is False"
      message: "is_powerful(9) should return False"
    - code: "assert is_powerful(5) is False"
      message: "is_powerful(5) should return False"
    - code: "assert is_powerful(100) is True"
      message: "is_powerful(100) should return True"

worlds:
  fantasy:
    title: "The Parity Oracle"
    setup: |
      The oracle must judge each number: balanced (even) or off-balance (odd).
      "A function that returns True or False is called a predicate," Elara says.
      "The modulus operator % gives the remainder after division — if n % 2 == 0,
      the number divides evenly."

      Write 'is_even(n)' that returns the boolean result directly. No if/else needed
      — the comparison itself is already True or False.
    final_challenge_prompt: |
      The enchanted gate only opens for heroes of level 10 or above. Define a
      function called is_powerful that takes a level parameter and returns True
      if level >= 10, False otherwise. Return the comparison directly.
  scifi:
    title: "Binary Parity Check"
    setup: |
      The ship's checksum system flags odd readings as anomalies. "Functions that
      return booleans are common in real code," the AI notes. "The % operator gives
      the remainder — n % 2 == 0 is already a boolean expression you can return
      directly."

      Write 'is_even(n)' returning True for even numbers.
    final_challenge_prompt: |
      The clearance system grants access only to crew members with a level of 10
      or higher. Define is_powerful(level) that returns True when level >= 10 and
      False otherwise. Return the comparison directly — no if needed.
  mystery:
    title: "The Even-Odd Cipher"
    setup: |
      The coded message uses even numbers as signals. "A function that checks a
      condition and returns a boolean is called a predicate," your mentor explains.
      "n % 2 gives the remainder when dividing by 2 — if it's 0, the number is even."

      Write 'is_even(n)' that returns the result of n % 2 == 0.
    final_challenge_prompt: |
      The security clearance check requires a threat level of 10 or above to
      trigger the alarm. Define is_powerful(level) returning True if level >= 10.
      The function should return the boolean comparison directly.
