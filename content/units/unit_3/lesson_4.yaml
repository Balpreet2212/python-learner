unit: 2
lesson: 4
xp: 10

example:
  code: |
    temps = [18, 25, 12, 31, 22]
    highest = temps[0]
    for t in temps:
        if t > highest:
            highest = t
    print("Highest:", highest)
  explanation: |
    To find the maximum in a list, keep a "running best" variable.
    Start by assuming the first element is the best (highest = temps[0]).
    Then loop through every item: if the current item beats the best, update it.
    After the loop, highest holds the largest value in the list.
    This pattern works for any comparison — min, max, first match, etc.
  output: "Highest: 31"

