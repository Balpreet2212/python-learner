title: "if Statements"
xp: 12

exercises:
  - type: concept
    code: |
      score = 85
      if score >= 60:
          print("You passed!")
    output: "You passed!"
    explanation: "The if statement runs a block only when the condition is True. The indented lines belong to the if block."

  - type: mcq
    question: "What does this print?"
    code: "age = 10\nif age < 13:\n    print(\"child\")"
    choices: ["child", "Nothing", "age", "True"]
    correct: "child"
    explanation: "10 < 13 is True, so the indented print runs."

  - type: fill_blank
    prompt: "Trigger 'game over' only when hp has reached exactly zero."
    before: "hp = 0\nif hp "
    after: " 0:\n    print(\"game over\")"
    choices: ["==", "=", "!=", ">="]
    answer: "=="
    explanation: "== checks equality. if hp == 0 runs when hp is exactly 0."

  - type: arrange
    instruction: "Build an if statement that prints 'win' when score > 100"
    blocks: ["if", "score", ">", "100", ":", "print", "(", "\"win\"", ")"]
    correct: ["if", "score", ">", "100", ":", "print", "(", "\"win\"", ")"]
    explanation: "The colon : ends the if condition. The print is indented inside the block."

  - type: mcq
    question: "What does this print?"
    code: "x = 5\nif x > 10:\n    print(\"big\")\nprint(\"done\")"
    choices: ["done", "big\ndone", "big", "Nothing"]
    correct: "done"
    explanation: "x > 10 is False (5 is not > 10), so the if block is skipped. But print('done') runs always."

  - type: mcq
    question: "What does this print?"
    code: "name = \"Alice\"\nif name == \"Alice\":\n    print(\"Hello, Alice!\")"
    choices: ["Hello, Alice!", "Nothing", "name", "Alice"]
    correct: "Hello, Alice!"
    explanation: "name == 'Alice' is True, so the block executes."

  - type: fill_blank
    prompt: "Start a conditional block that checks whether the level requirement is met."
    before: "level = 5\n"
    after: " level >= 5:\n    print(\"unlocked\")"
    choices: ["if", "for", "while", "def"]
    answer: "if"
    explanation: "if starts a conditional block. When level >= 5 is True, 'unlocked' prints."

  - type: mcq
    question: "What does this print?"
    code: "n = 4\nif n % 2 == 0:\n    print(\"even\")"
    choices: ["even", "Nothing", "True", "0"]
    correct: "even"
    explanation: "4 % 2 == 0 is True (4 is divisible by 2). So 'even' prints."

  - type: arrange
    instruction: "Build code: if health is 0, print 'dead'"
    blocks: ["if", "health", "==", "0", ":", "print", "(", "\"dead\"", ")"]
    correct: ["if", "health", "==", "0", ":", "print", "(", "\"dead\"", ")"]
    explanation: "== checks if health equals 0. The colon ends the condition."

  - type: mcq
    question: "Which if statement correctly checks that a number n is positive?"
    code: ""
    choices: ["if n > 0:", "if n = 0:", "if n >= 0:", "if n == positive:"]
    correct: "if n > 0:"
    explanation: "n > 0 is True for any number greater than zero."

  - type: mini_code
    prompt: "Set temperature = 37. If it is greater than 36.5, print 'fever'."
    starter: "temperature = 37\n"
    tests:
      - code: "'fever' in _stdout"
        message: "37 > 36.5 so should print 'fever'"

  - type: mini_code
    prompt: "Set password = 'secret123'. If its length is at least 8, print 'strong password'."
    starter: "password = 'secret123'\n"
    tests:
      - code: "'strong password' in _stdout"
        message: "len('secret123') = 9 >= 8, so should print 'strong password'"

worlds:
  fantasy:
    title: "The Gate of Truth"
  scifi:
    title: "System Checks"
  mystery:
    title: "The First Clue"
