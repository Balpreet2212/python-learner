title: if / else
xp: 12
exercises:
- type: concept
  code: "score = 45\nif score >= 60:\n    print(\"Passed\")\nelse:\n    print(\"Failed\")\n"
  output: Failed
  explanation: else runs when the if condition is False. Exactly one branch always executes.
- type: mcq
  question: What does this print?
  code: "x = 3\nif x > 5:\n    print(\"big\")\nelse:\n    print(\"small\")"
  choices:
  - small
  - big
  - 'big

    small'
  - Nothing
  correct: small
  explanation: x > 5 is False (3 is not > 5), so the else branch runs.
- type: arrange
  instruction: Build an if/else that prints 'even' when n is divisible by 2, otherwise prints 'odd'
  blocks:
  - if
  - n
  - '%'
  - '2'
  - ==
  - '0'
  - ':'
  - print
  - (
  - '"even"'
  - )
  - else
  - ':'
  - print
  - (
  - '"odd"'
  - )
  correct:
  - if
  - n
  - '%'
  - '2'
  - ==
  - '0'
  - ':'
  - print
  - (
  - '"even"'
  - )
  - else
  - ':'
  - print
  - (
  - '"odd"'
  - )
  explanation: The if checks divisibility. else catches when n is odd.
- type: fill_blank
  prompt: Handle the case when the user is not logged in.
  before: "if logged_in:\n    print(\"Welcome\")\n"
  after: ":\n    print(\"Please log in\")"
  choices:
  - else
  - elif
  - if
  - then
  answer: else
  explanation: else catches the case when logged_in is False.
- type: mcq
  question: What does this print?
  code: "temp = 100\nif temp > 50:\n    print(\"hot\")\nelse:\n    print(\"cold\")"
  choices:
  - hot
  - cold
  - 'hot

    cold'
  - Nothing
  correct: hot
  explanation: 100 > 50 is True, so the if branch runs and else is skipped.
- type: mcq
  question: What does this print?
  code: "name = \"\"\nif name:\n    print(\"Hello, \" + name)\nelse:\n    print(\"No name\")"
  choices:
  - No name
  - 'Hello, '
  - 'Hello,

    No name'
  - Error
  correct: No name
  explanation: An empty string is falsy. The else branch runs.
- type: fill_blank
  prompt: Assign 'minor' status for everyone who doesn't meet the age condition.
  before: "if age >= 18:\n    status = \"adult\"\n"
  after: ":\n    status = \"minor\""
  choices:
  - else
  - elif
  - if not
  - then
  answer: else
  explanation: else handles the case where age < 18.
- type: mcq
  question: What does this print?
  code: "n = 0\nif n:\n    print(\"truthy\")\nelse:\n    print(\"falsy\")"
  choices:
  - falsy
  - truthy
  - '0'
  - None
  correct: falsy
  explanation: 0 is falsy, so the else branch runs.
- type: arrange
  instruction: Build code that prints 'alive' when hp is greater than zero, and 'dead' otherwise
  blocks:
  - if
  - hp
  - '>'
  - '0'
  - ':'
  - print
  - (
  - '"alive"'
  - )
  - else
  - ':'
  - print
  - (
  - '"dead"'
  - )
  correct:
  - if
  - hp
  - '>'
  - '0'
  - ':'
  - print
  - (
  - '"alive"'
  - )
  - else
  - ':'
  - print
  - (
  - '"dead"'
  - )
  explanation: The else handles the hp == 0 case.
- type: mcq
  question: How many branches run in an if/else statement?
  code: ''
  choices:
  - Exactly one
  - Both
  - None if condition is False
  - Two always
  correct: Exactly one
  explanation: Either the if block or the else block runs — never both, never neither.
- type: mini_code
  prompt: Read a number with input(). Print 'odd' if it is odd, 'even' if it is even.
  starter: 'n = int(input())

    '
  tests:
  - code: assert _stdout.strip() == 'odd'
    stdin: '7'
    message: 7 is odd, should print 'odd'
  - code: assert _stdout.strip() == 'even'
    stdin: '4'
    message: 4 is even, should print 'even'
  - code: assert _stdout.strip() == 'odd'
    stdin: '13'
    message: 13 is odd, should print 'odd'
- type: mini_code
  prompt: Read speed then limit with input(). Print 'speeding' if speed exceeds the limit, otherwise print 'ok'.
  starter: 'speed = int(input())

    limit = int(input())

    '
  tests:
  - code: assert _stdout.strip() == 'speeding'
    stdin: '120

      100'
    message: speed 120, limit 100 — should print 'speeding'
  - code: assert _stdout.strip() == 'ok'
    stdin: '80

      100'
    message: speed 80, limit 100 — should print 'ok'
  - code: assert _stdout.strip() == 'ok'
    stdin: '100

      100'
    message: speed exactly equals limit — should print 'ok'
