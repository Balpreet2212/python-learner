unit: 2
lesson: 3
xp: 10

example:
  code: |
    grade = 78
    if grade >= 90:
        print("A")
    elif grade >= 75:
        print("B")
    elif grade >= 60:
        print("C")
    else:
        print("F")
  explanation: |
    elif (short for "else if") lets you check multiple conditions in sequence.
    Python tests each condition top to bottom and runs the first block that is True.
    All remaining branches are skipped. The final else catches everything else.
    Here grade is 78, so the second branch (>= 75) matches and "B" prints.
  output: "B"

code_starter: |
  speed = 85
  # Print "Fast" if speed > 100, "Normal" if speed >= 60, else "Slow"
hints:
  - "if speed > 100:"
  - "elif speed >= 60:"
  - "else:"
tests:
  - code: "assert speed == 85"
    message: "speed should remain 85"
  - code: "assert 'Normal' in _stdout"
    message: "Should print 'Normal' when speed is 85"
  - code: "assert 'Fast' not in _stdout and 'Slow' not in _stdout"
    message: "Only 'Normal' should print — not Fast or Slow"

final_challenge:
  code_starter: |
    level = 12
    # Print "Novice" if level < 5, "Apprentice" if level < 20, else "Master"
  hints:
    - "if level < 5:"
    - "elif level < 20:"
    - "else:  # covers level >= 20"
  tests:
    - code: "assert level == 12"
      message: "level should remain 12"
    - code: "assert 'Apprentice' in _stdout"
      message: "Should print 'Apprentice' when level is 12"
    - code: "assert 'Novice' not in _stdout and 'Master' not in _stdout"
      message: "Only 'Apprentice' should print"

worlds:
  fantasy:
    title: "The Rank Crystal"
    setup: |
      The Guild Hall's rank crystal glows a different colour for each tier.
      In Python, elif lets you chain multiple conditions — Python checks each
      one in order and runs the first that matches. All others are ignored.

      speed is 85. Write: if speed > 100 print "Fast", elif speed >= 60 print
      "Normal", else print "Slow". Only one branch should run.
    final_challenge_prompt: |
      The Guild assigns ranks by level. level is 12. Print "Novice" if level < 5,
      "Apprentice" if level < 20, and "Master" otherwise. Exactly one title prints.
  scifi:
    title: "Threat Level Protocol"
    setup: |
      The security system classifies incoming ships by speed: intercept, shadow, or
      let pass. Python's elif chain works the same way — each condition is tested
      top to bottom, the first match wins, the rest are skipped.

      speed is 85. Write the three-branch elif chain: Fast (> 100), Normal (>= 60),
      Slow (everything else). Only one label prints.
    final_challenge_prompt: |
      The crew classification system uses level. level is 12. Print "Novice" for
      level < 5, "Apprentice" for level < 20, "Master" for anything higher.
  mystery:
    title: "Suspect Ranking"
    setup: |
      The case file rates suspects: prime, secondary, or cleared. More than two
      categories means you need elif — Python's way of chaining multiple conditions,
      testing each until one matches.

      speed is 85. Write: if speed > 100 print "Fast", elif speed >= 60 print
      "Normal", else print "Slow". One match, one output.
    final_challenge_prompt: |
      Detectives have rank. level is 12. Print "Novice" for level < 5,
      "Apprentice" for level < 20, "Master" for level >= 20. One rank prints.
