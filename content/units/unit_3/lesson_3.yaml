title: "elif Chains"
xp: 12

exercises:
  - type: concept
    code: |
      score = 82
      if score >= 90:
          print("A")
      elif score >= 75:
          print("B")
      elif score >= 60:
          print("C")
      else:
          print("F")
    output: "B"
    explanation: "elif (else if) adds more conditions. Python checks each in order and runs only the first True branch."

  - type: mcq
    question: "What does this print?"
    code: "x = 50\nif x > 100:\n    print(\"big\")\nelif x > 25:\n    print(\"medium\")\nelse:\n    print(\"small\")"
    choices: ["medium", "big", "small", "big\nmedium"]
    correct: "medium"
    explanation: "x > 100 is False. x > 25 is True (50 > 25), so 'medium' prints."

  - type: fill_blank
    before: "if speed > 120:\n    print(\"fast\")\n"
    after: " speed > 60:\n    print(\"normal\")\nelse:\n    print(\"slow\")"
    choices: ["elif", "else", "if", "then"]
    answer: "elif"
    explanation: "elif adds another condition to check if the first one was False."

  - type: mcq
    question: "What does this print?"
    code: "temp = 100\nif temp > 100:\n    print(\"boiling\")\nelif temp == 100:\n    print(\"at boiling point\")\nelse:\n    print(\"below\")"
    choices: ["at boiling point", "boiling", "below", "boiling\nat boiling point"]
    correct: "at boiling point"
    explanation: "temp > 100 is False. temp == 100 is True, so the elif branch runs."

  - type: arrange
    instruction: "Build: if x > 10 print 'high', elif x > 5 print 'mid', else print 'low'"
    blocks: ["if", "x", ">", "10", ":", "print", "(", "\"high\"", ")", "elif", "x", ">", "5", ":", "print", "(", "\"mid\"", ")", "else", ":", "print", "(", "\"low\"", ")"]
    correct: ["if", "x", ">", "10", ":", "print", "(", "\"high\"", ")", "elif", "x", ">", "5", ":", "print", "(", "\"mid\"", ")", "else", ":", "print", "(", "\"low\"", ")"]
    explanation: "Python checks conditions in order and runs only the first True branch."

  - type: mcq
    question: "What does this print when score = 90?"
    code: "score = 90\nif score >= 90:\n    print(\"A\")\nelif score >= 90:\n    print(\"also A\")\nelse:\n    print(\"other\")"
    choices: ["A", "also A", "A\nalso A", "other"]
    correct: "A"
    explanation: "The first True branch wins. Even though the elif is also True, only the first matching branch runs."

  - type: fill_blank
    before: "if hp > 75:\n    status = \"healthy\"\nelif hp > 25:\n    status = \"injured\"\n"
    after: ":\n    status = \"critical\""
    choices: ["else", "elif", "if", "then"]
    answer: "else"
    explanation: "else catches all remaining cases — when hp is 25 or below."

  - type: mcq
    question: "What does this print?"
    code: "n = 5\nif n > 5:\n    print(\"A\")\nelif n > 3:\n    print(\"B\")\nelif n > 1:\n    print(\"C\")"
    choices: ["B", "A", "C", "B\nC"]
    correct: "B"
    explanation: "n > 5 is False. n > 3 is True, so 'B' prints. C is not reached."

  - type: mcq
    question: "How many elif branches can you have?"
    code: ""
    choices: ["As many as you need", "Exactly one", "Maximum 2", "None — use nested if instead"]
    correct: "As many as you need"
    explanation: "You can chain as many elif branches as needed, but only the first True one runs."

  - type: mini_code
    prompt: "Set score = 73. Print 'A' if >= 90, 'B' if >= 75, 'C' if >= 60, else 'F'."
    starter: "score = 73\n"
    tests:
      - code: "_stdout.strip() == 'C'"
        message: "73 is >= 60 but < 75, so grade is C"

  - type: mini_code
    prompt: "Set bmi = 22. Print 'underweight' if < 18.5, 'normal' if < 25, 'overweight' if < 30, else 'obese'."
    starter: "bmi = 22\n"
    tests:
      - code: "'normal' in _stdout"
        message: "22 is between 18.5 and 25, so 'normal'"

worlds:
  fantasy:
    title: "The Rank Crystal"
  scifi:
    title: "Status Levels"
  mystery:
    title: "Ranking Suspects"
