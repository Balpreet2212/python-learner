title: Nested if
xp: 12
exercises:
- type: concept
  code: "role = \"admin\"\nverified = True\nif role == \"admin\":\n    if verified:\n        print(\"Full access\")\n    else:\n\
    \        print(\"Verify first\")\nelse:\n    print(\"No access\")\n"
  output: Full access
  explanation: An if inside another if is called nested. Each inner block indents one more level. Both conditions must pass
    to reach the inner code.
- type: mcq
  question: What does this print?
  code: "x = 10\nif x > 5:\n    if x > 8:\n        print(\"big\")\n    else:\n        print(\"medium\")"
  choices:
  - big
  - medium
  - Nothing
  - 'big

    medium'
  correct: big
  explanation: x > 5 is True, so we enter the outer if. x > 8 is True (10 > 8), so 'big' prints.
- type: fill_blank
  prompt: Add an inner check that only runs once we know the user is logged in.
  before: "if logged_in:\n    "
  after: " is_admin:\n        print(\"admin panel\")"
  choices:
  - if
  - elif
  - else
  - and
  answer: if
  explanation: A nested if inside the outer if adds an extra condition check.
- type: mcq
  question: What does this print?
  code: "a = 3\nb = 7\nif a < 5:\n    if b > 5:\n        print(\"both\")\n    else:\n        print(\"only a\")"
  choices:
  - both
  - only a
  - Nothing
  - only b
  correct: both
  explanation: a < 5 is True (3 < 5). b > 5 is True (7 > 5). 'both' prints.
- type: arrange
  instruction: Build nested code that prints 'veteran' only when active is True and level is greater than 5
  blocks:
  - if
  - active
  - ':'
  - if
  - level
  - '>'
  - '5'
  - ':'
  - print
  - (
  - '"veteran"'
  - )
  correct:
  - if
  - active
  - ':'
  - if
  - level
  - '>'
  - '5'
  - ':'
  - print
  - (
  - '"veteran"'
  - )
  explanation: The inner if is indented inside the outer if block.
- type: mcq
  question: What does this print?
  code: "score = 70\nif score >= 60:\n    if score >= 90:\n        print(\"A\")\n    else:\n        print(\"pass\")\nelse:\n\
    \    print(\"fail\")"
  choices:
  - pass
  - A
  - fail
  - 'A

    pass'
  correct: pass
  explanation: 'score >= 60 is True. score >= 90 is False (70 < 90). So else inside runs: ''pass''.'
- type: fill_blank
  prompt: Handle the case where the weapon is equipped but ammo has run out.
  before: "if weapon_equipped:\n    if ammo > 0:\n        print(\"fire!\")\n    "
  after: ":\n        print(\"no ammo\")"
  choices:
  - else
  - elif
  - if
  - or
  answer: else
  explanation: The inner else catches when ammo is 0 (while weapon is still equipped).
- type: mcq
  question: What does this print?
  code: "x = 3\nif x > 1:\n    if x > 2:\n        if x > 3:\n            print(\"deep\")\n        else:\n            print(\"\
    mid\")\n    else:\n        print(\"low\")"
  choices:
  - mid
  - deep
  - low
  - Nothing
  correct: mid
  explanation: 'x > 1: True. x > 2: True. x > 3: False. So innermost else runs: ''mid''.'
- type: mcq
  question: When can you replace nested if with a single if using and?
  code: ''
  choices:
  - When both conditions must be True for the same action
  - When they have different else branches
  - Never — nested if is always clearer
  - When the inner if has an elif
  correct: When both conditions must be True for the same action
  explanation: 'if a and b: ... is equivalent to if a: if b: ... when there''s no inner else.'
- type: mini_code
  prompt: Read role then active ('True'/'False') with input(). Use nested if to print 'admin active' only when role is 'admin'
    AND active is True. Print nothing otherwise.
  starter: 'role = input()

    active = input() == ''True''

    '
  tests:
  - code: assert 'admin active' in _stdout
    stdin: 'admin

      True'
    message: 'role=admin, active=True: prints ''admin active'''
  - code: assert _stdout.strip() == ''
    stdin: 'admin

      False'
    message: 'role=admin but active=False: prints nothing'
  - code: assert _stdout.strip() == ''
    stdin: 'user

      True'
    message: 'role is not ''admin'': prints nothing'
- type: mini_code
  prompt: Read score then bonus ('True'/'False') with input(). Print 'A+' if score is 80 or above AND bonus. Print 'A' if
    score is 80 or above but not bonus. Print nothing if score is below 80. Use nested if.
  starter: 'score = int(input())

    bonus = input() == ''True''

    '
  tests:
  - code: assert _stdout.strip() == 'A+'
    stdin: '85

      True'
    message: 'score=85, bonus=True: prints ''A+'''
  - code: assert _stdout.strip() == 'A'
    stdin: '85

      False'
    message: 'score=85, bonus=False: prints ''A'''
  - code: assert _stdout.strip() == ''
    stdin: '70

      True'
    message: 'score=70 is below 80: prints nothing'
