worlds:
  fantasy:
    title: "Spells Within Spells"
    setup: |
      The grand counterspell requires two sub-spells combined. "Functions can call
      other functions — this is how complex behaviour is built from simple pieces,"
      Elara says. "Write 'square' first, then 'sum_of_squares' delegates to it."

      Define square(n) returning n², then sum_of_squares(a, b) that calls square
      for each argument and adds the results. The most powerful spells are composed
      of smaller, precise incantations.
    final_challenge_prompt: |
      The ancient power theorem uses cubes, not squares. Define cube(n) that returns
      n cubed (n ** 3 or n * n * n). Then define sum_of_cubes(a, b) that calls
      cube for each argument and returns their sum. sum_of_cubes(2, 3) should equal 35.
  scifi:
    title: "Recursive Subsystem"
    setup: |
      Computing the Pythagorean distance requires squaring both coordinates. "Breaking
      a big task into smaller functions makes code easier to read and reuse," the AI
      explains. "A function can call any other function — even ones you defined earlier."

      Write 'square', then 'sum_of_squares' using it.
    final_challenge_prompt: |
      The energy calculation uses cubic values. Define cube(n) returning n ** 3.
      Then define sum_of_cubes(a, b) that calls cube(a) + cube(b). Verify:
      sum_of_cubes(2, 3) == 35.
  mystery:
    title: "Clues Within Clues"
    setup: |
      The final puzzle requires two nested calculations. "Functions are most powerful
      when they call each other," your mentor says. "Build 'square' first, then use
      it inside 'sum_of_squares' — this is called composition."

      Complete both functions and store sum_of_squares(3, 4) in 'result'.
    final_challenge_prompt: |
      The cipher uses cubic transformations. Define cube(n) returning n ** 3, then
      sum_of_cubes(a, b) that returns cube(a) + cube(b). The cipher unlocks when
      sum_of_cubes(2, 3) equals 35.
