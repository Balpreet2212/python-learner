unit: 3
lesson: 5
xp: 15

example:
  code: |
    def triple(n):
        return n * 3

    def sum_of_triples(a, b):
        return triple(a) + triple(b)

    print(sum_of_triples(2, 4))
  explanation: |
    Functions can call other functions — this is called composition.
    triple(2) returns 6 and triple(4) returns 12, so sum_of_triples(2, 4) returns 18.
    Breaking a big task into smaller helper functions makes code easier to read,
    test, and reuse. Define the simpler function first, then build on top of it.
  output: "18"

