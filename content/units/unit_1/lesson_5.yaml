title: "input() and Types"
xp: 10

exercises:
  - type: concept
    code: |
      name = input("What is your name? ")
      print(f"Hello, {name}!")
    output: "(waits for user to type)"
    explanation: "input() pauses and waits for the user to type. It always returns a string. You show a prompt in the brackets."

  - type: mcq
    question: "What type does input() always return?"
    code: "answer = input(\"Enter a number: \")"
    choices: ["str (string)", "int (integer)", "float", "bool"]
    correct: "str (string)"
    explanation: "input() always returns a string. You must convert it if you want a number."

  - type: concept
    code: |
      age_text = input("Your age: ")
      age = int(age_text)
      print(f"Next year: {age + 1}")
    output: "(waits for input)"
    explanation: "int() converts a string to an integer. float() converts to a decimal. This is called type casting."

  - type: fill_blank
    prompt: "Convert the user's text input into an integer so you can do maths with it."
    before: "text = input(\"Enter a number: \")\nnum = "
    after: "(text)"
    choices: ["int", "str", "print", "len"]
    answer: "int"
    explanation: "int() converts the string from input() into an integer so you can do maths."

  - type: mcq
    question: "What does this print?"
    code: "x = int(\"42\")\nprint(x + 8)"
    choices: ["50", "428", "42", "Error"]
    correct: "50"
    explanation: "int(\"42\") converts the string to the integer 42. 42 + 8 = 50."

  - type: arrange
    instruction: "Convert the string '15' to an integer and store it in n"
    blocks: ["n", "=", "int", "(", "\"15\"", ")", "str"]
    correct: ["n", "=", "int", "(", "\"15\"", ")"]
    explanation: "int('15') converts the string to the integer 15."

  - type: mcq
    question: "What does this print?"
    code: "n = int(\"7\")\nprint(n * 3)"
    choices: ["21", "777", "73", "7"]
    correct: "21"
    explanation: "int('7') gives 7. 7 * 3 = 21."

  - type: fill_blank
    prompt: "Convert the price input into a decimal number for currency calculations."
    before: "price = "
    after: "(input(\"Price? \"))"
    choices: ["float", "int", "str", "len"]
    answer: "float"
    explanation: "float() converts input to a decimal number, useful for prices."

  - type: mcq
    question: "Which correctly reads a number from the user and doubles it?"
    code: ""
    choices: [
      "n = int(input('Number: '))\nprint(n * 2)",
      "n = input('Number: ')\nprint(n * 2)",
      "n = int('Number: ')\nprint(n * 2)",
      "print(int('Number: ') * 2)"
    ]
    correct: "n = int(input('Number: '))\nprint(n * 2)"
    explanation: "Wrap input() with int() to convert the string before multiplying."

  - type: mcq
    question: "What does this print?"
    code: "s = str(42)\nprint(len(s))"
    choices: ["2", "42", "4", "Error"]
    correct: "2"
    explanation: "str(42) converts 42 to '42', which has 2 characters."

  - type: mini_code
    prompt: "Convert the string '25' to an integer, add 1, and print the result."
    starter: "age_str = '25'\n"
    tests:
      - code: "assert _stdout.strip() == '26'"
        message: "Should print 26 (25 + 1)"
      - code: "assert 'int(' in _code"
        message: "Should use int() to convert the string"

  - type: mini_code
    prompt: "price_str holds '9.99'. Convert it to a float, calculate 10% tax (price * 0.1), and print the tax rounded to 2 decimal places."
    starter: "price_str = '9.99'\n"
    tests:
      - code: "assert abs(float(_stdout.strip()) - 1.0) < 0.01"
        message: "Should print 1.0 (10% of 9.99 ≈ 1.0)"
      - code: "assert 'float(' in _code"
        message: "Should use float() to convert the price string"

