unit: 1
lesson: 5
xp: 15

example:
  code: |
    name = "Rex"
    age = 4
    is_trained = True
    profile = f"{name} | Age: {age} | Trained: {is_trained}"
    print(profile)
  explanation: |
    Python's three basic data types are str (text in quotes), int (whole number),
    and bool (True or False). You can store all three in one go and combine them
    inside an f-string to build a readable summary.
    This is how real programs represent structured data about a single entity.
  output: "Rex | Age: 4 | Trained: True"

code_starter: |
  # Create three variables that describe your character:
  #   hero_name  — a non-empty string
  #   power      — an integer between 1 and 100
  #   is_active  — a boolean (True or False)

  hero_name =
  power =
  is_active =
hints:
  - "You know all three types now: str, int, bool"
  - 'hero_name = "Zara"   # any non-empty string'
  - "power = 75           # any integer 1-100"
  - "is_active = True     # or False"
tests:
  - code: "assert isinstance(hero_name, str) and len(hero_name) > 0, 'hero_name must be a non-empty string'"
    message: "hero_name should be a non-empty string"
  - code: "assert isinstance(power, int) and 1 <= power <= 100, 'power must be an integer between 1 and 100'"
    message: "power should be an integer between 1 and 100"
  - code: "assert isinstance(is_active, bool), 'is_active must be True or False'"
    message: "is_active should be a boolean (True or False)"

final_challenge:
  code_starter: |
    # Build a full character profile using all three data types
    # Then print a summary using an f-string
  hints:
    - 'spell_name = "Arcane Bolt"  — a string'
    - "power = 85  — an integer 1-100"
    - "is_charged = True  — a boolean"
    - 'summary = f"{spell_name} | Power: {power} | Charged: {is_charged}"'
  tests:
    - code: "assert isinstance(spell_name, str) and len(spell_name) > 0"
      message: "spell_name should be a non-empty string"
    - code: "assert isinstance(power, int) and 1 <= power <= 100"
      message: "power should be an integer between 1 and 100"
    - code: "assert isinstance(is_charged, bool)"
      message: "is_charged should be a boolean"
    - code: "assert isinstance(summary, str) and spell_name in summary"
      message: "summary should be an f-string containing spell_name"

worlds:
  fantasy:
    title: "The Hero's Registry"
    setup: |
      Elara unrolls the grand registry of all heroes who have passed through the
      Enchanted Realm. Each row has three columns: a name (string), a power level
      (integer from 1 to 100), and whether the hero is currently active (boolean).

      "You have learned all three fundamental types," she says. "Now register your
      own hero — a name, a power between 1 and 100, and your active status. Use
      an f-string to print a one-line summary. Complete the registry and earn your
      first badge."
    final_challenge_prompt: |
      The spell registry awaits your most powerful spell. Create spell_name as any
      non-empty string, power as an integer between 1 and 100, and is_charged as
      a boolean. Then build summary as an f-string that contains at least the
      spell_name. Print it.
  scifi:
    title: "Crew Profile Complete"
    setup: |
      The ship's personnel system is almost fully initialised. One profile slot
      remains: yours. Three fields required — hero_name (a string identifier),
      power (an integer rating from 1 to 100 for the mission record), and is_active
      (a boolean confirming crew readiness).

      "You've covered all the basic data types," the AI says. "Finalise your profile
      and the ship can launch." This completes Unit 1.
    final_challenge_prompt: |
      Log your most powerful weapon system. Create spell_name as a non-empty string
      (weapon name), power as an integer 1-100 (output rating), and is_charged as
      a boolean (readiness status). Build summary as an f-string containing spell_name
      and print it.
  mystery:
    title: "The Case File Sealed"
    setup: |
      The chief detective slides a form across the desk. "Before you get your badge,
      every agent must fill in their profile: a name, a power rating, and their
      active status." Three variables, three types — hero_name is a string, power
      is an integer from 1 to 100, and is_active is a boolean.

      You've mastered the building blocks of Python data. Fill in the form and your
      first case badge is yours.
    final_challenge_prompt: |
      Document your signature technique in the case file. Create spell_name (any
      non-empty string), power (integer 1-100), and is_charged (boolean). Build
      summary as an f-string that includes spell_name and print it.
