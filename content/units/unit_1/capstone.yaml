xp: 150

code_starter: |
  name = "Aria"
  level = 5
  gold = 120
  bonus = 30

  # Print a one-line character summary using an f-string.
  # Format exactly: "[name] is level [level] with [gold + bonus] gold."
  print(f"...")

hints:
  - "Use an f-string: f\"...\""
  - "You can do arithmetic inside curly braces: {gold + bonus}"
  - "Check your spacing and punctuation — the test expects an exact match"

plan_prompts:
  - "What variables do you have, and what type is each one?"
  - "How do you embed a variable inside a string?"
  - "How do you do arithmetic inside an f-string?"

tests:
  - code: "assert _stdout.strip() == 'Aria is level 5 with 150 gold.'"
    message: "Should print: Aria is level 5 with 150 gold."

worlds:
  fantasy:
    title: "The Enchanted Scroll"
    narrative: |
      A magical scroll-filling machine in the royal library has broken down.
      It used to read a hero's stats and weave them into a single polished
      line — but the formatting spell has been lost. Without it, the scribes
      are writing every summary by hand.

      You have the stats. Write a single print statement using an f-string
      that produces the hero's summary line exactly as specified.
    story_beat: |
      The scroll shimmers. The line appears, perfectly formatted: name, level,
      and gold all in the right place. The head librarian claps. "The machine
      lives again. Every hero in the realm will be properly recorded."
  scifi:
    title: "Crew Manifest Entry"
    narrative: |
      The ship's manifest system requires one formatted line per crew member:
      name, rank level, and total resource allocation (base plus bonus).
      A data wipe erased the formatting script. Without it, no crew member
      can be logged and the ship cannot launch.

      Write the print statement that produces the correct manifest entry.
    story_beat: |
      The manifest flickers back to life. "Aria is level 5 with 150 gold."
      Entry confirmed. The launch commander gives a thumbs-up. "All crew
      accounted for. We're cleared to go."
  mystery:
    title: "The Case File Header"
    narrative: |
      Every case file at the bureau starts with a one-line subject summary:
      name, clearance level, and total budget (base plus bonus allocation).
      The formatting script was wiped in a system crash, and cases are
      piling up without headers.

      Write the print statement that generates the correct header line.
    story_beat: |
      The header prints cleanly. Inspector Morgan stamps the file approved.
      "Exactly right. Now we can open the case. Good work getting the
      system back online."
