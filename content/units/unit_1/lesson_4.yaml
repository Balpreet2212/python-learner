title: "f-strings"
xp: 10

exercises:
  - type: concept
    code: |
      name = "Alice"
      score = 95
      print(f"Player {name} scored {score} points!")
    output: "Player Alice scored 95 points!"
    explanation: "f-strings embed variables directly in text. Put f before the quote and use {variable} inside. The value replaces the placeholder."

  - type: mcq
    question: "What does this print?"
    code: "age = 12\nprint(f\"I am {age} years old\")"
    choices: ["I am 12 years old", "I am age years old", "I am {age} years old", "12"]
    correct: "I am 12 years old"
    explanation: "{age} inside an f-string is replaced by the value 12."

  - type: fill_blank
    prompt: "Add the prefix that turns this into an f-string, enabling {name} substitution."
    before: "name = \"Bob\"\nprint("
    after: "\"Hello, {name}!\")"
    choices: ["f", "print", "str", "len"]
    answer: "f"
    explanation: "The f before the quote enables {variable} substitution inside strings."

  - type: mcq
    question: "What does this print?"
    code: "x = 7\nprint(f\"{x} times 2 is {x * 2}\")"
    choices: ["7 times 2 is 14", "x times 2 is x * 2", "7 times 2 is x * 2", "14"]
    correct: "7 times 2 is 14"
    explanation: "Expressions like x * 2 can go inside {} and are evaluated before inserting."

  - type: arrange
    instruction: "Build code to print 'Score: 100' using an f-string (points = 100)"
    blocks: ["points", "=", "100", "print", "(", "f", "\"Score: {points}\"", ")"]
    correct: ["points", "=", "100", "print", "(", "f", "\"Score: {points}\"", ")"]
    explanation: "First assign points = 100, then f\"Score: {points}\" embeds the value."

  - type: mcq
    question: "What does this print?"
    code: "a = 3\nb = 4\nprint(f\"{a} + {b} = {a + b}\")"
    choices: ["3 + 4 = 7", "a + b = a + b", "3 + 4 = a + b", "7"]
    correct: "3 + 4 = 7"
    explanation: "{a}, {b}, and {a + b} are all replaced with their computed values."

  - type: fill_blank
    prompt: "Embed the city variable's value inside the welcome message."
    before: "city = \"London\"\nprint(f\"Welcome to "
    after: "!\")"
    choices: ["{city}", "city", "\"city\"", "(city)"]
    answer: "{city}"
    explanation: "{city} inside an f-string inserts the value of the city variable."

  - type: mcq
    question: "Which line correctly uses an f-string?"
    code: ""
    choices: ["print(f\"Hi {name}\")", "print(\"Hi {name}\")", "print(f Hi name)", "print(f'Hi name')"]
    correct: "print(f\"Hi {name}\")"
    explanation: "f-strings need f before the quote and curly braces around the variable."

  - type: mcq
    question: "What does this print?"
    code: "item = \"sword\"\ncost = 50\nprint(f\"The {item} costs {cost} gold\")"
    choices: ["The sword costs 50 gold", "The item costs cost gold", "The {item} costs {cost} gold", "sword 50"]
    correct: "The sword costs 50 gold"
    explanation: "{item} and {cost} are replaced with their values."

  - type: fill_blank
    prompt: "Insert the current hp value into the health display string."
    before: "hp = 80\nprint(f\"HP: "
    after: " / 100\")"
    choices: ["{hp}", "hp", "{HP}", "(hp)"]
    answer: "{hp}"
    explanation: "{hp} inserts the value 80, giving 'HP: 80 / 100'."

  - type: mini_code
    prompt: "Store \"Python\" in language and 1991 in year. Print: 'Python was created in 1991' using an f-string."
    starter: ""
    tests:
      - code: "'Python was created in 1991' in _stdout"
        message: "Should print 'Python was created in 1991'"

  - type: mini_code
    prompt: "Store your hero name in hero and 5 in level. Print 'Hero [name] is level [level]' using an f-string."
    starter: ""
    tests:
      - code: "isinstance(hero, str) and len(hero) > 0"
        message: "hero should be a non-empty string"
      - code: "f'Hero {hero} is level {level}' in _stdout"
        message: "Should print the correct f-string output"

worlds:
  fantasy:
    title: "The Speaking Scroll"
  scifi:
    title: "Mission Briefing"
  mystery:
    title: "The Case File"
