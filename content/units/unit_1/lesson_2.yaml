title: Numbers and Maths
xp: 10
exercises:
- type: concept
  code: 'apples = 5

    oranges = 3

    total = apples + oranges

    print(total)

    '
  output: '8'
  explanation: Numbers don't use quotes. You can do maths with variables. + adds, - subtracts, * multiplies, / divides.
- type: mcq
  question: What does this print?
  code: 'x = 10

    y = 3

    print(x - y)'
  choices:
  - '7'
  - '13'
  - '10'
  - '3'
  correct: '7'
  explanation: 10 - 3 = 7.
- type: fill_blank
  prompt: Multiply 4 and 5, storing the result.
  before: 'result = 4 '
  after: ' 5'
  choices:
  - '*'
  - '='
  - +
  - print
  answer: '*'
  explanation: '* is multiplication. 4 * 5 = 20.'
- type: mcq
  question: What does this print?
  code: 'price = 12

    qty = 4

    print(price * qty)'
  choices:
  - '48'
  - '124'
  - '16'
  - '3'
  correct: '48'
  explanation: 12 × 4 = 48.
- type: arrange
  instruction: Build code to divide 20 by 4 and print the result
  blocks:
  - print
  - (
  - '20'
  - /
  - '4'
  - )
  - '*'
  correct:
  - print
  - (
  - '20'
  - /
  - '4'
  - )
  explanation: / divides. print(20 / 4) shows 5.0.
- type: mcq
  question: What does this print?
  code: 'a = 7

    b = 2

    print(a / b)'
  choices:
  - '3.5'
  - '3'
  - '4'
  - 7/2
  correct: '3.5'
  explanation: / always produces a float. 7 / 2 = 3.5.
- type: fill_blank
  prompt: Add price and tax together to get the total.
  before: 'total = price '
  after: ' tax'
  choices:
  - +
  - '='
  - print
  - '*'
  answer: +
  explanation: + adds. total = price + tax sums the two values.
- type: mcq
  question: What does this print?
  code: 'n = 5

    n = n + 1

    print(n)'
  choices:
  - '6'
  - '5'
  - n + 1
  - '1'
  correct: '6'
  explanation: n + 1 computes 5 + 1 = 6, then stores 6 back into n.
- type: arrange
  instruction: Store the result of 100 minus 37 in a variable called remaining
  blocks:
  - remaining
  - '='
  - '100'
  - '-'
  - '37'
  - +
  - print
  correct:
  - remaining
  - '='
  - '100'
  - '-'
  - '37'
  explanation: = assigns the computed result 63 to remaining.
- type: mcq
  question: What does this print?
  code: 'x = 3

    print(x * x)'
  choices:
  - '9'
  - '6'
  - '33'
  - x * x
  correct: '9'
  explanation: x * x = 3 * 3 = 9.
- type: mini_code
  prompt: You have 3 boxes, each containing 8 items. Print the total number of items.
  starter: 'boxes = 3

    items_per_box = 8

    '
  tests:
  - code: _stdout.strip() == '24'
    message: Should print 24 (3 × 8)
- type: mini_code
  prompt: Store 100 in budget and 35 in spent. Calculate remaining = budget - spent and print it.
  starter: ''
  tests:
  - code: assert remaining == 65
    message: remaining should be 65
  - code: _stdout.strip() == '65'
    message: Should print 65
worlds:
  fantasy:
    title: Measuring the Ingredients
    exercises:
    - type: concept
      code: 'petals = 5

        roots = 3

        total_ingredients = petals + roots

        print(total_ingredients)

        '
      output: '8'
      explanation: Numbers don't need quotes in Elara's recipe notes. You can calculate with variables. + adds quantities,
        - removes them, * scales a recipe, / splits a batch.
      story_before: Elara's recipe calls for precise quantities — she must add the petal count to the root count to know how
        many ingredients to gather.
      story_after: The total ingredient count is calculated; she scribbles it at the top of the recipe scroll.
    - type: mcq
      question: Elara subtracts spoiled petals from her count. What does this print?
      code: 'petals = 10

        spoiled = 3

        print(petals - spoiled)'
      choices:
      - '7'
      - '13'
      - '10'
      - '3'
      correct: '7'
      explanation: 10 - 3 = 7. Elara has 7 good petals left.
      story_before: Three moonpetals turned black overnight — Elara needs to subtract the spoiled ones from her total.
      story_after: Seven good petals remain; she sets the spoiled ones aside and updates her count.
    - type: fill_blank
      prompt: Multiply the petal count by the batch size to find the total needed.
      before: 'result = 4 '
      after: ' 5'
      choices:
      - '*'
      - '='
      - +
      - print
      answer: '*'
      explanation: '* scales the recipe. 4 * 5 = 20 petals needed for the full batch.'
      story_before: The master wants double the usual batch — Elara must scale the petal count by the batch multiplier.
      story_after: The scaled quantity is ready; she measures out twenty petals for the full batch.
    - type: mcq
      question: Elara calculates the cost of potion vials. What does this print?
      code: 'vial_cost = 12

        vials = 4

        print(vial_cost * vials)'
      choices:
      - '48'
      - '124'
      - '16'
      - '3'
      correct: '48'
      explanation: 12 gold per vial times 4 vials = 48 gold total.
      story_before: Elara needs to buy four vials from the market — she must calculate the total gold required before she
        leaves.
      story_after: Forty-eight gold coins accounted for; she counts them into her purse.
    - type: arrange
      instruction: Build code to divide 20 drops of essence evenly into 4 flasks and print the result
      blocks:
      - print
      - (
      - '20'
      - /
      - '4'
      - )
      - '*'
      correct:
      - print
      - (
      - '20'
      - /
      - '4'
      - )
      explanation: / splits the essence equally. print(20 / 4) shows 5.0 drops per flask.
      story_before: Twenty drops of moonwater essence must be divided evenly across four flasks for the ritual.
      story_after: Five drops per flask confirmed; she fills each one carefully and lines them up.
    - type: mcq
      question: Elara divides a batch of moonwater between two cauldrons. What does this print?
      code: 'moonwater = 7

        cauldrons = 2

        print(moonwater / cauldrons)'
      choices:
      - '3.5'
      - '3'
      - '4'
      - 7/2
      correct: '3.5'
      explanation: / always produces a float. 7 / 2 = 3.5 flasks each.
      story_before: Seven measures of moonwater must be split between two cauldrons — division always gives a decimal here.
      story_after: Each cauldron gets 3.5 measures; the decimal result is expected when splitting an odd amount.
    - type: fill_blank
      prompt: Add the base_cost and the ingredient_tax together to get the total potion cost.
      before: 'total = price '
      after: ' tax'
      choices:
      - +
      - '='
      - print
      - '*'
      answer: +
      explanation: + combines costs. total = base_cost + ingredient_tax gives the full price.
      story_before: Elara needs to add the ingredient tax on top of the base cost to find what she'll actually pay.
      story_after: Total potion cost calculated; she writes it on the invoice and seals the order.
    - type: mcq
      question: Elara adds one more moonpetal to her count. What does this print?
      code: 'petals = 5

        petals = petals + 1

        print(petals)'
      choices:
      - '6'
      - '5'
      - n + 1
      - '1'
      correct: '6'
      explanation: petals + 1 computes 5 + 1 = 6, then stores 6 back into petals.
      story_before: One extra moonpetal was found at the bottom of the sack — Elara adds it to the running count.
      story_after: The count updates to six; she tucks the petal into the recipe pile.
    - type: arrange
      instruction: Store the result of 100 minus 37 in a variable called potion_supply
      blocks:
      - remaining
      - '='
      - '100'
      - '-'
      - '37'
      - +
      - print
      correct:
      - remaining
      - '='
      - '100'
      - '-'
      - '37'
      explanation: = records the remaining supply of 63 doses in potion_supply.
      story_before: The workshop started with 100 doses of potion supply — 37 have been used and Elara needs the remainder.
      story_after: Sixty-three doses remain; she marks the level on the supply barrel.
    - type: mcq
      question: Elara squares the magic amplifier. What does this print?
      code: 'amplifier = 3

        print(amplifier * amplifier)'
      choices:
      - '9'
      - '6'
      - '33'
      - x * x
      correct: '9'
      explanation: amplifier * amplifier = 3 * 3 = 9. The potion's power is squared.
      story_before: The magic amplifier grows stronger when multiplied by itself — Elara squares it to find the true potency.
      story_after: Potency confirmed at 9; she inscribes the value on the amplifier's base.
    - type: mini_code
      prompt: Elara has 3 cauldrons, each needing 8 moonpetals. Print the total number of petals required.
      starter: 'boxes = 3

        items_per_box = 8

        '
      tests:
      - code: _stdout.strip() == '24'
        message: Should print 24 (3 × 8)
      story_before: Three cauldrons each need eight moonpetals — Elara must compute the total petal requirement before heading
        to the herb store.
      story_after: Twenty-four petals logged; the herb store order is written and ready to send.
    - type: mini_code
      prompt: Store 100 in budget and 35 in spent. Calculate remaining = budget - spent and print it.
      starter: ''
      tests:
      - code: assert remaining == 65
        message: remaining should be 65
      - code: _stdout.strip() == '65'
        message: Should print 65
      story_before: The workshop budget is 100 gold and 35 have already been spent — Elara must calculate what's left before
        ordering more supplies.
      story_after: Sixty-five gold remaining; the budget is balanced and the supply order is approved.
