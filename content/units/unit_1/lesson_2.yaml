worlds:
  fantasy:
    title: "The Power Counter"
    setup: |
      Elara taps her staff on the stone floor. "Spells cost power — and power is
      measured in numbers." In Python, integers are whole numbers stored without quotes.

      "Assign 42 to a variable called 'score'," she instructs, "then calculate your
      total power by adding 10 to it and storing the result in 'total'. Numbers let
      us do arithmetic — the real engine beneath all magic."
    final_challenge_prompt: |
      The party defeated a dragon and split the gold hoard. Create a variable gold
      set to 120 (the base reward) and bonus set to 45 (the dragon slayer bonus).
      Calculate total_gold by adding them, then print it.
  scifi:
    title: "Fuel Calculations"
    setup: |
      The ship's fuel gauge is flashing. "Emergency reserves detected," the AI announces.
      "Current fuel: 42 units. Reserve boost: 10 units. Calculate total available fuel
      before we can engage the jump drive."

      In Python, integers are whole numbers — no quotes needed. Assign 42 to 'score'
      and compute score + 10 into 'total'. Math in Python works exactly as you'd expect.
    final_challenge_prompt: |
      Two fuel pods are loaded for the mission. Set gold to 120 (primary pod capacity)
      and bonus to 45 (emergency reserve). Calculate total_gold by adding them —
      that is the total fuel available. Print it.
  mystery:
    title: "Counting the Clues"
    setup: |
      Your case board has 42 pinned notes. The informant just slipped you 10 more.
      "Quantity matters in detective work," your mentor says, lighting a cigarette.

      "Store the starting count in a variable called 'score', then add 10 to it and
      put the result in 'total'. In Python, integers are plain numbers — no quotes.
      Arithmetic is straightforward: + adds, - subtracts, * multiplies, / divides."
    final_challenge_prompt: |
      Two witnesses provided leads. The first gave gold = 120 pieces of evidence;
      the second contributed bonus = 45. Create both variables, add them into
      total_gold, and print the result.
