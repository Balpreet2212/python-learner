unit: 1
lesson: 2
xp: 10

example:
  code: |
    price = 80
    discount = 15
    final = price - discount
    print(final)
    print(price * 2)
  explanation: |
    Numbers in Python are stored without quotes — just write the number.
    Basic arithmetic works exactly as expected: + adds, - subtracts, * multiplies, / divides.
    Here we subtract discount from price and store the result in a third variable 'final'.
    You can also do arithmetic directly inside print().
  output: "65\n160"

