      - name
      - '='
      - '"Alice"'
      - print
      - (
      - )
      correct:
      - name
      - '='
      - '"Alice"'
      explanation: = logs the clue on the right into the evidence label on the left.
      story_before: The suspect field in Cole's notebook is empty — he has to write Victor Crane's name in before the interview
