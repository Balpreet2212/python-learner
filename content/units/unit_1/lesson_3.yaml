unit: 1
lesson: 3
xp: 10

example:
  code: |
    is_raining = True
    is_sunny = False
    print(is_raining)
    print(is_sunny)
    print(type(is_raining))
  explanation: |
    Booleans are Python's yes/no values. There are exactly two: True and False.
    They must be capitalised exactly like that — no quotes, not strings.
    True and False are their own data type, called 'bool'.
    Use them wherever you need an on/off switch or a condition.
  output: "True\nFalse\n<class 'bool'>"

code_starter: |
  # Set is_hero to the boolean True (capital T, no quotes)
  is_hero =

  # Set level to any integer greater than 5
  level =
hints:
  - "Booleans are True or False — capital first letter, no quotes"
  - "Pick any number greater than 5 for level, e.g. level = 7"
