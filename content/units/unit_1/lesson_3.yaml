      explanation: Spell words are strings stored in quotes. len() counts every character in the incantation. .upper() shouts
        it in capital letters. Call string methods with a dot.
      story_before: Elara discovers an ancient spell scroll but can't cast it until she measures its incantation and shouts
        it at full power.
      story_after: The incantation's length is known and its shouted form is ready; the scroll's first secret is unlocked.
