title: Strings
xp: 10
exercises:
- type: concept
  code: 'greeting = "Hello, world!"

    print(len(greeting))

    print(greeting.upper())

    '
  output: '13

    HELLO, WORLD!'
  explanation: Strings are text in quotes. len() counts characters. .upper() converts to uppercase. You call methods with
    a dot.
- type: mcq
  question: What does this print?
  code: 'word = "python"

    print(len(word))'
  choices:
  - '6'
  - '7'
  - word
  - '"python"'
  correct: '6'
  explanation: '"python" has 6 characters: p-y-t-h-o-n.'
- type: fill_blank
  prompt: Convert Alice's name to uppercase before printing it.
  before: 'name = "Alice"

    print(name.'
  after: ())
  choices:
  - upper
  - print
  - len
  - int
  answer: upper
  explanation: '.upper() returns the string in all capitals: ''ALICE''.'
- type: mcq
  question: What does this print?
  code: 's = "Hello"

    print(s.lower())'
  choices:
  - hello
  - HELLO
  - Hello
  - '5'
  correct: hello
  explanation: .lower() converts all characters to lowercase.
- type: arrange
  instruction: Build code to get the length of the string 'cat'
  blocks:
  - print
  - (
  - len
  - (
  - '"cat"'
  - )
  - )
  correct:
  - print
  - (
  - len
  - (
  - '"cat"'
  - )
  - )
  explanation: len('cat') counts 3 characters. print wraps the whole call.
- type: mcq
  question: What does this print?
  code: 'a = "hello"

    b = "world"

    print(a + " " + b)'
  choices:
  - hello world
  - helloworld
  - a b
  - 'hello

    world'
  correct: hello world
  explanation: + joins strings. We add a space " " between them.
- type: fill_blank
  prompt: Join the two strings together into one.
  before: 'result = "hello" '
  after: ' "world"'
  choices:
  - +
  - '*'
  - '-'
  - '='
  answer: +
  explanation: + concatenates (joins) two strings.
- type: mcq
  question: What does this print?
  code: 'word = "Python"

    print(word[0])'
  choices:
  - P
  - y
  - Python
  - '0'
  correct: P
  explanation: '[0] gets the first character. Python uses 0-based indexing.'
- type: arrange
  instruction: Build code to print 'hello' in uppercase
  blocks:
  - print
  - (
  - '"hello"'
  - .
  - upper
  - (
  - )
  - )
  correct:
  - print
  - (
  - '"hello"'
  - .
  - upper
  - (
  - )
  - )
  explanation: .upper() is called on the string with dot notation.
- type: mcq
  question: What does this print?
  code: 's = "  hello  "

    print(s.strip())'
  choices:
  - hello
  - '  hello  '
  - 'hello  '
  - HELLO
  correct: hello
  explanation: .strip() removes leading and trailing spaces.
- type: mini_code
  prompt: Store your name in a variable called name and print it in uppercase.
  starter: ''
  tests:
  - code: assert isinstance(name, str) and len(name) > 0
    message: name should be a non-empty string
  - code: name.upper() in _stdout
    message: Should print name in uppercase
- type: mini_code
  prompt: Store "Hello" in greeting and "World" in target. Print them joined with a space.
  starter: ''
  tests:
  - code: assert greeting == 'Hello'
    message: greeting should be 'Hello'
  - code: assert target == 'World'
    message: target should be 'World'
  - code: '''Hello World'' in _stdout'
    message: Should print 'Hello World'
