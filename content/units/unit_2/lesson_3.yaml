unit: 2
lesson: 3
xp: 10

example:
  code: |
    score = 85
    print(score > 50)    # True
    print(score >= 90)   # False
    print(score == 85)   # True
    print(score != 100)  # True
    print(score < 0)     # False
  explanation: |
    Comparison operators compare two values and always return True or False.
    == checks equality (two equals signs — not the assignment =).
    != means "not equal". > >= < <= work as in maths.
    The result is a boolean — the foundation of all decisions in Python.
  output: "True\nFalse\nTrue\nTrue\nFalse"

code_starter: |
  health = 30
  max_health = 100
  # Is health critically low? (below 25)
  is_critical =
  # Is health at maximum?
  is_full =
hints:
  - "Use < to check if health is below 25: is_critical = health < 25"
  - "Use == to check equality: is_full = health == max_health"

tests:
  - code: "assert is_critical == False"
    message: "is_critical should be False (30 is not below 25)"
  - code: "assert is_full == False"
    message: "is_full should be False (30 != 100)"
  - code: "assert '<' in _code or '<=' in _code"
    message: "use a comparison operator (< or <=) for is_critical"
  - code: "assert '==' in _code"
    message: "use == (not =) for is_full"

predict:
  code: |
    x = 7
    print(x > 5)
    print(x == 7)
    print(x != 10)
    print(x < 3)
  explanation: "Comparisons return True or False. = assigns; == compares."

break_and_fix:
  broken_code: |
    level = 10
    # Check if level equals 10
    is_max = level = 10
    print(is_max)
  hint: "= assigns a value; == checks equality. Change = to == in the comparison."
  tests:
    - code: "assert is_max == True"
      message: "is_max should be True (level equals 10)"
    - code: "assert '==' in _code"
      message: "use == not = for comparison"

final_challenge:
  code_starter: |
    speed = 120
    limit = 100
    fuel = 0
  hints:
    - "is_speeding = speed > limit"
    - "is_empty = fuel == 0"
    - "is_safe_speed = speed <= limit"
    - "print(is_speeding, is_empty, is_safe_speed)"
  tests:
    - code: "assert is_speeding == True"
      message: "is_speeding should be True (120 > 100)"
    - code: "assert is_empty == True"
      message: "is_empty should be True (fuel == 0)"
    - code: "assert is_safe_speed == False"
      message: "is_safe_speed should be False (120 is not <= 100)"

worlds:
  fantasy:
    title: "The Truth Rune"
    setup: |
      "Numbers can be compared — and Python speaks the result as truth or
      falsehood," Elara says. "== checks equality, != means not equal,
      > >= < <= work as in mathematics. The result is always True or False."

      A warrior has health = 30 out of max_health = 100.
      Determine is_critical (below 25?) and is_full (at maximum?).
    final_challenge_prompt: |
      A carriage: speed = 120, limit = 100, fuel = 0.
      Set is_speeding, is_empty, and is_safe_speed using comparisons.
      Print all three.
  scifi:
    title: "Sensor Calibration"
    setup: |
      "Sensor outputs are binary — True or False," the AI states.
      "Comparison operators convert numbers into boolean readings.
      == for equality, != for difference, > >= < <= for magnitude."

      Hull integrity: health = 30 out of max_health = 100.
      Set is_critical (below 25?) and is_full (at max?).
    final_challenge_prompt: |
      Spacecraft: speed = 120, limit = 100, fuel = 0.
      Compute is_speeding, is_empty, and is_safe_speed. Print all three.
  mystery:
    title: "Reading the Clues"
    setup: |
      "Facts either check out or they don't," your mentor says.
      "Comparisons give you True or False — the raw truth."

      Suspect's stamina: health = 30, max_health = 100.
      Determine is_critical (below 25?) and is_full (at max?).
    final_challenge_prompt: |
      A vehicle: speed = 120, limit = 100, fuel = 0.
      Determine is_speeding, is_empty, and is_safe_speed. Print all three.
