title: "Comparison Operators"
xp: 12

exercises:
  - type: concept
    code: |
      x = 10
      print(x > 5)
      print(x == 10)
      print(x != 3)
    output: "True\nTrue\nTrue"
    explanation: "Comparisons check a relationship and return True or False. == checks equality (not =, which assigns). != means 'not equal'."

  - type: mcq
    question: "What does this print?"
    code: "print(7 > 3)"
    choices: ["True", "False", "7", "3"]
    correct: "True"
    explanation: "7 is greater than 3, so the result is True."

  - type: fill_blank
    prompt: "Check whether level is exactly equal to 10."
    before: "is_max = level "
    after: " 10"
    choices: ["==", "=", "!=", ">="]
    answer: "=="
    explanation: "== compares for equality. = would assign 10 to level instead."

  - type: mcq
    question: "What does this print?"
    code: "score = 60\nprint(score >= 60)"
    choices: ["True", "False", "60", ">="]
    correct: "True"
    explanation: ">= means 'greater than or equal to'. 60 >= 60 is True."

  - type: arrange
    instruction: "Print whether x is not equal to 5"
    blocks: ["x", "!=", "5", "==", "print", "(", ")"]
    correct: ["print", "(", "x", "!=", "5", ")"]
    explanation: "!= is 'not equal to'. print(x != 5) prints True if x is not 5."

  - type: mcq
    question: "What does this print?"
    code: "a = 5\nb = 10\nprint(a < b)"
    choices: ["True", "False", "5", "10"]
    correct: "True"
    explanation: "5 is less than 10, so a < b is True."

  - type: fill_blank
    prompt: "Check whether score meets or exceeds the passing threshold of 50."
    before: "passed = score "
    after: " 50"
    choices: [">=", "==", "=", "<="]
    answer: ">="
    explanation: "score >= 50 is True when score is 50 or more — the passing threshold."

  - type: mcq
    question: "What does this print?"
    code: "x = 5\nprint(x == 5)\nprint(x != 5)"
    choices: ["True\nFalse", "False\nTrue", "True\nTrue", "5\n5"]
    correct: "True\nFalse"
    explanation: "x == 5 is True (x is 5). x != 5 is False (x is 5, so they ARE equal)."

  - type: mcq
    question: "What does this print?"
    code: "name = \"Alice\"\nprint(name == \"alice\")"
    choices: ["False", "True", "Alice", "alice"]
    correct: "False"
    explanation: "String comparison is case-sensitive. 'Alice' and 'alice' are different."

  - type: arrange
    instruction: "Print whether hp is less than or equal to 0"
    blocks: ["hp", "<=", "0", ">=", "print", "(", ")"]
    correct: ["print", "(", "hp", "<=", "0", ")"]
    explanation: "<= is 'less than or equal to'. print(hp <= 0) prints True when hp is 0 or below."

  - type: mini_code
    prompt: "Set score = 75. Print whether score is greater than or equal to 60 (the pass mark)."
    starter: "score = 75\n"
    tests:
      - code: "_stdout.strip() == 'True'"
        message: "75 >= 60 should be True"

  - type: mini_code
    prompt: "Set a = 10 and b = 20. Print True if a is not equal to b, False otherwise."
    starter: "a = 10\nb = 20\n"
    tests:
      - code: "_stdout.strip() == 'True'"
        message: "10 != 20 should be True"

worlds:
  fantasy:
    title: "The Truth Rune"
  scifi:
    title: "Sensor Thresholds"
  mystery:
    title: "Comparing Evidence"
