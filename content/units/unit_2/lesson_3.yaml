unit: 2
lesson: 3
xp: 10
code_starter: |
  # Use a while loop to count down from 5 to 1.
  # Append each number to 'result' as you go, then stop.
  result = []
  count = 5
  while count > 0:
      result.append(count)
      count -=
hints:
  - "Decrement count each pass: count -= 1"
  - "The loop stops as soon as count reaches 0"
tests:
  - code: "assert result == [5, 4, 3, 2, 1], f'got {result}'"
    message: "result should be [5, 4, 3, 2, 1]"
  - code: "assert count == 0, f'count should be 0 after the loop'"
    message: "count should reach 0"
worlds:
  fantasy:
    title: "The Countdown Incantation"
    narrative: |
      The spell requires a precise countdown. "A `while` loop repeats *while* a condition stays true," Elara says. "Unlike `for`, the loop keeps going as long as you want — but you must update the variable yourself, or it runs forever." Count down from 5 to 1, appending each number to `result`, and reduce `count` by 1 each pass.
  scifi:
    title: "Launch Sequence"
    narrative: |
      The launch countdown begins. "A `while` loop is condition-driven — it keeps running as long as its test passes," the AI says. "You control when it stops by changing the variable yourself." Count down from `count = 5`, appending each value to `result` and decrementing by 1 each cycle until liftoff.
  mystery:
    title: "The Ticking Clock"
    narrative: |
      A bomb's timer ticks down — five seconds left. "A `while` loop runs as long as its condition is true," your partner says urgently. "You have to decrement the counter yourself inside the loop — otherwise it runs forever." Record each second in `result` and reduce `count` by 1 each iteration.
