        choices: ["1024", "20", "210", "1000"]
        correct: "1024"
        explanation: "Each altitude checkpoint doubles the frost intensity. Starting from 1, after 10 doublings Finn faces 2 ** 10 = 1024 frost units."

      - type: arrange
