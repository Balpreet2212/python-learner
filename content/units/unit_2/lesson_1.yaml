    title: "The Rune Counter"
    setup: |
      "Numbers in Python go further than +, -, *, /," Elara says, carving
      runes into the stone floor. "// divides and discards the remainder.
      % captures only the remainder. ** raises a number to a power."

      You have 23 spell fragments to distribute into groups of 7.
      Calculate how many full_groups fit and how many fragments are left over.
    final_challenge_prompt: |
      A tournament needs 50 warriors split into teams of 8.
      Calculate full_teams and bench (leftover warriors). Print both.
