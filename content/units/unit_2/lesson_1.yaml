        correct: "n % 2 == 0"
        explanation: "Finn checks if he can pair up his supply bundles evenly. An even number leaves no remainder when divided by 2, so n % 2 == 0 is True."

      - type: mini_code
        prompt: "Finn has 50 ration bars to pack into pouches of 8. Print how many full pouches he can make and how many bars are left over."
        starter: "players = 50\nteam_size = 8\n"
