title: Floor Division, Modulo, Exponents
xp: 12
exercises:
- type: concept
  code: 'print(10 // 3)

    print(10 % 3)

    print(2 ** 8)

    '
  output: '3

    1

    256'
  explanation: // is floor division (result rounded down). % is modulo (the remainder). ** is exponentiation (power).
- type: mcq
  question: What does this print?
  code: print(7 // 2)
  choices:
  - '3'
  - '3.5'
  - '4'
  - '2'
  correct: '3'
  explanation: 7 ÷ 2 = 3.5, but // floors it down to 3.
- type: mcq
  question: What does this print?
  code: print(10 % 3)
  choices:
  - '1'
  - '3'
  - '0'
  - '3.33'
  correct: '1'
  explanation: 10 = 3×3 + 1. The remainder is 1.
- type: arrange
  instruction: Build the expression for floor division of 15 by 4
  blocks:
  - '15'
  - //
  - '4'
  - '%'
  - '**'
  - print
  correct:
  - print
  - (
  - '15'
  - //
  - '4'
  - )
  explanation: 15 // 4 = 3 (15 ÷ 4 = 3.75, floored to 3).
- type: fill_blank
  prompt: Find the remainder when 17 is divided by 5.
  before: 'remainder = 17 '
  after: ' 5'
  choices:
  - '%'
  - //
  - /
  - '**'
  answer: '%'
  explanation: '% gives the remainder. 17 % 5 = 2.'
- type: mcq
  question: What does this print?
  code: print(2 ** 10)
  choices:
  - '1024'
  - '20'
  - '210'
  - '1000'
  correct: '1024'
  explanation: 2 ** 10 = 2 raised to the power 10 = 1024.
- type: arrange
  instruction: Build code to compute 3 to the power of 4
  blocks:
  - print
  - (
  - '3'
  - '**'
  - '4'
  - '%'
  - )
  correct:
  - print
  - (
  - '3'
  - '**'
  - '4'
  - )
  explanation: 3 ** 4 = 3 × 3 × 3 × 3 = 81.
- type: mcq
  question: What does this print?
  code: 'n = 100

    print(n % 7)'
  choices:
  - '2'
  - '14'
  - '7'
  - '1'
  correct: '2'
  explanation: 100 = 7×14 + 2. The remainder is 2.
- type: fill_blank
  prompt: Raise 5 to the power of 2.
  before: 'squared = 5 '
  after: ' 2'
  choices:
  - '**'
  - '*'
  - //
  - '%'
  answer: '**'
  explanation: '** is the power operator. 5 ** 2 = 25.'
- type: mcq
  question: How do you check if a number n is even?
  code: ''
  choices:
  - n % 2 == 0
  - n // 2 == 0
  - n ** 2 == 0
  - n / 2 == 0
  correct: n % 2 == 0
  explanation: An even number has no remainder when divided by 2, so n % 2 == 0 is True.
- type: mini_code
  prompt: 50 players need to be split into teams of 8. Print how many full teams fit and how many players are left over.
  starter: 'players = 50

    team_size = 8

    '
  tests:
  - code: assert '6' in _stdout
    message: 'Should print 6 (full teams: 50 // 8)'
  - code: assert '2' in _stdout
    message: 'Should print 2 (leftover: 50 % 8)'
- type: mini_code
  prompt: Calculate 2 to the power of 16 and print it.
  starter: ''
  tests:
  - code: assert _stdout.strip() == '65536'
    message: Should print 65536 (2 ** 16)
  - code: assert '**' in _code
    message: Should use ** for exponentiation
