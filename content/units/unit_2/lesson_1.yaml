unit: 2
lesson: 1
xp: 10

example:
  code: |
    apples = 17
    per_basket = 5
    baskets = apples // per_basket
    leftover = apples % per_basket
    power = 2 ** 8
    print(baskets, leftover, power)
  explanation: |
    // (floor division) divides and drops the decimal — 17 // 5 = 3.
    % (modulo) gives only the remainder — 17 % 5 = 2.
    ** (exponentiation) raises to a power — 2 ** 8 = 256.
    These three operators extend the basic +  -  *  / you already know.
  output: "3 2 256"

code_starter: |
  # Split 23 items into groups of 7
  items = 23
  group_size = 7
  # How many full groups fit?
  full_groups =
  # How many items are left over?
  leftover =
hints:
  - "Use // for full groups: full_groups = items // group_size"
  - "Use % for the remainder: leftover = items % group_size"

tests:
  - code: "assert full_groups == 3"
    message: "full_groups should be 3 (23 // 7)"
  - code: "assert leftover == 2"
    message: "leftover should be 2 (23 % 7)"
  - code: "assert '//' in _code"
    message: "use // (floor division) to calculate full_groups"
  - code: "assert '%' in _code"
    message: "use % (modulo) to calculate leftover"

predict:
  code: |
    x = 10 ** 3
    print(x)
  explanation: "** raises a number to a power. 10 ** 3 = 10 × 10 × 10 = 1000."

break_and_fix:
  broken_code: |
    base = 2
    result = base ^ 4
    print(result)
  hint: "Python uses ** for exponentiation — ^ is a different operator (bitwise XOR)"
  tests:
    - code: "assert result == 16"
      message: "result should be 16 (2 to the power of 4)"
    - code: "assert '**' in _code"
      message: "use ** for exponentiation, not ^"

final_challenge:
  code_starter: |
    # A tournament needs 50 warriors split into teams of 8
  hints:
    - "players = 50"
    - "group_size = 8"
    - "full_teams = players // group_size"
    - "bench = players % group_size"
    - "print(full_teams, bench)"
  tests:
    - code: "assert full_teams == 6"
      message: "full_teams should be 6"
    - code: "assert bench == 2"
      message: "bench should be 2 (leftover players)"

worlds:
