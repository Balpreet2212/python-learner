      you what's left over, ** raises to a power."

      Split 23 evidence files into folders of 7.
      Calculate full_groups and leftover.
    final_challenge_prompt: |
      50 suspects need interview groups of 8.
      Compute full_teams and bench (leftover suspects). Print both.
