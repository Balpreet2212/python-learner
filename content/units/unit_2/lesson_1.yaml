          print(43 // 8)
          print(43 % 8)
          print(2 ** 6)
        output: "5\n3\n64"
        explanation: "Finn has 43 ration bars to split into pouches of 8. // gives 5 full pouches (floor division). % gives 3 bars left over (the remainder). ** calculates how many snowflakes form in 2 to the power of 6 crystal layers — 64."

      - type: mcq
        question: "What does this print?"
        code: "print(7 // 2)"
        choices: ["3", "3.5", "4", "2"]
        correct: "3"
        explanation: "Finn can fill 3 full supply pouches with 7 food packs split into groups of 2 — the half pack doesn't count, so // floors it to 3."

      - type: mcq
