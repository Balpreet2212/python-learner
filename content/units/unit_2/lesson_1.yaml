unit: 2
lesson: 1
xp: 10

example:
  code: |
    score = 72
    if score >= 50:
        print("Pass")
  explanation: |
    An if statement runs its indented block only when the condition is True.
    Here, score >= 50 evaluates to True, so "Pass" is printed.
    If score were 40 the condition would be False and nothing prints.
  output: "Pass"

code_starter: |
  health = 80
  # Write an if statement: if health is greater than 0, print "Alive"
hints:
  - "if health > 0:"
  - "Indent the print() call by 4 spaces under the if"
tests:
  - code: "assert health == 80, 'do not change the value of health'"
    message: "health should remain 80"
  - code: |
      import io, sys
      out = io.StringIO()
      sys.stdout = out
      health = 80
      if health > 0:
          print("Alive")
      sys.stdout = sys.__stdout__
      assert "Alive" in out.getvalue()
    message: "Should print 'Alive' when health > 0"

final_challenge:
  code_starter: |
    power = 100
    # If power equals 100, print "Maximum power!"
  hints:
    - "Use == to check for equality: if power == 100:"
    - "print(\"Maximum power!\") indented inside the if"
  tests:
    - code: "assert power == 100, 'do not change the value of power'"
      message: "power should remain 100"
    - code: |
        import io, sys
        out = io.StringIO()
        sys.stdout = out
        power = 100
        if power == 100:
            print("Maximum power!")
        sys.stdout = sys.__stdout__
        assert "Maximum power!" in out.getvalue()
      message: "Should print 'Maximum power!' when power == 100"

worlds:
  fantasy:
    title: "The Gate of Truth"
    setup: |
      The ancient gate ahead glows with a silver rune. "Only those who speak the
      truth pass," the guardian says. In Python, an if statement is that truth test —
      it runs a block of code only when a condition is True.

      health is already set to 80. Write an if statement: if health is greater than
      0, print "Alive". The indented line beneath if only runs when the condition holds.
    final_challenge_prompt: |
      The power crystal reads 100 — maximum charge. Write an if statement so that
      when power equals 100, the message "Maximum power!" is printed to the console.
  scifi:
    title: "System Integrity Check"
    setup: |
      The ship's damage-control AI flashes a warning: hull integrity unknown.
      An if statement in Python lets you run code only when a condition is True —
      like a circuit that only closes when the signal is strong enough.

      health is set to 80. Write an if statement: if health is greater than 0,
      print "Alive". Only the indented block beneath the if keyword executes when
      the condition passes.
    final_challenge_prompt: |
      The reactor's power gauge reads 100. Write an if statement so the console
      prints "Maximum power!" only when power equals 100.
  mystery:
    title: "The Hidden Clue"
    setup: |
      Inspector Morgan drops a folder on your desk. "Some evidence only matters
      under the right conditions." In Python, an if statement works the same way —
      the indented code beneath it runs only when the condition is True.

      health is set to 80. Write an if statement: if health is greater than 0,
      print "Alive". The colon after the condition and the four-space indent are both required.
    final_challenge_prompt: |
      A vital clue is locked behind a power check. Write an if statement so that
      when power equals 100, the message "Maximum power!" is printed.
