        code: "print(10 % 3)"
        choices: ["1", "3", "0", "3.33"]
        correct: "1"
        explanation: "Finn divides 10 torches into groups of 3. Three groups of 3 use 9 torches, leaving 1 behind — that's the modulo remainder."

      - type: arrange
        instruction: "Build the expression for floor division of 15 by 4"
        blocks: ["15", "//", "4", "%", "**", "print"]
        correct: ["print", "(", "15", "//", "4", ")"]
