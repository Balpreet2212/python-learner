unit: 2
xp: 150

plan_prompts:
  - "In one sentence, what should this program do?"
  - "What inputs does it have? What output?"
  - "What are the steps, in order, in plain English?"
  - "Translate each step into Python."

code_starter: |
  def calculate_split(bill, tip_percent, num_people):
      # Calculate total including tip, then divide by number of people
      # Return the amount each person owes, rounded to 2 decimal places
      pass

hints:
  - "First calculate the tip amount: tip = bill * tip_percent / 100"
  - "Add the tip to the bill to get the total"
  - "Divide the total by num_people, then use round(..., 2) to get 2 decimal places"

tests:
  - code: |
      result = calculate_split(100, 20, 4)
      assert result == 30.0, f"Expected 30.0, got {result}"
    message: "100 bill + 20% tip split 4 ways = 30.0 each"
  - code: |
      result = calculate_split(50, 10, 2)
      assert result == 27.5, f"Expected 27.5, got {result}"
    message: "50 bill + 10% tip split 2 ways = 27.5 each"
  - code: |
      result = calculate_split(200, 15, 5)
      assert result == 46.0, f"Expected 46.0, got {result}"
    message: "200 bill + 15% tip split 5 ways = 46.0 each"

worlds:
  fantasy:
    title: "The Tavern Bill"
    narrative: |
      After a long quest, your adventuring party has gathered at the Rusty Flagon tavern
      for a celebratory feast. The innkeeper presents the bill, but nobody can agree on
      who owes what — especially with the traditional tip added on top.

      Write a function called calculate_split that takes the total bill amount, the tip
      percentage, and the number of adventurers, then returns how much each person owes.
    story_beat: |
      Each adventurer places the exact right number of coins on the table. The innkeeper
      beams. "Never had a party settle so fairly!" Word spreads through the tavern: this
      party is both brave and mathematically gifted.
  scifi:
    title: "Resource Allocation"
    narrative: |
      The crew's resource allocation system is malfunctioning. After a supply run, the
      ship's computer needs to split the total cost — including a standard maintenance
      surcharge — fairly among all crew members.

      Write calculate_split: it receives the base cost, the surcharge percentage, and
      the crew count, and returns each crew member's fair share.
    story_beat: |
      Resource tokens distribute evenly across every crew account. The first mate looks
      impressed. "Perfect allocation. You've saved us from another argument over the
      cargo manifest."
  mystery:
    title: "The Expense Report"
    narrative: |
      Detective Morgan always splits investigation expenses fairly among informants —
      total cost plus a discretionary fee percentage, divided evenly. The accounting
      department wants this automated before the next case review.

      Write calculate_split to compute each party's share from the bill, fee percentage,
      and number of parties.
    story_beat: |
      The expense report clears in seconds. "Flawless arithmetic," says the accountant.
      "The Commissioner will be pleased — no more disputed reimbursements."
