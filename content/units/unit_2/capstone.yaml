xp: 150

code_starter: |
  score = 340
  bonus = 60
  rounds = 7
  lives = 2

  # Print True if ALL of the following hold:
  #   score + bonus > 350
  #   score // rounds > 45
  #   score % 10 == 0
  #   lives >= 2 or bonus >= 100
  print(...)

hints:
  - "score + bonus = 400. Is 400 > 350?"
  - "score // rounds = 340 // 7 = 48. Is 48 > 45?"
  - "score % 10 = 340 % 10 = 0. Does 0 == 0?"
  - "Connect the first three conditions with 'and'. Wrap the last part in parentheses: (lives >= 2 or bonus >= 100)."

plan_prompts:
  - "What does score + bonus equal? Is it greater than 350?"
  - "What is 340 // 7? Is that greater than 45?"
  - "What is 340 % 10? Does it equal 0?"
  - "How do you combine all four conditions into one print statement using 'and' and 'or'?"

tests:
  - code: "_stdout.strip() == 'True'"
    message: "All four conditions hold — should print True"

worlds:
  fantasy:
    title: "The Champion's Gate"
    narrative: |
      The tournament gates open only for adventurers who satisfy every
      requirement at once: their combined score must clear the threshold,
      their score per round must meet the minimum, their score must be
      perfectly divisible, and they must have enough lives or bonus gems.

      Elara hands you the values. "The gate reads only one expression,"
      she says. "Write it correctly and the doors swing open."
    story_beat: |
      You arrange the conditions into one line. The gate glows — True.
      A deep boom echoes as the doors swing wide. The crowd cheers.
      "A true champion," Elara smiles. "You spoke the right truth."
  scifi:
    title: "Launch Clearance Check"
    narrative: |
      Before launch the ship's computer runs a single clearance query:
      combined fuel must exceed the threshold, efficiency per cycle must
      clear the floor, the fuel load must divide cleanly, and backup
      power must be available. All values are on the console.

      Write the single print statement that evaluates every condition.
    story_beat: |
      True. Launch clearance granted. The crew exhales.
      "Clean expression, clean launch," the navigator says, strapping in.
  mystery:
    title: "The Admission Test"
    narrative: |
      Entry to the detective bureau's inner circle requires passing a logic
      gate: combined score must exceed the threshold, cases-per-week must
      clear the floor, your score must end on a clean ten, and you need
      enough lives or bonus points to spare.

      Write the expression. One print. One answer.
    story_beat: |
      True. The bureau's inner door clicks open. Inspector Morgan nods.
      "No one gets past that gate without clean logic. Welcome in."
