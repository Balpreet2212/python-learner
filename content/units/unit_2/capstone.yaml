xp: 150

code_starter: |
  def logic_engine(score, lives, name):
      """
      Return a status string:
      - "Game Over"  if lives == 0
      - "Champion"   if score >= 100 and lives >= 3
      - "Active"     if score >= 50 or (lives >= 1 and bool(name))
      - "Critical"   otherwise
      """

hints:
  - "Check lives == 0 first — that's Game Over regardless of everything else"
  - "Use 'and' for Champion: both score >= 100 and lives >= 3 must be True"
  - "Use 'or' and 'and' together for Active"
  - "The final else returns 'Critical'"

plan_prompts:
  - "What is the first condition to check? Why does order matter?"
  - "What two conditions make a Champion?"
  - "When is a player Active — what combinations cover it?"

tests:
  - code: "assert logic_engine(0, 0, 'Hero') == 'Game Over'"
    message: "lives == 0 should return 'Game Over'"
  - code: "assert logic_engine(100, 3, 'Hero') == 'Champion'"
    message: "score >= 100 and lives >= 3 should return 'Champion'"
  - code: "assert logic_engine(50, 1, 'Hero') == 'Active'"
    message: "score >= 50 with lives and name should return 'Active'"
  - code: "assert logic_engine(10, 1, '') == 'Critical'"
    message: "low score and no name should return 'Critical'"
  - code: "assert logic_engine(0, 3, 'Hero') == 'Active'"
    message: "score 0 but lives >= 1 and name → 'Active'"

worlds:
  fantasy:
    title: "The Arcane Logic Engine"
    narrative: |
      Elara hands you a crystal orb that pulses with four possible glows —
      each representing a different fate for the adventurers who pass through
      the gate. "Your function must classify them correctly," she says,
      "using everything you have learned: division, comparison, booleans,
      and logical operators."
    story_beat: |
      Write logic_engine(score, lives, name) that returns the correct
      status string. The fate of every adventurer depends on accurate logic.
  scifi:
    title: "Crew Status Classifier"
    narrative: |
      The ship AI needs a status function to evaluate crew fitness for each
      mission. Using performance score, remaining lives, and crew name, the
      function must return the correct mission status in real time.
    story_beat: |
      Implement logic_engine(score, lives, name) returning "Game Over",
      "Champion", "Active", or "Critical" based on the given conditions.
  mystery:
    title: "The Case Verdict Engine"
    narrative: |
      The detective bureau has commissioned an automated verdict system.
      Each case is rated by score, remaining leads (lives), and the
      suspect's name. Your function must return the correct verdict
      using all the logic skills you have developed.
    story_beat: |
      Write logic_engine(score, lives, name) that classifies each case
      and returns the appropriate verdict string.
