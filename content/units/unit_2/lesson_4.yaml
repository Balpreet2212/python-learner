    - type: break_fix
      story_before: Elara's Truth Stone should light up when a score is high enough OR a bonus meets its target — but the
        code uses and instead of or, so the stone stays dark even when one condition is true.
      story_after: The Truth Stone glows True and Elara's mentor confirms the logical gate is now correct.
      prompt: Fix the code so is_valid is True when score >= 50 OR bonus >= 10, and print it. With score = 80 and bonus =
