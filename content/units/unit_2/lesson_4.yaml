      broken_code: 'score = 80

        bonus = 5

        is_valid = (score >= 50) and (bonus >= 10)

        print(is_valid)'
      hint: Look for the wrong logical operator — only one condition needs to be true here.
      explanation: and requires both conditions to be True, so True and False gives False. Changing and to or means True or
        False gives True, which is the intended behaviour.
      tests:
      - code: assert _stdout.strip() == 'True'
        message: Should print True (score >= 50 OR bonus >= 10)
