title: "Booleans and bool()"
xp: 12

exercises:
  - type: concept
    code: |
      print(bool(0))
      print(bool(1))
      print(bool(""))
      print(bool("hello"))
    output: "False\nTrue\nFalse\nTrue"
    explanation: "bool() converts a value to True or False. 0, empty strings, and empty collections are False (falsy). Everything else is True (truthy)."

  - type: mcq
    question: "What does bool(0) return?"
    code: ""
    choices: ["False", "True", "0", "None"]
    correct: "False"
    explanation: "0 is falsy in Python. bool(0) returns False."

  - type: mcq
    question: "What does this print?"
    code: "print(bool(\"hello\"))"
    choices: ["True", "False", "hello", "None"]
    correct: "True"
    explanation: "A non-empty string is truthy. bool('hello') is True."

  - type: fill_blank
    before: "is_alive = "
    after: "(hp)"
    choices: ["bool", "int", "str", "print"]
    answer: "bool"
    explanation: "bool(hp) converts hp to True (if hp > 0) or False (if hp == 0)."

  - type: mcq
    question: "What does this print?"
    code: "print(bool([]))"
    choices: ["False", "True", "[]", "None"]
    correct: "False"
    explanation: "An empty list [] is falsy. bool([]) returns False."

  - type: arrange
    instruction: "Build code to convert the number 5 to a boolean and print it"
    blocks: ["print", "(", "bool", "(", "5", ")", ")"]
    correct: ["print", "(", "bool", "(", "5", ")", ")"]
    explanation: "bool(5) returns True because 5 is a non-zero number (truthy)."

  - type: mcq
    question: "Which values are falsy? (select the correct list)"
    code: ""
    choices: ["0, \"\", [], None", "0, 1, \"\", []", "False, None, 1", "0, False, True"]
    correct: "0, \"\", [], None"
    explanation: "Falsy values include: 0, empty string, empty list, None, and False."

  - type: fill_blank
    before: "has_ammo = "
    after: "(ammo_count > 0)"
    choices: ["bool", "int", "str", "not"]
    answer: "bool"
    explanation: "bool(ammo_count > 0) converts the comparison result to True or False."

  - type: mcq
    question: "What does this print?"
    code: "x = 0\nprint(bool(x))\nx = -5\nprint(bool(x))"
    choices: ["False\nTrue", "False\nFalse", "True\nTrue", "0\n-5"]
    correct: "False\nTrue"
    explanation: "0 is falsy (False). -5 is non-zero, so it's truthy (True)."

  - type: mcq
    question: "What does this print?"
    code: "name = \"\"\nprint(bool(name))"
    choices: ["False", "True", "\"\"", "None"]
    correct: "False"
    explanation: "An empty string is falsy. bool('') returns False."

  - type: mini_code
    prompt: "hp = 0. Print the boolean value of hp. Then set hp = 50 and print its boolean value."
    starter: "hp = 0\n"
    tests:
      - code: "'False' in _stdout and 'True' in _stdout"
        message: "Should print False then True"

  - type: mini_code
    prompt: "Check whether the string 'Python' is truthy and the string '' is falsy. Print both results."
    starter: ""
    tests:
      - code: "'True' in _stdout and 'False' in _stdout"
        message: "Should print True for 'Python' and False for ''"

worlds:
  fantasy:
    title: "The Truth Stone"
  scifi:
    title: "Binary Sensor Readings"
  mystery:
    title: "True or False?"
