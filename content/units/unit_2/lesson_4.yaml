unit: 2
lesson: 4
xp: 10

example:
  code: |
    print(bool(0))        # False
    print(bool(42))       # True
    print(bool(""))       # False
    print(bool("hello"))  # True
    active = True
    print(type(active))
  explanation: |
    True and False are Python's boolean values — they express yes/no, on/off.
    bool() reveals a value's truthiness: 0, "", None, and empty collections
    are False. Everything else is True.
    Boolean variable names read like facts: is_active, has_key, can_fly.
  output: "False\nTrue\nFalse\nTrue\n<class 'bool'>"

code_starter: |
  score = 0
  name = "Alex"
  # Convert score to a boolean — is it truthy?
  has_score =
  # Convert name to a boolean — is it truthy?
  has_name =
hints:
  - "has_score = bool(score)  — 0 converts to False"
  - "has_name = bool(name)  — a non-empty string converts to True"

tests:
  - code: "assert has_score == False"
    message: "has_score should be False (bool(0) is False)"
  - code: "assert has_name == True"
    message: "has_name should be True (bool('Alex') is True)"
  - code: "assert 'bool' in _code"
    message: "use bool() to convert the values"

final_challenge:
  code_starter: |
    items_in_bag = 0
    player_name = "Hero"
    lives_remaining = 3
  hints:
    - "bag_empty = not bool(items_in_bag)"
    - "has_name = bool(player_name)"
    - "is_alive = bool(lives_remaining)"
    - "print(bag_empty, has_name, is_alive)"
  tests:
    - code: "assert bag_empty == True"
      message: "bag_empty should be True (items_in_bag is 0)"
    - code: "assert has_name == True"
      message: "has_name should be True"
    - code: "assert is_alive == True"
      message: "is_alive should be True (lives_remaining is 3)"

worlds:
  fantasy:
    title: "The Truth Stone"
    setup: |
      The truth stone glows when something is real. "In Python every value
      carries truthiness," Elara explains. "0, empty strings, and None are
      falsy — everything else is truthy. bool() reveals this hidden truth."

      A wizard has score = 0 and name = "Alex".
      Use bool() to find has_score and has_name.
    final_challenge_prompt: |
      The party's state: items_in_bag = 0, player_name = "Hero",
      lives_remaining = 3. Determine bag_empty (not bool of items),
      has_name, and is_alive. Print all three.
  scifi:
    title: "System Status Signals"
    setup: |
      "Every system state reduces to True or False," the AI explains.
      "bool() converts any value: 0 and empty strings are False,
      non-zero numbers and non-empty strings are True."

      Readings: score = 0, name = "Alex".
      Compute has_score and has_name.
    final_challenge_prompt: |
      System status: items_in_bag = 0, player_name = "Hero",
      lives_remaining = 3. Compute bag_empty, has_name, and is_alive.
      Print all three.
  mystery:
    title: "The Lie Detector"
    setup: |
      "Truth has a value in Python," your mentor says.
      "bool() converts anything: 0 and empty strings return False,
      everything else True."

      Readings: score = 0, name = "Alex".
      Evaluate has_score and has_name.
    final_challenge_prompt: |
      Evidence state: items_in_bag = 0, player_name = "Hero",
      lives_remaining = 3. Evaluate bag_empty, has_name, and is_alive.
      Print all three.
