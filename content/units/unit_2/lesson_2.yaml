unit: 2
lesson: 2
xp: 10

example:
  code: |
    temp = 40
    if temp >= 100:
        print("Boiling")
    else:
        print("Not boiling")
  explanation: |
    else provides a second branch that runs when the if condition is False.
    Exactly one of the two blocks always executes — never both, never neither.
    Here temp is 40, so the condition is False and "Not boiling" prints.
  output: "Not boiling"

code_starter: |
  score = 45
  # If score >= 50 print "Pass", otherwise print "Fail"
hints:
  - "if score >= 50:"
  - "    print(\"Pass\")"
  - "else:"
  - "    print(\"Fail\")"
tests:
  - code: "assert score == 45"
    message: "score should remain 45"
  - code: "assert 'Fail' in _stdout"
    message: "Should print 'Fail' when score is 45"

final_challenge:
  code_starter: |
    strength = 30
    # If strength >= 50 print "Strong", else print "Weak"
  hints:
    - "if strength >= 50:"
    - "else: covers all other cases"
  tests:
    - code: "assert strength == 30"
      message: "strength should remain 30"
    - code: "assert 'Weak' in _stdout"
      message: "Should print 'Weak' when strength is 30"
    - code: "assert 'Strong' not in _stdout"
      message: "Should not print 'Strong' when strength is 30"

worlds:
  fantasy:
    title: "Two Paths in the Forest"
    setup: |
      The forest trail splits. "Every choice leads somewhere," the guide says.
      In Python, if/else gives you exactly two paths — the if block runs when the
      condition is True, the else block runs when it is False. One always executes.

      score is set to 45. Write an if/else: if score >= 50 print "Pass",
      otherwise print "Fail". Try changing score to 75 and see which path runs.
    final_challenge_prompt: |
      A warrior's strength test: if strength >= 50, print "Strong". Otherwise
      print "Weak". strength is 30 — only one path should run.
  scifi:
    title: "Binary Decision Node"
    setup: |
      The navigation computer reaches a binary fork: thrust or coast. A ship
      responds to exactly one of two states — if/else in Python works the same way.
      When the if condition is True the first block runs; when False, the else block runs.

      score is 45. Write if score >= 50 print "Pass", else print "Fail". Exactly
      one message will appear.
    final_challenge_prompt: |
      The hull scanner returns a strength reading of 30. Print "Strong" if strength
      >= 50, otherwise print "Weak". Only one output should appear.
  mystery:
    title: "Guilty or Innocent"
    setup: |
      The verdict form has two boxes: Guilty or Innocent — one must be marked.
      Python's if/else works the same way: one branch runs, the other doesn't.
      There is no middle ground.

      score is 45. Write an if/else: if score >= 50 print "Pass", else print "Fail".
      Exactly one message will print.
    final_challenge_prompt: |
      The suspect's alibi strength is rated 30. Print "Strong" if strength >= 50,
      otherwise print "Weak". Mark exactly one verdict.
