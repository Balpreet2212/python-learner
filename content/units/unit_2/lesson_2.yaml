unit: 2
lesson: 2
xp: 10

example:
  code: |
    a = 2 + 3 * 4      # * before +  →  14
    b = (2 + 3) * 4    # () first    →  20
    c = 10 - 4 / 2     # / before -  →  8.0
    print(a, b, c)
  explanation: |
    Python follows standard maths order: parentheses first, then **,
    then * and / (left to right), then + and - (left to right).
    Without parentheses: 2 + 3 * 4 = 2 + 12 = 14.
    With parentheses: (2 + 3) * 4 = 5 * 4 = 20.
    Use parentheses whenever you need to control the order.
  output: "14 20 8.0"

code_starter: |
  price = 50
  discount = 10
  quantity = 3
  # Calculate total: apply discount to price, then multiply by quantity
  # Hint: you need parentheses!
  total =
hints:
  - "Subtract discount from price first: (price - discount)"
  - "total = (price - discount) * quantity"

tests:
  - code: "assert total == 120"
    message: "total should be 120 — discount applied before multiplying"
  - code: "assert '(' in _code"
    message: "use parentheses to apply the discount before multiplying"

predict:
  code: |
    print(3 + 4 * 2)
    print((3 + 4) * 2)
  explanation: "Without parentheses * runs before +, giving 11. With parentheses the addition happens first, giving 14."

break_and_fix:
  broken_code: |
    a = 80
    b = 85
    c = 90
    average = a + b + c / 3
    print(average)
  hint: "To average three numbers add them ALL first then divide — wrap a + b + c in parentheses"
  tests:
    - code: "assert average == 85.0"
      message: "average should be 85.0 — use (a + b + c) / 3"
    - code: "assert '(' in _code"
      message: "use parentheses: (a + b + c) / 3"

final_challenge:
  code_starter: |
    # Calculate a bill with service charge
    meal = 45
    drinks = 20
    service_rate = 15  # percent
  hints:
    - "subtotal = meal + drinks"
    - "service = subtotal * service_rate / 100"
    - "total = subtotal + service"
    - "print(total)"
  tests:
    - code: "assert subtotal == 65"
      message: "subtotal should be 65 (meal + drinks)"
    - code: "assert service == 9.75"
      message: "service should be 9.75 (15% of 65)"
    - code: "assert total == 74.75"
      message: "total should be 74.75"

worlds:
  fantasy:
    title: "The Spell Formula"
    setup: |
      "Order of operations is the grammar of maths," Elara explains,
      drawing glowing symbols in the air. "Python evaluates * and /
      before + and -. Parentheses override everything."

      A potion costs 50 gold with a 10 gold discount — you need 3.
      Calculate total by applying the discount before multiplying.
    final_challenge_prompt: |
      A tavern bill: meal = 45 gold, drinks = 20, service_rate = 15%.
      Compute subtotal, service (the charge), and total. Print total.
  scifi:
    title: "Mission Fuel Formula"
    setup: |
      "Operator precedence is strict as navigation protocol," the AI
      announces. "Multiplication and division execute before addition.
      Parentheses override that precedence."

      Fuel costs 50 credits per unit with a 10 credit rebate.
      Compute total for 3 units — apply the rebate first.
    final_challenge_prompt: |
      Mission bill: meal = 45 credits, drinks = 20, service_rate = 15%.
      Compute subtotal, service (the fee), and total.
  mystery:
    title: "The Expense Formula"
    setup: |
      "Maths has rules — break them and your budget breaks too," your
      partner says. "Parentheses tell Python what to calculate first."

      A stakeout costs 50 per night with a 10 discount — 3 nights.
      Calculate total: apply the discount before multiplying.
    final_challenge_prompt: |
      Invoice: meal = 45, drinks = 20, service_rate = 15%.
      Compute subtotal, service, and total.
