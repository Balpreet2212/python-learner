title: "Order of Operations"
xp: 12

exercises:
  - type: concept
    code: |
      print(3 + 4 * 2)
      print((3 + 4) * 2)
    output: "11\n14"
    explanation: "Python follows BODMAS/PEMDAS: brackets first, then * and /, then + and -. Parentheses override the default order."

  - type: mcq
    question: "What does this print?"
    code: "print(2 + 3 * 4)"
    choices: ["14", "20", "2", "24"]
    correct: "14"
    explanation: "* has higher precedence. 3 * 4 = 12 first, then 2 + 12 = 14."

  - type: fill_blank
    prompt: "Add a bracket so the addition happens before the multiplication."
    before: "result = "
    after: "2 + 3) * 4"
    choices: ["(", "[", "{", "\""]
    answer: "("
    explanation: "Parentheses make the addition happen first: (2 + 3) = 5, then 5 * 4 = 20."

  - type: mcq
    question: "What does this print?"
    code: "print(10 - 2 * 3)"
    choices: ["4", "24", "10", "1"]
    correct: "4"
    explanation: "* first: 2 * 3 = 6. Then 10 - 6 = 4."

  - type: arrange
    instruction: "Build code to compute the average of 6, 8, and 10 correctly"
    blocks: ["print", "(", "(", "6", "+", "8", "+", "10", ")", "/", "3", ")"]
    correct: ["print", "(", "(", "6", "+", "8", "+", "10", ")", "/", "3", ")"]
    explanation: "Without parentheses, only 10 / 3 would be computed first. The brackets group the sum."

  - type: mcq
    question: "What does this print?"
    code: "print((10 - 3) ** 2)"
    choices: ["49", "7", "94", "100"]
    correct: "49"
    explanation: "(10 - 3) = 7 first (brackets), then 7 ** 2 = 49."

  - type: fill_blank
    prompt: "Divide the sum of a, b, and c by 3 to get their average."
    before: "average = (a + b + c) "
    after: " 3"
    choices: ["/", "//", "*", "+"]
    answer: "/"
    explanation: "After summing a, b, c, divide by 3 to get the average."

  - type: mcq
    question: "What does this print?"
    code: "x = 5\nprint(x * 2 + 1)"
    choices: ["11", "15", "12", "25"]
    correct: "11"
    explanation: "x * 2 = 10 first, then 10 + 1 = 11."

  - type: mcq
    question: "What does this print?"
    code: "print(8 / 2 + 6 / 3)"
    choices: ["6.0", "4.0", "8.0", "2.0"]
    correct: "6.0"
    explanation: "8 / 2 = 4.0 and 6 / 3 = 2.0 happen first, then 4.0 + 2.0 = 6.0."

  - type: arrange
    instruction: "Fix the average calculation by adding parentheses around a + b"
    blocks: ["(", "a", "+", "b", ")", "/", "2", "a", "+", "b", "/"]
    correct: ["(", "a", "+", "b", ")", "/", "2"]
    explanation: "(a + b) / 2 computes the sum first, then divides by 2."

  - type: mini_code
    prompt: "Three scores are 70, 85, and 91. Calculate their average and print it."
    starter: "a = 70\nb = 85\nc = 91\n"
    tests:
      - code: "assert abs(float(_stdout.strip()) - 82.0) < 0.01"
        message: "Average should be 82.0"
      - code: "assert '/' in _code"
        message: "Should use / to divide by 3"

  - type: mini_code
    prompt: "Print the result of (12 + 8) * (5 - 3). Make sure you use parentheses to get the right answer."
    starter: ""
    tests:
      - code: "assert _stdout.strip() == '40'"
        message: "Should print 40: (20) * (2) = 40"
      - code: "assert '(' in _code and ')' in _code"
        message: "Should use parentheses to control order of operations"

