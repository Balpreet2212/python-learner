        code: "print((10 - 3) ** 2)"
        choices: ["49", "7", "94", "100"]
        correct: "49"
        explanation: "Finn calculates frost pressure: altitude 10 minus 3 safe zones = 7 (brackets first), then 7 squared = 49 pressure units."

      - type: fill_blank
