        explanation: "Finn splits 8 ration bars between 2 scouts (= 4.0 each) and 6 torches between 3 caves (= 2.0 each). Total supplies per zone: 4.0 + 2.0 = 6.0."

      - type: arrange
        instruction: "Fix the average calculation by adding parentheses around a + b"
        blocks: ["(", "a", "+", "b", ")", "/", "2", "a", "+", "b", "/"]
        correct: ["(", "a", "+", "b", ")", "/", "2"]
        explanation: "Finn averages two altitude measurements a and b. (a + b) / 2 adds them first, then halves the total — the correct midpoint."

