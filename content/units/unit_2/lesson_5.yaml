      prompt: Allow Finn to attempt the summit only when stamina is high enough AND he has a rope.
      before: 'can_summit = stamina >= 50 '
      after: ' has_rope'
      choices:
      - and
      - or
      - not
      - ==
      answer: and
      explanation: 'Both must be True: stamina >= 50 AND has_rope must both hold.'
    - type: mcq
      question: Finn checks if stamina is outside the healthy range. What does this print?
      code: 'stamina = 45

        print(stamina >= 60 or stamina < 50)'
      choices:
      - 'True'
      - 'False'
