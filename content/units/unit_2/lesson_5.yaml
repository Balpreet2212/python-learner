      code: 'altitude = 15

        print(not (altitude > 10))'
      choices:
      - 'False'
      - 'True'
      - '15'
      - None
      correct: 'False'
      explanation: altitude > 10 is True (15 > 10). not True = False.
    - type: fill_blank
      prompt: Mark the trail as unsafe when altitude is NOT in the safe range.
      before: 'is_unsafe = '
      after: ' (altitude >= 0)'
      choices:
      - not
      - and
      - or
      - bool
      answer: not
      explanation: not flips the boolean. not True = False means safe.
    - type: mcq
      question: Finn logs two trail flags. What does this print?
      code: 'a = True

        b = False

        print(a and b)

        print(a or b)'
      choices:
      - 'False

        True'
      - 'True

        True'
      - 'False

        False'
      - 'True

        False'
      correct: 'False

        True'
      explanation: True and False = False. True or False = True.
    - type: mcq
      question: Which expression is True when altitude is between 1 and 10 (inclusive)?
      code: ''
      choices:
      - x >= 1 and x <= 10
      - x >= 1 or x <= 10
      - not x >= 1 and x <= 10
      - x > 1 and x < 10
      correct: x >= 1 and x <= 10
      explanation: 'Both bounds must hold: altitude >= 1 AND <= 10.'
    - type: mini_code
      prompt: Read hp then shield ('True'/'False') with input(). Print True if hp is above 50 AND shield is True, otherwise
        print False.
      starter: 'hp = int(input())

        shield = input() == ''True''

        '
      tests:
      - code: assert _stdout.strip() == 'True'
        stdin: '80

          True'
        message: 'stamina=80 and rope=True: both hold, summit attempt clear'
      - code: assert _stdout.strip() == 'False'
        stdin: '30

          True'
        message: stamina=30 is not above 50, cannot summit
    - type: mini_code
      prompt: Read an age with input(). Print True if the age is less than 13 OR 18 or above, otherwise print False.
      starter: 'age = int(input())

        '
      tests:
      - code: assert _stdout.strip() == 'False'
        stdin: '16'
        message: 16 is in the mid range, prints False
      - code: assert _stdout.strip() == 'True'
        stdin: '10'
        message: 10 is under 13, prints True
      - code: assert _stdout.strip() == 'True'
        stdin: '20'
        message: 20 is 18 or above, prints True
