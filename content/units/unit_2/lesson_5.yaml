title: "Logical Operators: and, or, not"
xp: 12

exercises:
  - type: concept
    code: |
      x = 7
      print(x > 0 and x < 10)
      print(x < 0 or x > 5)
      print(not x > 10)
    output: "True\nTrue\nTrue"
    explanation: "and: both sides must be True. or: at least one side must be True. not: flips True to False and vice versa."

  - type: mcq
    question: "What does this print?"
    code: "print(True and False)"
    choices: ["False", "True", "None", "Error"]
    correct: "False"
    explanation: "and requires both sides to be True. True and False = False."

  - type: mcq
    question: "What does this print?"
    code: "print(True or False)"
    choices: ["True", "False", "None", "Error"]
    correct: "True"
    explanation: "or only needs one side to be True. True or False = True."

  - type: fill_blank
    prompt: "Require both conditions to be true before allowing entry."
    before: "can_enter = age >= 18 "
    after: " has_ticket"
    choices: ["and", "or", "not", "=="]
    answer: "and"
    explanation: "and requires both conditions: age >= 18 AND has_ticket must both be True."

  - type: mcq
    question: "What does this print?"
    code: "score = 45\nprint(score >= 60 or score < 50)"
    choices: ["True", "False", "45", "None"]
    correct: "True"
    explanation: "score >= 60 is False, but score < 50 is True. False or True = True."

  - type: arrange
    instruction: "Build code to check: x is positive AND x is less than 100"
    blocks: ["print", "(", "x", ">", "0", "and", "x", "<", "100", ")"]
    correct: ["print", "(", "x", ">", "0", "and", "x", "<", "100", ")"]
    explanation: "Both conditions must be True for and to return True."

  - type: mcq
    question: "What does this print?"
    code: "x = 15\nprint(not (x > 10))"
    choices: ["False", "True", "15", "None"]
    correct: "False"
    explanation: "x > 10 is True (15 > 10). not True = False."

  - type: fill_blank
    prompt: "Flip the boolean so is_invalid is True when the score is negative."
    before: "is_invalid = "
    after: " (score >= 0)"
    choices: ["not", "and", "or", "bool"]
    answer: "not"
    explanation: "not flips the boolean. not True is False, not False is True."

  - type: mcq
    question: "What does this print?"
    code: "a = True\nb = False\nprint(a and b)\nprint(a or b)"
    choices: ["False\nTrue", "True\nTrue", "False\nFalse", "True\nFalse"]
    correct: "False\nTrue"
    explanation: "True and False = False. True or False = True."

  - type: mcq
    question: "Which expression is True when x is between 1 and 10 (inclusive)?"
    code: ""
    choices: ["x >= 1 and x <= 10", "x >= 1 or x <= 10", "not x >= 1 and x <= 10", "x > 1 and x < 10"]
    correct: "x >= 1 and x <= 10"
    explanation: "Both conditions must hold: x must be >= 1 AND <= 10."

  - type: mini_code
    prompt: "hp = 80, shield = True. Print True if hp > 50 AND shield is True, otherwise False."
    starter: "hp = 80\nshield = True\n"
    tests:
      - code: "_stdout.strip() == 'True'"
        message: "hp > 50 and shield should be True"

  - type: mini_code
    prompt: "age = 16. Print True if age < 13 OR age >= 18 (either a child or an adult), otherwise False."
    starter: "age = 16\n"
    tests:
      - code: "_stdout.strip() == 'False'"
        message: "16 is neither < 13 nor >= 18, so result is False"

worlds:
  fantasy:
    title: "The Logic Gate"
  scifi:
    title: "System Logic"
  mystery:
    title: "Deductive Reasoning"
