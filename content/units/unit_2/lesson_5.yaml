title: 'Logical Operators: and, or, not'
xp: 12
exercises:
- type: concept
  code: 'x = 7

    print(x > 0 and x < 10)

    print(x < 0 or x > 5)

    print(not x > 10)

    '
  output: 'True

    True

    True'
  explanation: 'and: both sides must be True. or: at least one side must be True. not: flips True to False and vice versa.'
- type: mcq
  question: What does this print?
  code: print(True and False)
  choices:
  - 'False'
  - 'True'
  - None
  - Error
  correct: 'False'
  explanation: and requires both sides to be True. True and False = False.
- type: mcq
  question: What does this print?
  code: print(True or False)
  choices:
  - 'True'
  - 'False'
  - None
  - Error
  correct: 'True'
  explanation: or only needs one side to be True. True or False = True.
- type: fill_blank
  prompt: Require both conditions to be true before allowing entry.
  before: 'can_enter = age >= 18 '
  after: ' has_ticket'
  choices:
  - and
  - or
  - not
  - ==
  answer: and
  explanation: 'and requires both conditions: age >= 18 AND has_ticket must both be True.'
- type: mcq
  question: What does this print?
  code: 'score = 45

    print(score >= 60 or score < 50)'
  choices:
  - 'True'
  - 'False'
  - '45'
  - None
  correct: 'True'
  explanation: score >= 60 is False, but score < 50 is True. False or True = True.
- type: arrange
  instruction: 'Build code to check: x is positive AND x is less than 100'
  blocks:
  - print
  - (
  - x
  - '>'
  - '0'
  - and
  - x
  - <
  - '100'
  - )
  correct:
  - print
  - (
  - x
  - '>'
  - '0'
  - and
  - x
  - <
  - '100'
  - )
  explanation: Both conditions must be True for and to return True.
- type: mcq
  question: What does this print?
  code: 'x = 15

    print(not (x > 10))'
  choices:
  - 'False'
  - 'True'
  - '15'
  - None
  correct: 'False'
  explanation: x > 10 is True (15 > 10). not True = False.
- type: fill_blank
  prompt: Flip the boolean so is_invalid is True when the score is negative.
  before: 'is_invalid = '
  after: ' (score >= 0)'
  choices:
  - not
  - and
  - or
  - bool
  answer: not
  explanation: not flips the boolean. not True is False, not False is True.
- type: mcq
  question: What does this print?
  code: 'a = True

    b = False

    print(a and b)

    print(a or b)'
  choices:
  - 'False

    True'
  - 'True

    True'
  - 'False

    False'
  - 'True

    False'
  correct: 'False

    True'
  explanation: True and False = False. True or False = True.
- type: mcq
  question: Which expression is True when x is between 1 and 10 (inclusive)?
  code: ''
  choices:
  - x >= 1 and x <= 10
  - x >= 1 or x <= 10
  - not x >= 1 and x <= 10
  - x > 1 and x < 10
  correct: x >= 1 and x <= 10
  explanation: 'Both conditions must hold: x must be >= 1 AND <= 10.'
- type: mini_code
  prompt: Read hp then shield ('True'/'False') with input(). Print True if hp > 50 AND shield is True, otherwise print False.
  starter: 'hp = int(input())

    shield = input() == ''True''

    '
  tests:
  - code: assert _stdout.strip() == 'True'
    stdin: '80

      True'
    message: 'hp=80 and shield=True: both conditions met, prints True'
  - code: assert _stdout.strip() == 'False'
    stdin: '30

      True'
    message: hp=30 is not > 50, prints False
- type: mini_code
  prompt: Read an age with input(). Print True if age is less than 13 OR 18 or above, otherwise print False.
  starter: 'age = int(input())

    '
  tests:
  - code: assert _stdout.strip() == 'False'
    stdin: '16'
    message: 16 is not < 13 and not >= 18, prints False
  - code: assert _stdout.strip() == 'True'
    stdin: '10'
    message: 10 is < 13, prints True
  - code: assert _stdout.strip() == 'True'
    stdin: '20'
    message: 20 is >= 18, prints True
