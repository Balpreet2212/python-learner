      explanation: and requires both sides True. True and False = False. Storm cancels safe climbing.
    - type: mcq
      question: Two trail conditions are checked — only one needs to hold. What does this print?
      code: print(True or False)
      choices:
      - 'True'
      - 'False'
      - None
      - Error
      correct: 'True'
      explanation: or only needs one side True. The route is safe if either condition holds.
