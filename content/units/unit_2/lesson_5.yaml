unit: 2
lesson: 5
xp: 10

example:
  code: |
    level = 8
    gold = 150
    has_quest = False
    can_buy = level >= 5 and gold >= 100
    can_act = has_quest or level >= 10
    blocked = not has_quest
    print(can_buy, can_act, blocked)
  explanation: |
    and: both conditions must be True for the result to be True.
    or: at least one condition must be True.
    not: flips True to False and False to True.
    These let you combine comparisons into compound conditions.
  output: "True False True"

code_starter: |
  stamina = 80
  has_weapon = True
  # Can attack: stamina >= 50 AND has a weapon
  can_attack =
  # Is tired: stamina < 20 OR has no weapon
  is_tired =
hints:
  - "can_attack = stamina >= 50 and has_weapon"
  - "is_tired = stamina < 20 or not has_weapon"

tests:
  - code: "assert can_attack == True"
    message: "can_attack should be True (80 >= 50 and has_weapon)"
  - code: "assert is_tired == False"
    message: "is_tired should be False (80 is not < 20, has_weapon is True)"
  - code: "assert 'and' in _code"
    message: "use 'and' for can_attack"
  - code: "assert 'or' in _code"
    message: "use 'or' for is_tired"

final_challenge:
  code_starter: |
    age = 16
    has_licence = False
    is_emergency = True
  hints:
    - "can_drive = age >= 17 and has_licence"
    - "can_proceed = can_drive or is_emergency"
    - "is_blocked = not can_proceed"
    - "print(can_drive, can_proceed, is_blocked)"
  tests:
    - code: "assert can_drive == False"
      message: "can_drive should be False (16 < 17 and no licence)"
    - code: "assert can_proceed == True"
      message: "can_proceed should be True (emergency override)"
    - code: "assert is_blocked == False"
      message: "is_blocked should be False (can_proceed is True)"

worlds:
  fantasy:
    title: "The Logic Gate"
    setup: |
      Three runes hang above the gate: AND, OR, NOT.
      "and requires both sides to be True," Elara says. "or requires
      only one. not reverses the value entirely."

      A warrior: stamina = 80, has_weapon = True.
      Determine can_attack (stamina >= 50 and armed) and
      is_tired (low stamina or unarmed).
    final_challenge_prompt: |
      At the crossroads: age = 16, has_licence = False, is_emergency = True.
      Compute can_drive, can_proceed (drive or emergency), and
      is_blocked (not can_proceed). Print all three.
  scifi:
    title: "Access Control Logic"
    setup: |
      "Logic gates are the soul of computing," the AI explains.
      "and: both inputs must be True. or: either suffices.
      not: inverts the signal."

      Crew: stamina = 80, has_weapon = True.
      Compute can_attack and is_tired using and/or/not.
    final_challenge_prompt: |
      Airlock check: age = 16, has_licence = False, is_emergency = True.
      Compute can_drive, can_proceed, and is_blocked. Print all three.
  mystery:
    title: "The Case Conditions"
    setup: |
      "Conclusions require evidence," your mentor says. "and means you
      need both facts. or means either will do. not means the opposite."

      Suspect: stamina = 80, has_weapon = True.
      Assess can_attack and is_tired.
    final_challenge_prompt: |
      Case conditions: age = 16, has_licence = False, is_emergency = True.
      Evaluate can_drive, can_proceed, and is_blocked. Print all three.
