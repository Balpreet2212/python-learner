unit: 2
lesson: 5
xp: 10

example:
  code: |
    logged_in = True
    role = "admin"
    if logged_in:
        if role == "admin":
            print("Full access")
        else:
            print("Limited access")
    else:
        print("Please log in")
  explanation: |
    An if statement can contain another if inside its block — this is called nesting.
    The inner block only runs when the outer condition is already True.
    Here logged_in is True so we enter the outer block, then role == "admin" is True
    so "Full access" prints. Nesting lets you layer conditions precisely.
  output: "Full access"

code_starter: |
  is_member = True
  score = 85
  # If is_member is True:
  #   if score >= 90, print "Gold member"
  #   else print "Silver member"
  # else print "Not a member"
hints:
  - "Outer if checks is_member"
  - "Inner if/else checks score — indent it one extra level (8 spaces)"
  - "The else for the outer if is at the same indent as the outer if"
tests:
  - code: "assert is_member is True and score == 85"
    message: "is_member and score should not be changed"
  - code: |
      import io, sys
      out = io.StringIO()
      sys.stdout = out
      is_member = True
      score = 85
      if is_member:
          if score >= 90:
              print("Gold member")
          else:
              print("Silver member")
      else:
          print("Not a member")
      sys.stdout = sys.__stdout__
      assert "Silver member" in out.getvalue()
    message: "Should print 'Silver member' when is_member=True and score=85"
  - code: |
      import io, sys
      out = io.StringIO()
      sys.stdout = out
      is_member = True
      score = 95
      if is_member:
          if score >= 90:
              print("Gold member")
          else:
              print("Silver member")
      else:
          print("Not a member")
      sys.stdout = sys.__stdout__
      assert "Gold member" in out.getvalue()
    message: "Should print 'Gold member' when is_member=True and score=95"
  - code: |
      import io, sys
      out = io.StringIO()
      sys.stdout = out
      is_member = False
      score = 95
      if is_member:
          if score >= 90:
              print("Gold member")
          else:
              print("Silver member")
      else:
          print("Not a member")
      sys.stdout = sys.__stdout__
      assert "Not a member" in out.getvalue()
    message: "Should print 'Not a member' when is_member=False"

final_challenge:
  code_starter: |
    has_key = True
    door_level = 3
    # If has_key is True:
    #   if door_level <= 2, print "Door unlocked"
    #   else print "Key too weak"
    # else print "No key"
  hints:
    - "Outer if checks has_key"
    - "Inner if checks door_level <= 2"
    - "Three possible outputs: 'Door unlocked', 'Key too weak', 'No key'"
  tests:
    - code: "assert has_key is True and door_level == 3"
      message: "has_key and door_level should not be changed"
    - code: |
        import io, sys
        out = io.StringIO()
        sys.stdout = out
        has_key = True
        door_level = 3
        if has_key:
            if door_level <= 2:
                print("Door unlocked")
            else:
                print("Key too weak")
        else:
            print("No key")
        sys.stdout = sys.__stdout__
        assert "Key too weak" in out.getvalue()
      message: "Should print 'Key too weak' when has_key=True and door_level=3"
    - code: |
        import io, sys
        out = io.StringIO()
        sys.stdout = out
        has_key = True
        door_level = 1
        if has_key:
            if door_level <= 2:
                print("Door unlocked")
            else:
                print("Key too weak")
        else:
            print("No key")
        sys.stdout = sys.__stdout__
        assert "Door unlocked" in out.getvalue()
      message: "Should print 'Door unlocked' when has_key=True and door_level=1"
    - code: |
        import io, sys
        out = io.StringIO()
        sys.stdout = out
        has_key = False
        door_level = 1
        if has_key:
            if door_level <= 2:
                print("Door unlocked")
            else:
                print("Key too weak")
        else:
            print("No key")
        sys.stdout = sys.__stdout__
        assert "No key" in out.getvalue()
      message: "Should print 'No key' when has_key=False"

worlds:
  fantasy:
    title: "The Nested Gates"
    setup: |
      The citadel has two gates — the outer checks if you hold a guild card,
      the inner checks your rank. You must pass both to reach the inner hall.
      In Python, nesting an if inside another if mirrors exactly this — you
      must satisfy the outer condition before the inner one is even checked.

      is_member is True, score is 85. Write the nested if: members with score
      >= 90 get "Gold member", others get "Silver member". Non-members get
      "Not a member".
    final_challenge_prompt: |
      The vault has two locks. has_key is True, door_level is 3.
      If you have the key: unlock the door if door_level <= 2, otherwise
      "Key too weak". Without a key: "No key". One of three messages prints.
  scifi:
    title: "Two-Factor Access"
    setup: |
      The bridge requires two-factor authentication: first a valid crew badge,
      then a clearance level check. Nested if statements mirror this — the inner
      condition is only evaluated once the outer one passes.

      is_member is True, score is 85. If is_member: print "Gold member" for
      score >= 90, otherwise "Silver member". Else print "Not a member".
    final_challenge_prompt: |
      The airlock uses two-step verification. has_key is True, door_level is 3.
      Key present + low door level = "Door unlocked". Key present + high level =
      "Key too weak". No key = "No key".
  mystery:
    title: "Locked Room, Locked Box"
    setup: |
      The evidence room requires a badge to enter, and a separate combination
      to open the inner safe. Two layers of access — just like nested if statements.
      The inner check only matters if the outer one passes.

      is_member is True, score is 85. Nest an if inside another: Gold for high
      scorers, Silver for the rest, "Not a member" for outsiders.
    final_challenge_prompt: |
      The case file has two security checks. has_key is True, door_level is 3.
      Key + low level = "Door unlocked". Key + high level = "Key too weak".
      No key at all = "No key".
