    setup: |
      The scanner sweeps through frequencies — stop at the first clean signal.
      "When you find what you're looking for, break lets you exit the loop
      immediately instead of scanning everything," the AI explains.

      Find the first even number in 'numbers', store it in 'first_even', and break.
    final_challenge_prompt: |
      The ship's diagnostics flagged readings [5, 12, -3, 7, -1]. The first negative
